<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA AIRDROP</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { margin:0; padding:0; font-family: sans-serif; color:#fff; background:#050914; }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
    }

    .airdrop-card {
      max-width: 420px;
      width: 100%;
      padding: 20px 18px;
      border-radius: 18px;
      background: rgba(4,9,20,0.88);
      box-shadow: 0 12px 45px rgba(0,0,0,0.6);
      backdrop-filter: blur(14px);
    }

    h1.airdrop-title {
      margin: 0 0 6px;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing:0.12em;
    }

    .airdrop-sub {
      margin:0 0 12px;
      font-size:14px;
      opacity:0.75;
    }

    .btn {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-ombre {
      background: linear-gradient(135deg,#ff2fbf,#40f0ff);
      border:0;
      color:#fff;
    }

    .btn-outline {
      background: transparent;
      border:1px solid rgba(255,255,255,0.4);
      color:#fff;
    }

    #userLabel, #airdropMessage {
      font-size:13px;
      opacity:0.85;
    }

    .crate-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(100px,1fr));
      gap:10px;
      margin-top:10px;
    }

    .crate-card {
      padding:10px 8px;
      background: rgba(10,14,35,0.92);
      border-radius:14px;
      text-align:center;
      cursor:pointer;
      box-shadow:0 8px 24px rgba(0,0,0,0.5);
    }

    .crate-card.opening {
      outline:2px solid rgba(255,47,191,0.95);
      box-shadow:0 0 18px rgba(255,47,191,0.65);
    }

    .crate-label { font-size:12px; opacity:0.95; }
    .crate-wave { font-size:10px; opacity:0.75; }

    .loot-reward { margin-top:14px; font-size:14px; }
  </style>
</head>

<body>
<div class="page-wrap">
  <div class="airdrop-card">

    <h1 class="airdrop-title">IZZA AIRDROP</h1>
    <p class="airdrop-sub">Authenticate with Pi to redeem your IZZA loot crate.</p>

    <button id="piLoginBtn" class="btn btn-ombre" style="width:100%;">Sign in with Pi</button>

    <p id="userLabel"></p>
    <p id="airdropMessage"></p>

    <div id="crateSection" style="display:none;">
      <p id="crateHeader"></p>
      <div id="crateGrid" class="crate-grid"></div>
    </div>

    <p id="lootReward" class="loot-reward"></p>

  </div>
</div>

<script>
(function(){
  const PI_APP_ID = "{{ PI_APP_ID }}";
  const PI_SANDBOX = "{{ PI_SANDBOX }}" === "true";

  let currentUser = null;

  const piLoginBtn = document.getElementById("piLoginBtn");
  const userLabel  = document.getElementById("userLabel");
  const msg        = document.getElementById("airdropMessage");
  const crateGrid  = document.getElementById("crateGrid");
  const crateSec   = document.getElementById("crateSection");
  const crateHeader= document.getElementById("crateHeader");
  const lootReward = document.getElementById("lootReward");

  function initPi(){
    if(!window.Pi) return;
    try {
      Pi.init({ version:"2.0", sandbox:PI_SANDBOX });
    } catch(e){ console.error(e); }
  }

  initPi();

  function updateUserLabel(){
    if(currentUser && currentUser.username){
      userLabel.textContent = "Signed in as @" + currentUser.username;
    } else {
      userLabel.textContent = "";
    }
  }

  piLoginBtn.onclick = async function(){
    if(!window.Pi) return alert("Pi SDK not available.");

    try {
      const scopes = ["username","wallets"];
      const { user } = await Pi.authenticate(scopes, ()=>{});
      currentUser = user;
      updateUserLabel();

      await loadProfile();
    } catch(err){
      console.error(err);
      alert("Pi auth failed.");
    }
  };

  async function getJSON(url){
    const r = await fetch(url);
    return r.json();
  }

  async function postJSON(url,body){
    const r = await fetch(url,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(body || {})
    });
    return r.json();
  }

  async function loadProfile(){
    if(!currentUser || !currentUser.username) return;

    const data = await getJSON("/api/izza_airdrop/profile?username="+encodeURIComponent(currentUser.username));

    msg.textContent = data.message || "";

    if(!data.ok || !data.crates){
      crateSec.style.display="none";
      return;
    }

    crateSec.style.display="block";
    crateGrid.innerHTML="";
    crateHeader.textContent = data.crates.length>0 ? "Tap a crate to reveal your IZZA reward" : "";

    data.crates.forEach(c=>{
      const div = document.createElement("div");
      div.className="crate-card";
      div.dataset.id = c.id;
      div.innerHTML = `
        <div class="crate-label">IZZA LOOT CRATE</div>
        <div class="crate-wave">${c.wave_tag}</div>
      `;
      div.onclick = ()=> openCrate(c.id);
      crateGrid.appendChild(div);
    });
  }

  async function openCrate(id){
    if(!currentUser || !currentUser.username) return;

    const card = crateGrid.querySelector('[data-id="'+id+'"]');
    if(card) card.classList.add("opening");

    const resp = await postJSON("/api/izza_airdrop/open",{
      username: currentUser.username,
      crate_id: id
    });

    if(!resp.ok){
      alert(resp.error || "Error opening crate.");
      if(card) card.classList.remove("opening");
      return;
    }

    lootReward.textContent = `You received ${resp.reward_amount} IZZA!`;
    if(card) card.classList.remove("opening");

    alert("You now have enough IZZA to mint an IZZA Creature egg! Redirecting you...");
    window.location.href = "/creatures";
  }

})();
</script>

</body>
</html>
