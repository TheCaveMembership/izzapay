<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA AIRDROP</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { margin:0; padding:0; font-family: sans-serif; color:#fff; background:#050914; }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
    }

    .airdrop-card {
      max-width: 420px;
      width: 100%;
      padding: 20px 18px;
      border-radius: 18px;
      background: rgba(4,9,20,0.88);
      box-shadow: 0 12px 45px rgba(0,0,0,0.6);
      backdrop-filter: blur(14px);
    }

    h1.airdrop-title {
      margin: 0 0 6px;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing:0.12em;
    }

    .airdrop-sub {
      margin:0 0 12px;
      font-size:14px;
      opacity:0.75;
    }

    .btn {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-ombre {
      background: linear-gradient(135deg,#ff2fbf,#40f0ff);
      border:0;
      color:#fff;
    }

    .btn-outline {
      background: transparent;
      border:1px solid rgba(255,255,255,0.4);
      color:#fff;
    }

    #userLabel, #airdropMessage {
      font-size:13px;
      opacity:0.85;
    }

    .crate-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(100px,1fr));
      gap:10px;
      margin-top:10px;
    }

    .crate-card {
      padding:10px 8px;
      background: rgba(10,14,35,0.92);
      border-radius:14px;
      text-align:center;
      cursor:pointer;
      box-shadow:0 8px 24px rgba(0,0,0,0.5);
    }

    .crate-card.opening {
      outline:2px solid rgba(255,47,191,0.95);
      box-shadow:0 0 18px rgba(255,47,191,0.65);
    }

    .crate-label { font-size:12px; opacity:0.95; }
    .crate-wave { font-size:10px; opacity:0.75; }

    .loot-reward { margin-top:14px; font-size:14px; }

    .gate-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      font-size: 13px;
      line-height: 1.5;
    }

    .gate-box input {
      width:100%;
      padding:6px 8px;
      border-radius:8px;
      border:none;
      margin-bottom:6px;
      font-size:12px;
    }

    .status-text {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }
  </style>
</head>

<body>
<div class="page-wrap">
  <div class="airdrop-card">

    <h1 class="airdrop-title">IZZA AIRDROP</h1>
    <p class="airdrop-sub">
      Sign in with Pi, then paste your Pi Testnet wallet address to check
      if this wallet received an IZZA airdrop and unlock IZZA Loot Crates!
    </p>

    <button id="piLoginBtn" class="btn btn-ombre" style="width:100%;">Sign in with Pi</button>

    <p id="userLabel" class="status-text"></p>

    <!-- Wallet connect row, same concept as 67 Loot Crates -->
    <div id="walletRow" class="gate-box">
      <p style="margin:0 0 6px;">
        Paste your <strong>Pi Testnet wallet address</strong> 
      </p>
      <input id="walletPubInput"
             type="text"
             placeholder="G… Pi Testnet wallet pub key">
      <button id="walletSaveBtn" class="btn btn-outline" style="width:100%;margin-top:6px;">
        Check this wallet for IZZA airdrop
      </button>
      <p id="walletStatus" class="status-text"></p>
    </div>

    <p id="airdropMessage"></p>

    <div id="crateSection" style="display:none;">
      <p id="crateHeader"></p>
      <div id="crateGrid" class="crate-grid"></div>
    </div>

    <p id="lootReward" class="loot-reward"></p>

  </div>
</div>

<script>
(function(){
  const PI_APP_ID = "{{ PI_APP_ID }}";
  const PI_SANDBOX = "{{ PI_SANDBOX }}" === "true";

  let currentUser      = null;
  let currentWalletPub = null;

  const piLoginBtn   = document.getElementById("piLoginBtn");
  const userLabel    = document.getElementById("userLabel");
  const msg          = document.getElementById("airdropMessage");
  const crateGrid    = document.getElementById("crateGrid");
  const crateSec     = document.getElementById("crateSection");
  const crateHeader  = document.getElementById("crateHeader");
  const lootReward   = document.getElementById("lootReward");

  const walletRow      = document.getElementById("walletRow");
  const walletPubInput = document.getElementById("walletPubInput");
  const walletSaveBtn  = document.getElementById("walletSaveBtn");
  const walletStatus   = document.getElementById("walletStatus");

  function initPi(){
    if(!window.Pi) return;
    try {
      Pi.init({ version:"2.0", sandbox: PI_SANDBOX });
    } catch(e){ console.error(e); }
  }

  initPi();

  function updateUserLabel(){
    if(currentUser && currentUser.username){
      userLabel.textContent = "Signed in as @" + currentUser.username;
    } else {
      userLabel.textContent = "";
    }
  }

  async function getJSON(url){
    const r = await fetch(url);
    return r.json();
  }

  async function postJSON(url,body){
    const r = await fetch(url,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(body || {})
    });
    return r.json();
  }

  // preload remembered IZZA airdrop wallet from local storage
  (function(){
    try {
      const w = localStorage.getItem("IZZA_wallet_pub");
      if (w) {
        currentWalletPub = w;
        walletPubInput.value = w;
        walletStatus.textContent =
          "Using wallet " + w.slice(0,6) + "…" + w.slice(-4) + " to check airdrops.";
        loadProfile();
      }
    } catch(e) {}
  })();

  // Pi auth, username only, same concept as 67
  piLoginBtn.onclick = async function(){
    if(!window.Pi) {
      alert("Pi SDK not available.");
      return;
    }

    try {
      const scopes = ["username", "payments"];
      const onIncomplete = payment => { console.log("incomplete payment", payment); };

      const { user, accessToken } = await Pi.authenticate(scopes, onIncomplete);
      currentUser = user;
      updateUserLabel();
    } catch(err){
      console.error(err);
      alert("Pi auth failed.");
    }
  };

  // save wallet and trigger airdrop check
  async function saveWalletAndCheck(){
    const pub = (walletPubInput.value || "").trim();
    if (!pub || !pub.startsWith("G") || pub.length < 20) {
      walletStatus.textContent = "Enter a valid Pi Testnet wallet pub key starting with G…";
      return;
    }

    walletStatus.textContent = "Checking this wallet for IZZA airdrop…";

    // optional server side log or future mapping, same idea as 67 /api/set_wallet
    try {
      const uname = currentUser && currentUser.username ? currentUser.username : "guest";
      const res = await postJSON("/api/izza_airdrop/set_wallet", {
        username: uname,
        wallet_pub: pub
      });
      if (!res.ok) {
        walletStatus.textContent = "Save failed, " + (res.error || "server error");
        return;
      }
    } catch(e) {
      console.error(e);
      walletStatus.textContent = "Network error saving wallet, still checking airdrop.";
    }

    currentWalletPub = pub;
    try { localStorage.setItem("IZZA_wallet_pub", pub); } catch(e) {}

    await loadProfile();
  }

  if (walletSaveBtn) {
    walletSaveBtn.addEventListener("click", saveWalletAndCheck);
  }

  // profile by wallet_pub, also auto creates crate server side if airdrop exists
  async function loadProfile(){
    if (!currentWalletPub) {
      msg.textContent = "Paste your Pi Testnet wallet to check for Izza airdrops.";
      crateSec.style.display = "none";
      crateGrid.innerHTML = "";
      crateHeader.textContent = "";
      return;
    }

    try {
      const data = await getJSON(
        "/api/izza_airdrop/profile?wallet_pub="+encodeURIComponent(currentWalletPub)
      );

      if (!data.ok) {
        msg.textContent = data.message || "Error reading airdrop profile.";
        crateSec.style.display = "none";
        crateGrid.innerHTML = "";
        crateHeader.textContent = "";
        return;
      }

      walletStatus.textContent =
        "Checking wallet " + currentWalletPub.slice(0,6) + "…" + currentWalletPub.slice(-4);

      msg.textContent = data.message || "";

      if (!data.crates || !data.crates.length) {
        crateSec.style.display = "none";
        crateGrid.innerHTML = "";
        crateHeader.textContent = "";
        return;
      }

      crateSec.style.display = "block";
      crateGrid.innerHTML = "";
      crateHeader.textContent = "Tap a crate to reveal your IZZA reward";

      data.crates.forEach(c=>{
        const div = document.createElement("div");
        div.className="crate-card";
        div.dataset.id = c.id;
        div.innerHTML = `
          <div class="crate-label">IZZA LOOT CRATE</div>
          <div class="crate-wave">${c.wave_tag || ""}</div>
        `;
        div.onclick = ()=> openCrate(c.id);
        crateGrid.appendChild(div);
      });

    } catch(e) {
      console.error(e);
      msg.textContent = "Network error loading airdrop crates.";
      crateSec.style.display = "none";
      crateGrid.innerHTML = "";
      crateHeader.textContent = "";
    }
  }

  // open crate and pay IZZA from distributor, same as before
  async function openCrate(id){
    if(!currentWalletPub) {
      alert("No wallet linked, paste your Pi Testnet address again.");
      return;
    }

    const uname = currentUser && currentUser.username ? currentUser.username : "guest";

    const card = crateGrid.querySelector('[data-id="'+id+'"]');
    if(card) card.classList.add("opening");

    try {
      const resp = await postJSON("/api/izza_airdrop/open",{
        username: uname,
        crate_id: id,
        wallet_pub: currentWalletPub
      });

      if(!resp.ok){
        alert(resp.error || "Error opening crate.");
        if(card) card.classList.remove("opening");
        return;
      }

      lootReward.textContent = `You received ${resp.reward_amount} IZZA!`;
      if(card) card.classList.remove("opening");

      await loadProfile();

      alert("You now have enough IZZA to mint an IZZA Creature egg. Redirecting you...");
      window.location.href = "/creatures";
    } catch(e) {
      console.error(e);
      alert("Network error opening crate.");
      if(card) card.classList.remove("opening");
    }
  }

})();
</script>

</body>
</html>
