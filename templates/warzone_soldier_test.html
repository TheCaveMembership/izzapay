<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone test, soldier + neon marksman attach</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
    #hud{
      position:fixed;
      top:8px;
      left:10px;
      z-index:5;
      white-space:pre;
      max-width:96vw;
      pointer-events:none;

      color:#d7e7ff;
      font-size:12px;
      line-height:1.35;
      text-shadow:0 1px 0 rgba(0,0,0,.75);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="hud">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const hudEl  = document.getElementById("hud");

    function setHudText(t){ hudEl.textContent = t; }

    // ---------- keyboard tuning ----------
    let MODE = 1; // 1 pos, 2 rot, 3 scale
    let STEP = 0.01;

    // IMPORTANT: better default rotation for the neon marksman (aim forward-ish)
    // Upward gun usually means it needs a -90deg X fix.
    const TUNE = {
      pos:   new BABYLON.Vector3(0.02, 0.00, 0.06),
      rot:   new BABYLON.Vector3(-Math.PI * 0.5, Math.PI, 0.00),
      scale: 0.25
    };

    const DEFAULTS = {
      pos: TUNE.pos.clone(),
      rot: TUNE.rot.clone(),
      scale: TUNE.scale
    };

    function fmt3(v){
      return `${v.x.toFixed(5)}, ${v.y.toFixed(5)}, ${v.z.toFixed(5)}`;
    }

    function hud(){
      const modeName = MODE===1 ? "POS" : MODE===2 ? "ROT" : "SCALE";
      setHudText(
`Soldier + Neon Marksman (Laptop Keyboard Tuner)
Mode: ${MODE} (${modeName})   Step: ${STEP}

Keys:
  1 POS, 2 ROT, 3 SCALE
  Arrows = X/Y, Q/E = Z
  [ ] step down/up, Shift fast, Alt slow
  R reset, C copy

POS   : ${fmt3(TUNE.pos)}
ROT   : ${fmt3(TUNE.rot)}
SCALE : ${TUNE.scale.toFixed(5)}`
      );
    }

    async function copyToClipboard(text){
      try{ await navigator.clipboard.writeText(text); }
      catch(e){ window.prompt("Copy:", text); }
    }

    function stepForEvent(ev){
      if (ev.altKey) return Math.max(0.0005, STEP * 0.1);
      if (ev.shiftKey) return STEP * 5.0;
      return STEP;
    }

    let weaponRootGlobal = null;
    function applyTune(){
      if(!weaponRootGlobal) return;
      weaponRootGlobal.position.copyFrom(TUNE.pos);
      weaponRootGlobal.rotation.copyFrom(TUNE.rot);
      weaponRootGlobal.scaling.set(TUNE.scale, TUNE.scale, TUNE.scale);
    }

    window.addEventListener("keydown", async (ev) => {
      const k = ev.key;

      if (k === "1"){ MODE = 1; hud(); return; }
      if (k === "2"){ MODE = 2; hud(); return; }
      if (k === "3"){ MODE = 3; hud(); return; }

      if (k === "["){ STEP = Math.max(0.0005, STEP * 0.5); hud(); return; }
      if (k === "]"){ STEP = Math.min(0.5, STEP * 2.0); hud(); return; }

      if (k.toLowerCase() === "r"){
        TUNE.pos.copyFrom(DEFAULTS.pos);
        TUNE.rot.copyFrom(DEFAULTS.rot);
        TUNE.scale = DEFAULTS.scale;
        applyTune();
        hud();
        return;
      }

      if (k.toLowerCase() === "c"){
        const txt =
`// Neon Marksman tuning
const WEAPON_POS   = new BABYLON.Vector3(${TUNE.pos.x.toFixed(5)}, ${TUNE.pos.y.toFixed(5)}, ${TUNE.pos.z.toFixed(5)});
const WEAPON_ROT   = new BABYLON.Vector3(${TUNE.rot.x.toFixed(5)}, ${TUNE.rot.y.toFixed(5)}, ${TUNE.rot.z.toFixed(5)});
const WEAPON_SCALE = ${TUNE.scale.toFixed(5)};`;
        await copyToClipboard(txt);
        hud();
        return;
      }

      const s = stepForEvent(ev);

      const dx = (k === "ArrowRight") ? 1 : (k === "ArrowLeft") ? -1 : 0;
      const dy = (k === "ArrowUp") ? 1 : (k === "ArrowDown") ? -1 : 0;
      const dz = (k.toLowerCase() === "e") ? 1 : (k.toLowerCase() === "q") ? -1 : 0;

      if (!dx && !dy && !dz) return;

      if (MODE === 1){
        TUNE.pos.x += dx*s; TUNE.pos.y += dy*s; TUNE.pos.z += dz*s;
      } else if (MODE === 2){
        TUNE.rot.x += dx*s; TUNE.rot.y += dy*s; TUNE.rot.z += dz*s;
      } else {
        if (dy !== 0) TUNE.scale = Math.max(0.0001, TUNE.scale + dy*s);
      }

      applyTune();
      hud();
    }, { passive:true });

    // ---------- safer engine init (fixes “white screen on laptop”) ----------
    function makeEngine(){
      // Try safer flags first for older laptops (no preserveDrawingBuffer, no stencil)
      try{
        return new BABYLON.Engine(canvas, true, { stencil:false, preserveDrawingBuffer:false });
      }catch(e1){
        // Fallback: force WebGL1 by disabling WebGL2
        try{
          return new BABYLON.Engine(canvas, true, { stencil:false, preserveDrawingBuffer:false, disableWebGL2Support:true });
        }catch(e2){
          return null;
        }
      }
    }

    const engine = makeEngine();
    if (!engine){
      setHudText("FAILED: Babylon Engine could not start on this laptop (WebGL issue).");
      throw new Error("Engine init failed");
    }

    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);

    const camera = new BABYLON.ArcRotateCamera(
      "cam",
      Math.PI * 1.2,
      Math.PI / 2.35,
      10.0,
      new BABYLON.Vector3(0, 1.0, 0),
      scene
    );
    camera.attachControl(canvas, true);
    camera.panningSensibility = 0;
    camera.wheelPrecision = 60;

    const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
    hemi.intensity = 1.05;

    const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
    dir.intensity = 0.95;

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // ---------- helpers ----------
    async function fetchHeadOrGet(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
      }catch(e){}
      return fetch(url, { method:"GET", cache:"no-store" });
    }

    async function checkUrl(url){
      try{
        const r = await fetchHeadOrGet(url);
        return { ok: r.ok, status: r.status };
      }catch(e){
        return { ok:false, status:0 };
      }
    }

    function joinUrl(rootUrl, rel){
      if (!rel) return rootUrl;
      if (/^https?:\/\//i.test(rel)) return rel;
      if (rel.startsWith("/")) return rel;
      return rootUrl + rel;
    }

    async function preflightGltf(rootUrl, fileName){
      const gltfUrl = rootUrl + fileName;

      const gltfCheck = await checkUrl(gltfUrl);
      if (!gltfCheck.ok) return false;

      let gltf;
      try{
        const r = await fetch(gltfUrl, { cache:"no-store" });
        gltf = await r.json();
      }catch(e){
        return false;
      }

      const deps = [];
      if (Array.isArray(gltf.buffers)) gltf.buffers.forEach(b => b?.uri && deps.push(b.uri));
      if (Array.isArray(gltf.images))  gltf.images.forEach(img => img?.uri && deps.push(img.uri));

      for (const uri of deps){
        const url = joinUrl(rootUrl, uri);
        const st = await checkUrl(url);
        if (!st.ok) return false;
      }
      return true;
    }

    function getBounds(node){
      const b = node.getHierarchyBoundingVectors(true);
      return { min: b.min.clone(), max: b.max.clone() };
    }

    function normalizeToGroundAndHeight(root, targetHeight = 1.75){
      const bb1 = getBounds(root);
      const size1 = bb1.max.subtract(bb1.min);
      const h1 = Math.max(0.000001, size1.y);

      const s = targetHeight / h1;
      root.scaling = new BABYLON.Vector3(s, s, s);

      const bb2 = getBounds(root);
      root.position.y -= bb2.min.y;
      return s;
    }

    function frameCameraToRoot(root){
      const bb = getBounds(root);
      const size = bb.max.subtract(bb.min);
      const center = bb.min.add(size.scale(0.5));
      const maxDim = Math.max(size.x, size.y, size.z) || 1;

      camera.target = center;
      camera.radius = maxDim * 1.9;
      camera.lowerRadiusLimit = camera.radius * 0.5;
      camera.upperRadiusLimit = camera.radius * 4.0;
    }

    async function importModel(label, rootUrl, fileName){
      const result = await BABYLON.SceneLoader.ImportMeshAsync("", rootUrl, fileName, scene);
      const wrapper = new BABYLON.TransformNode(label + "Root", scene);

      const gltfRoot = result.meshes && result.meshes.length ? result.meshes[0] : null;
      if (gltfRoot) gltfRoot.parent = wrapper;
      else result.meshes.forEach(m => { m.parent = wrapper; });

      return { root: wrapper, result };
    }

    function findSkinnedMesh(importResult){
      const meshes = importResult?.meshes || [];
      return meshes.find(m => m && m.skeleton) || null;
    }

    function findBoneByNameOrIncludes(skeleton, want){
      if (!skeleton || !skeleton.bones) return null;
      const exact = skeleton.bones.find(b => (b.name || "") === want);
      if (exact) return exact;
      const wantLow = (want || "").toLowerCase();
      return skeleton.bones.find(b => ((b.name || "").toLowerCase().includes(wantLow))) || null;
    }

    // ---------- merge gun meshes into ONE mesh ----------
    function mergeWeaponMeshes(meshes){
      const geo = meshes.filter(m => m && m.getTotalVertices && m.getTotalVertices() > 0);
      if (geo.length <= 1) return geo[0] || null;

      // Keep submeshes/materials so attachments still render correctly
      const merged = BABYLON.Mesh.MergeMeshes(
        geo,
        true,   // disposeSource
        true,   // allow32BitsIndices
        undefined,
        false,  // subdivideWithSubMeshes
        true    // multiMultiMaterials
      );

      return merged || geo[0] || null;
    }

    // ---------- attach ----------
    function attachWeaponToRightHand(soldierImport, weaponImport){
      const skinned = findSkinnedMesh(soldierImport.result);
      const skeleton = skinned?.skeleton || (soldierImport.result?.skeletons?.[0] || null);
      if (!skinned || !skeleton) return false;

      const boneNameExact = "mixamorig:RightHand.209_221";
      let bone = findBoneByNameOrIncludes(skeleton, boneNameExact);
      if (!bone) bone = skeleton.bones.find(b => /RightHand/i.test(b.name || "")) || null;
      if (!bone) return false;

      const weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponRoot.attachToBone(bone, skinned);

      // collect meshes (exclude scene root)
      const meshes = (weaponImport.result?.meshes || []).filter(m => m && m !== weaponImport.result.meshes[0]);

      // IMPORTANT: ensure they are enabled (avoid weird “invisible on some browsers”)
      meshes.forEach(m => m.setEnabled(true));

      // parent under weaponRoot before merge (consistent transforms)
      meshes.forEach(m => { m.parent = weaponRoot; });

      // merge into one mesh, then parent merged to weaponRoot
      const merged = mergeWeaponMeshes(meshes);
      if (merged){
        merged.parent = weaponRoot;
      }

      // remove wrapper so nothing weird stays around
      try{ weaponImport.root.dispose(false, true); }catch(e){}

      weaponRootGlobal = weaponRoot;
      applyTune();
      hud();
      return true;
    }

    // ---------- Paths ----------
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    const WEAPON_ROOT  = "/assets/warzone3d/weapons/wz_neon_marksman/";
    const WEAPON_FILE  = "scene.gltf";

    (async () => {
      try{
        setHudText("Loading soldier + neon marksman...");

        const okSoldier = await preflightGltf(SOLDIER_ROOT, SOLDIER_FILE);
        if(!okSoldier){ setHudText("Stop: soldier preflight failed"); return; }

        const okWeapon = await preflightGltf(WEAPON_ROOT, WEAPON_FILE);
        if(!okWeapon){ setHudText("Stop: neon marksman preflight failed"); return; }

        const soldier = await importModel("soldier", SOLDIER_ROOT, SOLDIER_FILE);
        soldier.root.rotation.y = Math.PI;
        normalizeToGroundAndHeight(soldier.root, 1.75);

        const ag = soldier.result?.animationGroups || [];
        if (ag.length){
          ag.forEach(g => g.stop());
          ag[0].start(true);
          ag[0].speedRatio = 0.65;
        }

        const gun = await importModel("neon_marksman", WEAPON_ROOT, WEAPON_FILE);

        const attached = attachWeaponToRightHand(soldier, gun);
        if (!attached){ setHudText("Attach FAIL: RightHand bone not found"); return; }

        frameCameraToRoot(soldier.root);

        scene.onBeforeRenderObservable.clear();
        scene.onBeforeRenderObservable.add(() => {
          const dt = scene.getEngine().getDeltaTime() * 0.001;
          soldier.root.rotation.y += dt * 0.25;
        });

        hud();
      }catch(e){
        console.warn("Test failed", e);
        setHudText("FAILED: check console: " + (e?.message || e));
      }
    })();
  </script>
</body>
</html>
