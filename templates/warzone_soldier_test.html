<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.2,
        Math.PI / 2.4,
        10.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // Bright floor so we know camera is sane
      const floor = BABYLON.MeshBuilder.CreateGround("g", {width:30, height:30}, scene);
      const fMat = new BABYLON.StandardMaterial("fMat", scene);
      fMat.emissiveColor = new BABYLON.Color3(0,1,1);
      floor.material = fMat;
      floor.position.y = 0;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      const SOLDIER_URL = "/assets/warzone3d/pistol_soldier_m_idle.glb";
      const lastSlash = SOLDIER_URL.lastIndexOf("/");
      const rootUrl   = SOLDIER_URL.substring(0,lastSlash+1);
      const fileName  = SOLDIER_URL.substring(lastSlash+1);

      msgEl.textContent = "Loading soldier…";

      BABYLON.SceneLoader.ImportMesh(
        "",
        rootUrl,
        fileName,
        scene,
        function(meshes, ps, skeletons, animGroups){
          // Count meshes that actually have geometry
          const geoMeshes = meshes.filter(m =>
            m && m.getTotalVertices && m.getTotalVertices() > 0
          );

          const first = geoMeshes[0] || meshes[0] || null;
          const totalVerts = geoMeshes.reduce((sum,m)=>sum+m.getTotalVertices(),0);

          msgEl.textContent =
            "Soldier imported | meshes: " + meshes.length +
            " | geoMeshes: " + geoMeshes.length +
            " | totalVerts: " + totalVerts;

          // If there is at least one real mesh, force it into view
          if (first && first.getTotalVertices && first.getTotalVertices() > 0) {
            const root = new BABYLON.TransformNode("soldierRoot", scene);
            geoMeshes.forEach(m => {
              m.parent = root;
              m.alwaysSelectAsActiveMesh = true;
              m.showBoundingBox = true;
            });

            root.position = new BABYLON.Vector3(0, 1, 0);
            root.scaling  = new BABYLON.Vector3(1, 1, 1);

            // Big, safe camera so even if it’s off-center we should see something
            camera.target = root.position;
            camera.radius = 12;
            camera.lowerRadiusLimit = 6;
            camera.upperRadiusLimit = 20;

            scene.onBeforeRenderObservable.clear();
            scene.onBeforeRenderObservable.add(() => {
              root.rotation.y += scene.getEngine().getDeltaTime() * 0.0005;
            });

            if (animGroups && animGroups.length){
              animGroups.forEach(g => g.stop());
              animGroups[0].start(true);
            }
          } else {
            // No mesh with vertices – that means Pi Browser's loader
            // gave us only empty nodes.
            msgEl.textContent += " | WARNING: no geometry";
          }
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
