<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone test, soldier + pistol attach</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
      white-space:pre;
      text-shadow:0 1px 0 rgba(0,0,0,.6);
      max-width:96vw;
      pointer-events:none;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const msgEl  = document.getElementById("msg");
function log(line){ msgEl.textContent += "\n" + line; }

const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0,0,0,1);

const camera = new BABYLON.ArcRotateCamera(
  "cam",
  Math.PI * 1.2,
  Math.PI / 2.35,
  3.8,
  new BABYLON.Vector3(0, 1.0, 0),
  scene
);
camera.attachControl(canvas, true);
camera.panningSensibility = 0;
camera.wheelPrecision = 60;

const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 1.1;

const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
dir.intensity = 1.0;

engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());

// ---------- paths ----------
const SOLDIER_ROOT  = "/assets/warzone3d/soldier_gltf_3/";
const SOLDIER_FILE  = "scene.gltf";

const PISTOL_ROOT   = "/assets/warzone3d/weapons/wz_basic_pistol/";
const PISTOL_FILE   = "scene.gltf";

// ---------- helpers ----------
function getBounds(node){
  const b = node.getHierarchyBoundingVectors(true);
  return { min: b.min.clone(), max: b.max.clone() };
}
function normalizeToGroundAndHeight(root, targetHeight = 1.75){
  const bb1 = getBounds(root);
  const size1 = bb1.max.subtract(bb1.min);
  const h1 = Math.max(0.000001, size1.y);
  const s = targetHeight / h1;
  root.scaling = new BABYLON.Vector3(s, s, s);
  const bb2 = getBounds(root);
  root.position.y -= bb2.min.y;
  return s;
}
function frameCameraToRoot(root){
  const bb = getBounds(root);
  const size = bb.max.subtract(bb.min);
  const center = bb.min.add(size.scale(0.5));
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  camera.target = center;
  camera.radius = maxDim * 1.9;
  camera.lowerRadiusLimit = camera.radius * 0.5;
  camera.upperRadiusLimit = camera.radius * 4.0;
  log("Framed camera, size=" + maxDim.toFixed(3) + ", radius=" + camera.radius.toFixed(3));
}
function findBoneFuzzy(skel, includesText){
  if(!skel) return null;
  const t = includesText.toLowerCase();
  return skel.bones.find(b => (b.name || "").toLowerCase().includes(t)) || null;
}
function importAsWrapper(label, rootUrl, fileName){
  return BABYLON.SceneLoader.ImportMeshAsync("", rootUrl, fileName, scene).then(result => {
    const wrapper = new BABYLON.TransformNode(label + "Root", scene);

    const gltfRoot = result.meshes && result.meshes.length ? result.meshes[0] : null;
    if (gltfRoot){
      gltfRoot.parent = wrapper;
    } else {
      result.meshes.forEach(m => { m.parent = wrapper; });
    }

    return { wrapper, result };
  });
}

(async () => {
  try{
    msgEl.textContent = "War Zone test, soldier + pistol attach";
    log("Loading soldier, " + SOLDIER_ROOT + SOLDIER_FILE);

    // ---------- load soldier ----------
    const soldierPack = await importAsWrapper("soldier", SOLDIER_ROOT, SOLDIER_FILE);
    const soldierRoot = soldierPack.wrapper;
    soldierRoot.rotation.y = Math.PI;

    normalizeToGroundAndHeight(soldierRoot, 1.75);
    frameCameraToRoot(soldierRoot);

    const soldierResult = soldierPack.result;
    const soldierSkeleton = (soldierResult.skeletons && soldierResult.skeletons[0]) ? soldierResult.skeletons[0] : null;

    log("soldier imported OK, geoMeshes=" + soldierResult.meshes.filter(m=>m.getTotalVertices && m.getTotalVertices()>0).length
      + ", skeletons=" + (soldierResult.skeletons ? soldierResult.skeletons.length : 0)
      + ", animGroups=" + (soldierResult.animationGroups ? soldierResult.animationGroups.length : 0)
    );

    let soldierAnim = null;
    if (soldierResult.animationGroups && soldierResult.animationGroups.length){
      soldierAnim = soldierResult.animationGroups[0];
      soldierAnim.start(true);

      // OPTIONAL, slow the rocking a bit
      // soldierAnim.speedRatio = 0.85;

      log("Soldier anim started, " + (soldierAnim.name || "anim0"));
    } else {
      log("Soldier has no animationGroups");
    }

    // ---------- load pistol ----------
    log("Loading pistol, " + PISTOL_ROOT + PISTOL_FILE);
    const pistolPack = await importAsWrapper("pistol", PISTOL_ROOT, PISTOL_FILE);
    const pistolRoot = pistolPack.wrapper;

    log("pistol imported OK, geoMeshes=" + pistolPack.result.meshes.filter(m=>m.getTotalVertices && m.getTotalVertices()>0).length);

    // BIG FIX, scale pistol down
    // try 0.08, 0.10, 0.12, your screenshot sounds like 0.10 or smaller
    pistolRoot.scaling.setAll(0.10);

    // ---------- attach pistol to right hand bone ----------
    if(!soldierSkeleton){
      log("No soldier skeleton found, cannot attach to hand");
      return;
    }

    // Your log showed something like mixamorig:RightHand..., so use that
    const rightHand =
      findBoneFuzzy(soldierSkeleton, "righthand") ||
      findBoneFuzzy(soldierSkeleton, "right hand");

    if(!rightHand){
      log("Could not find RightHand bone, list bones in console if needed");
      console.log("Bones:", soldierSkeleton.bones.map(b=>b.name));
      return;
    }

    // Attach weapon wrapper to the bone
    pistolRoot.parent = soldierRoot; // keep in same space
    rightHand.linkTransformNode(pistolRoot);

    // After linking, apply local offsets so it sits in the grip correctly
    // These are guesses, you will tweak numbers on iPhone until perfect
    pistolRoot.position.set(0.03, 0.02, 0.12);      // forward in hand
    pistolRoot.rotationQuaternion = BABYLON.Quaternion.FromEulerAngles(
      Math.PI * 0.5,   // rotate to point forward
      0,
      Math.PI * 0.0
    );

    log("Weapon attached to bone, " + rightHand.name);
    log("Pistol scale=" + pistolRoot.scaling.x.toFixed(3) + ", pos=" + pistolRoot.position.toString());

    // ---------- runtime pose correction, flatten arms ----------
    const rArm     = findBoneFuzzy(soldierSkeleton, "rightarm");
    const rForeArm = findBoneFuzzy(soldierSkeleton, "rightforearm") || findBoneFuzzy(soldierSkeleton, "rightforearm");

    // mild corrections, keep small
    const aimArmQ     = BABYLON.Quaternion.FromEulerAngles(0.10, 0.00, -0.10);
    const aimForeArmQ = BABYLON.Quaternion.FromEulerAngles(0.15, 0.00, -0.05);

    scene.onBeforeRenderObservable.add(() => {
      // apply after animation updates, each frame
      if (rArm){
        const q = rArm.getRotationQuaternion(BABYLON.Space.LOCAL, soldierRoot) || BABYLON.Quaternion.Identity();
        rArm.setRotationQuaternion(q.multiply(aimArmQ), BABYLON.Space.LOCAL, soldierRoot);
      }
      if (rForeArm){
        const q = rForeArm.getRotationQuaternion(BABYLON.Space.LOCAL, soldierRoot) || BABYLON.Quaternion.Identity();
        rForeArm.setRotationQuaternion(q.multiply(aimForeArmQ), BABYLON.Space.LOCAL, soldierRoot);
      }
    });

    log("Done, soldier loaded, pistol loaded, attached, scaled, pose correction enabled");
  }catch(e){
    console.warn("Test failed", e);
    log("FAILED, check console");
  }
})();
</script>
</body>
</html>
