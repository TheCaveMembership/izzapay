<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      // Camera looking at the origin by default
      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.3,
        Math.PI / 2.4,
        4.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // Debug cube so we always see *something*
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:1 }, scene);
      debugBox.position.y = 1;
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      // NEW: robust framing that avoids Infinity / NaN on Pi Browser
      function frameCameraFromMeshes(meshes){
        try{
          if (!meshes || !meshes.length){
            msgEl.textContent = "Soldier imported but no meshes?";
            return;
          }

          let min = new BABYLON.Vector3(
            Number.POSITIVE_INFINITY,
            Number.POSITIVE_INFINITY,
            Number.POSITIVE_INFINITY
          );
          let max = new BABYLON.Vector3(
            Number.NEGATIVE_INFINITY,
            Number.NEGATIVE_INFINITY,
            Number.NEGATIVE_INFINITY
          );

          let any = false;

          for (const m of meshes){
            if (!m || !m.getBoundingInfo || m.getTotalVertices() === 0) continue;

            // ensure world matrix and bounds are up to date
            m.computeWorldMatrix(true);
            const bi   = m.getBoundingInfo();
            const bmin = bi.boundingBox.minimumWorld;
            const bmax = bi.boundingBox.maximumWorld;

            if (!isFinite(bmin.x) || !isFinite(bmin.y) || !isFinite(bmin.z)) continue;
            if (!isFinite(bmax.x) || !isFinite(bmax.y) || !isFinite(bmax.z)) continue;

            min = BABYLON.Vector3.Minimize(min, bmin);
            max = BABYLON.Vector3.Maximize(max, bmax);
            any = true;
          }

          if (!any){
            msgEl.textContent = "Soldier imported but bounds invalid";
            return;
          }

          const size = max.subtract(min);
          if (!isFinite(size.x) || !isFinite(size.y) || !isFinite(size.z)){
            msgEl.textContent = "Soldier bounds non-finite";
            return;
          }

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const center = min.add(size.scale(0.5));
          const radius = maxDim * 1.8;

          msgEl.textContent =
            "Soldier imported OK | size: " +
            maxDim.toFixed(3) +
            " | radius: " +
            radius.toFixed(3);

          camera.target = center;
          camera.radius = radius;
          camera.lowerRadiusLimit = radius * 0.8;
          camera.upperRadiusLimit = radius * 2.2;
        }catch(e){
          console.warn("frameCameraFromMeshes failed", e);
          msgEl.textContent = "Soldier imported, camera frame failed";
          // very safe fallback so we still see *something*
          camera.target = new BABYLON.Vector3(0,1,0);
          camera.radius = 4.0;
          camera.lowerRadiusLimit = 3.0;
          camera.upperRadiusLimit = 6.0;
        }
      }

      const SOLDIER_URL = "/assets/warzone3d/pistol_soldier_m_idle.glb";

      const lastSlash = SOLDIER_URL.lastIndexOf("/");
      const rootUrl   = SOLDIER_URL.substring(0,lastSlash+1);
      const fileName  = SOLDIER_URL.substring(lastSlash+1);

      msgEl.textContent = "Loading soldier…";

      BABYLON.SceneLoader.ImportMesh(
        "",
        rootUrl,
        fileName,
        scene,
        function(meshes, ps, skeletons, animGroups){
          // Keep the cube so we can see the camera hasn't broken
          debugBox.position.x = -3;
          debugBox.position.y = 0.5;

          const root = new BABYLON.TransformNode("soldierRoot", scene);
          meshes.forEach(m => {
            m.parent = root;
          });

          // Use robust framing so Pi Browser can't break it
          frameCameraFromMeshes(meshes);

          // Slow spin so it's obvious when it appears
          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            root.rotation.y += scene.getEngine().getDeltaTime() * 0.0005;
            debugBox.rotation.y += scene.getEngine().getDeltaTime() * 0.001;
          });

          if (animGroups && animGroups.length){
            animGroups.forEach(g => g.stop());
            animGroups[0].start(true);
          }
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
