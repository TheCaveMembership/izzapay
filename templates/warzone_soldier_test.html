<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      // Fixed camera – no fancy auto-framing (Pi Browser safe)
      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.2,        // alpha
        Math.PI / 2.4,        // beta
        6.0,                  // radius
        new BABYLON.Vector3(0,1.2,0), // target
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // Tiny debug cube so we know camera is sane
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:0.5 }, scene);
      debugBox.position = new BABYLON.Vector3(-2, 0.5, 0);
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      const SOLDIER_URL = "/assets/warzone3d/pistol_soldier_m_idle.glb";
      const lastSlash = SOLDIER_URL.lastIndexOf("/");
      const rootUrl   = SOLDIER_URL.substring(0,lastSlash+1);
      const fileName  = SOLDIER_URL.substring(lastSlash+1);

      msgEl.textContent = "Loading soldier…";

      BABYLON.SceneLoader.ImportMesh(
        "",
        rootUrl,
        fileName,
        scene,
        function(meshes, ps, skeletons, animGroups){
          // Root node for soldier
          const root = new BABYLON.TransformNode("soldierRoot", scene);

          meshes.forEach(m => {
            m.parent = root;
          });

          // Put root roughly in front of camera and spin it
          root.position = new BABYLON.Vector3(0, 0, 0);

          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            const dt = scene.getEngine().getDeltaTime() * 0.001;
            root.rotation.y += dt * 0.5;
            debugBox.rotation.y += dt;
          });

          if (animGroups && animGroups.length){
            animGroups.forEach(g => g.stop());
            animGroups[0].start(true);
          }

          msgEl.textContent = "Soldier imported OK | meshes: " + meshes.length;
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
