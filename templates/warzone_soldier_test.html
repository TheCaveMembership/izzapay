<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
      white-space:pre;
      text-shadow:0 1px 0 rgba(0,0,0,.6);
      max-width:96vw;
      pointer-events:none;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      // Camera
      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.25,
        Math.PI / 2.45,
        18.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;
      camera.wheelPrecision = 60;

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.1;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
      dir.intensity = 1.0;

      // Debug cube
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:0.6 }, scene);
      debugBox.position.set(0, 0.6, -6);
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      function log(line){
        msgEl.textContent += "\n" + line;
      }

      async function fetchHeadOrGet(url){
        try{
          const r = await fetch(url, { method:"HEAD", cache:"no-store" });
          if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
        }catch(e){}
        return fetch(url, { method:"GET", cache:"no-store" });
      }

      async function checkUrl(url){
        try{
          const r = await fetchHeadOrGet(url);
          const ct = (r.headers && r.headers.get) ? (r.headers.get("content-type") || "") : "";
          return { ok: r.ok, status: r.status, ct };
        }catch(e){
          return { ok:false, status:0, ct:String(e) };
        }
      }

      function joinUrl(rootUrl, rel){
        if (!rel) return rootUrl;
        if (/^https?:\/\//i.test(rel)) return rel;
        if (rel.startsWith("/")) return rel;
        return rootUrl + rel;
      }

      async function preflightGltf(label, rootUrl, fileName){
        const gltfUrl = rootUrl + fileName;
        log("Preflight " + label + " gltf, " + gltfUrl);

        const gltfCheck = await checkUrl(gltfUrl);
        if (!gltfCheck.ok){
          log("Preflight FAIL " + label + ", gltf missing, " + gltfCheck.status);
          return null;
        }

        let gltf;
        try{
          const r = await fetch(gltfUrl, { cache:"no-store" });
          gltf = await r.json();
        }catch(e){
          log("Preflight FAIL " + label + ", gltf JSON parse error, " + e);
          return null;
        }

        const deps = [];
        if (Array.isArray(gltf.buffers)){
          gltf.buffers.forEach(b => { if (b && b.uri) deps.push({ kind:"buffer", uri:b.uri }); });
        }
        if (Array.isArray(gltf.images)){
          gltf.images.forEach(img => { if (img && img.uri) deps.push({ kind:"image", uri:img.uri }); });
        }

        for (const d of deps){
          const url = joinUrl(rootUrl, d.uri);
          const st = await checkUrl(url);
          if (!st.ok){
            log("Preflight FAIL " + label + ", missing " + d.kind + ", " + url + ", status " + st.status);
            return null;
          }
          log("Preflight OK " + label + ", " + d.kind + ", " + d.uri + ", status " + st.status + ", type " + (st.ct || "unknown"));
        }

        log("Preflight OK " + label + ", deps=" + deps.length);
        return gltf;
      }

      function getRootBounds(root){
        const b = root.getHierarchyBoundingVectors(true);
        return { min: b.min.clone(), max: b.max.clone() };
      }

      // Put feet on ground, normalize height, then offset side by side
      function placeAndNormalize(root, targetHeight, xOffset){
        const bb0 = getRootBounds(root);
        const size0 = bb0.max.subtract(bb0.min);
        const h0 = Math.max(0.00001, size0.y);

        // scale to target height
        const s = targetHeight / h0;
        root.scaling.set(s, s, s);

        // recompute after scaling
        const bb = getRootBounds(root);
        const size = bb.max.subtract(bb.min);

        // move so bottom touches y=0
        const yFix = -bb.min.y;

        // center in Z a bit (helps when one model is offset forward)
        const zCenter = -(bb.min.z + size.z * 0.5);

        root.position.x = xOffset;
        root.position.y += yFix;
        root.position.z += zCenter;

        // face camera consistently
        root.rotation.y = Math.PI;

        return { scale:s, height:size.y };
      }

      function frameCameraToRoots(roots){
        try{
          let min = new BABYLON.Vector3( 1e9, 1e9, 1e9);
          let max = new BABYLON.Vector3(-1e9,-1e9,-1e9);
          let any = false;

          for(const r of roots){
            if(!r) continue;
            const bb = getRootBounds(r);
            if(!isFinite(bb.min.x) || !isFinite(bb.max.x)) continue;
            min = BABYLON.Vector3.Minimize(min, bb.min);
            max = BABYLON.Vector3.Maximize(max, bb.max);
            any = true;
          }

          if(!any){
            log("Camera frame failed, bounds invalid, fallback");
            camera.target = new BABYLON.Vector3(0,1,0);
            camera.radius = 18;
            return;
          }

          const size = max.subtract(min);
          const center = min.add(size.scale(0.5));
          const maxDim = Math.max(size.x, size.y, size.z) || 1;

          const radius = maxDim * 2.6; // slightly less insane than before
          camera.target = center;
          camera.radius = radius;
          camera.lowerRadiusLimit = radius * 0.6;
          camera.upperRadiusLimit = radius * 3.5;

          log("Framed camera, size=" + maxDim.toFixed(3) + ", radius=" + radius.toFixed(3));
        }catch(e){
          console.warn("frameCameraToRoots failed", e);
          log("Camera frame threw, fallback");
          camera.target = new BABYLON.Vector3(0,1,0);
          camera.radius = 18;
        }
      }

      function importSoldier(label, rootUrl, fileName, xOffset){
        return new Promise((resolve, reject) => {
          log("Loading " + label + " | " + rootUrl + fileName);

          BABYLON.SceneLoader.ImportMesh(
            "",
            rootUrl,
            fileName,
            scene,
            function(meshes, ps, skeletons, animGroups){
              const root = new BABYLON.TransformNode(label + "Root", scene);

              const geoMeshes = meshes.filter(m =>
                m && m.getTotalVertices && m.getTotalVertices() > 0
              );
              geoMeshes.forEach(m => { m.parent = root; });

              if (!geoMeshes.length){
                log(label + " imported, but no geometry meshes");
              } else {
                log(label + " imported OK, geoMeshes=" + geoMeshes.length);

                // Normalize both models to same height and place on ground
                const norm = placeAndNormalize(root, 2.2, xOffset);
                log(label + " normalized, scale=" + norm.scale.toFixed(5));

                if (animGroups && animGroups.length){
                  animGroups.forEach(g => g.stop());
                  animGroups[0].start(true);
                  log(label + " anim started, " + (animGroups[0].name || "anim0"));
                } else {
                  log(label + " no animGroups");
                }
              }

              resolve({ root, animGroups });
            },
            null,
            function(scene, message, exception){
              console.error(label + " ImportMesh error:", message, exception);
              log(label + " import error, " + message);
              reject(new Error(message || "ImportMesh error"));
            }
          );
        });
      }

      const BASIC_ROOT  = "/assets/warzone3d/soldier_gltf_3/";
      const NEON_ROOT   = "/assets/warzone3d/skins/wz_neon_edge/";
      const FILE_NAME   = "scene.gltf";

      (async () => {
        try{
          msgEl.textContent = "Booting Babylon…";

          const basicOk = await preflightGltf("basic", BASIC_ROOT, FILE_NAME);
          const neonOk  = await preflightGltf("neon",  NEON_ROOT,  FILE_NAME);

          const roots = [];
          let basic = null;
          let neon  = null;

          // Wider separation so they never overlap
          const X_SPREAD = 3.2;

          if (basicOk){
            basic = await importSoldier("basic", BASIC_ROOT, FILE_NAME, -X_SPREAD);
            roots.push(basic.root);
          } else {
            log("BASIC blocked by preflight, not importing");
          }

          if (neonOk){
            neon  = await importSoldier("neon",  NEON_ROOT,  FILE_NAME,  X_SPREAD);
            roots.push(neon.root);
          } else {
            log("NEON blocked by preflight, not importing");
          }

          frameCameraToRoots(roots);

          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            const dt = scene.getEngine().getDeltaTime() * 0.001;
            if (basic && basic.root) basic.root.rotation.y += dt * 0.35;
            if (neon  && neon.root)  neon.root.rotation.y  += dt * 0.35;
            debugBox.rotation.y += dt;
          });

          log("Done");
        }catch(e){
          console.warn("Test loader failed", e);
          log("FAILED, check console log");
        }
      })();
    }
  </script>
</body>
</html>
