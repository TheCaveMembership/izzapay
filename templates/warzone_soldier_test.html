<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
      white-space:pre;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.25,
        Math.PI / 2.5,
        10.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.1;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
      dir.intensity = 1.0;

      // Debug cube so we always see something
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:0.6 }, scene);
      debugBox.position.set(0, 0.6, 0);
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      function getRootBounds(root){
        const b = root.getHierarchyBoundingVectors(true);
        return { min: b.min.clone(), max: b.max.clone() };
      }

      function frameCameraToRoots(roots){
        try{
          let min = new BABYLON.Vector3( 1e9, 1e9, 1e9);
          let max = new BABYLON.Vector3(-1e9,-1e9,-1e9);
          let any = false;

          for(const r of roots){
            if(!r) continue;
            const bb = getRootBounds(r);
            if(!isFinite(bb.min.x) || !isFinite(bb.max.x)) continue;
            min = BABYLON.Vector3.Minimize(min, bb.min);
            max = BABYLON.Vector3.Maximize(max, bb.max);
            any = true;
          }

          if(!any){
            msgEl.textContent += "\nCamera frame failed, bounds invalid";
            camera.target = new BABYLON.Vector3(0,1,0);
            camera.radius = 10;
            return;
          }

          const size = max.subtract(min);
          const center = min.add(size.scale(0.5));
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const radius = maxDim * 1.9;

          camera.target = center;
          camera.radius = radius;
          camera.lowerRadiusLimit = radius * 0.8;
          camera.upperRadiusLimit = radius * 2.5;

          msgEl.textContent += "\nFramed camera, size=" + maxDim.toFixed(3) + ", radius=" + radius.toFixed(3);
        }catch(e){
          console.warn("frameCameraToRoots failed", e);
          msgEl.textContent += "\nCamera frame threw, fallback";
          camera.target = new BABYLON.Vector3(0,1,0);
          camera.radius = 10;
        }
      }

      function importSoldier(label, rootUrl, fileName, xOffset){
        return new Promise((resolve, reject) => {
          msgEl.textContent += "\nLoading " + label + " | " + rootUrl + fileName;

          BABYLON.SceneLoader.ImportMesh(
            "",
            rootUrl,
            fileName,
            scene,
            function(meshes, ps, skeletons, animGroups){
              const root = new BABYLON.TransformNode(label + "Root", scene);

              const geoMeshes = meshes.filter(m =>
                m && m.getTotalVertices && m.getTotalVertices() > 0
              );

              geoMeshes.forEach(m => { m.parent = root; });

              root.position.x = xOffset;
              root.rotation.y = Math.PI; // face camera

              if (!geoMeshes.length){
                msgEl.textContent += "\n" + label + " imported, but no geometry meshes";
              } else {
                msgEl.textContent += "\n" + label + " imported OK, geoMeshes=" + geoMeshes.length;

                if (animGroups && animGroups.length){
                  animGroups.forEach(g => g.stop());
                  animGroups[0].start(true);
                  msgEl.textContent += "\n" + label + " anim started, " + animGroups[0].name;
                }
              }

              resolve({ root, animGroups });
            },
            null,
            function(scene, message, exception){
              console.error(label + " ImportMesh error:", message, exception);
              msgEl.textContent += "\n" + label + " import error, " + message;
              reject(new Error(message || "ImportMesh error"));
            }
          );
        });
      }

      // Paths
      const BASIC_ROOT  = "/assets/warzone3d/soldier_gltf_3/";
      const NEON_ROOT   = "/assets/warzone3d/skins/wz_neon_edge/";
      const FILE_NAME   = "scene.gltf";

      (async () => {
        try{
          // Move debug cube out of the way
          debugBox.position.set(0, 0.3, -3);

          const basic = await importSoldier("basic", BASIC_ROOT, FILE_NAME, -1.2);
          const neon  = await importSoldier("neon",  NEON_ROOT,  FILE_NAME,  1.2);

          frameCameraToRoots([basic.root, neon.root]);

          // Slow spin both so we can see them clearly
          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            const dt = scene.getEngine().getDeltaTime() * 0.001;
            basic.root.rotation.y += dt * 0.35;
            neon.root.rotation.y  += dt * 0.35;
            debugBox.rotation.y   += dt;
          });

          msgEl.textContent += "\nDone";
        }catch(e){
          console.warn("Test loader failed", e);
          msgEl.textContent += "\nFAILED, check console log";
        }
      })();
    }
  </script>
</body>
</html>
