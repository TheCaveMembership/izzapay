<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Loading soldier…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.3,
        Math.PI / 2.4,
        4.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // Debug cube so we always see *something*
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:1 }, scene);
      debugBox.position.y = 1;
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      function fitAndScaleToView(root){
        try{
          const bounds = root.getHierarchyBoundingVectors(true);
          const min = bounds.min;
          const max = bounds.max;
          const size = max.subtract(min);
          const center = min.add(size.scale(0.5));

          const maxDim = Math.max(size.x, size.y, size.z);
          const targetSize = 2.0; // how tall / wide we want it in world units
          const scale = maxDim > 0 ? (targetSize / maxDim) : 1.0;

          root.scaling = new BABYLON.Vector3(scale, scale, scale);
          root.position = center.scale(-scale); // move center to origin

          camera.target = new BABYLON.Vector3(0, 0.9, 0);
          camera.radius = 3.0;
          camera.lowerRadiusLimit = 2.5;
          camera.upperRadiusLimit = 3.5;
        }catch(e){
          console.warn("fitAndScaleToView failed", e);
        }
      }

      const SOLDIER_URL = "/assets/warzone3d/pistol_soldier_m_idle.glb";

      const lastSlash = SOLDIER_URL.lastIndexOf("/");
      const rootUrl   = SOLDIER_URL.substring(0,lastSlash+1);
      const fileName  = SOLDIER_URL.substring(lastSlash+1);

      BABYLON.SceneLoader.ImportMesh(
        "",
        rootUrl,
        fileName,
        scene,
        function(meshes, ps, skeletons, animGroups){
          msgEl.textContent = "Soldier imported OK";

          // remove the debug cube now that we have the real model
          debugBox.dispose();

          const root = new BABYLON.TransformNode("soldierRoot", scene);
          meshes.forEach(m => {
            m.parent = root;
          });

          fitAndScaleToView(root);

          // simple slow spin so it’s obvious
          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            root.rotation.y += scene.getEngine().getDeltaTime() * 0.0005;
          });

          if (animGroups && animGroups.length){
            animGroups.forEach(g => g.stop());
            animGroups[0].start(true);
          }
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
