<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test (Three.js)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
      pointer-events:none;
    }
    #gl{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>

  <!-- Three.js core (same version you use for IZZA DASH) -->
  <script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
  <!-- GLTF / GLB loader -->
  <script src="https://unpkg.com/three@0.157.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
  <div id="msg">Booting Three.js…</div>
  <canvas id="gl"></canvas>

  <script>
    const msgEl = document.getElementById('msg');
    const canvas = document.getElementById('gl');

    if (!window.THREE) {
      msgEl.textContent = 'Three.js not available';
    } else {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 1.6, 6);

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight, false);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 1.1);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(3, 6, 5);
      scene.add(dir);

      // Debug cube so we always know render is working
      const debugGeom = new THREE.BoxGeometry(0.6,0.6,0.6);
      const debugMat  = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x008080 });
      const debugBox  = new THREE.Mesh(debugGeom, debugMat);
      debugBox.position.set(-2, 0.5, 0);
      scene.add(debugBox);

      let soldierRoot = null;

      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      }
      window.addEventListener('resize', onResize, { passive: true });

      function animate() {
        requestAnimationFrame(animate);
        const t = performance.now() * 0.001;

        if (soldierRoot) soldierRoot.rotation.y = t * 0.3;
        debugBox.rotation.y = t * 0.8;

        renderer.render(scene, camera);
      }
      animate();

      // ---- Soldier load (same file path as before) ----
      const SOLDIER_URL = '/assets/warzone3d/pistol_soldier_m_idle.glb';

      msgEl.textContent = 'Loading soldier…';

      const loader = new THREE.GLTFLoader();
      loader.load(
        SOLDIER_URL,
        (gltf) => {
          soldierRoot = gltf.scene || gltf.scenes[0];
          if (!soldierRoot) {
            msgEl.textContent = 'Loaded, but no scene in GLB';
            return;
          }

          scene.add(soldierRoot);

          // Frame camera around the soldier
          const box = new THREE.Box3().setFromObject(soldierRoot);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const radius = maxDim * 1.8;

          msgEl.textContent =
            'Soldier imported OK | size: ' +
            maxDim.toFixed(3) +
            ' | radius: ' +
            radius.toFixed(3);

          camera.position.set(center.x, center.y + maxDim * 0.2, center.z + radius);
          camera.lookAt(center);

          // Optional: play first animation if it exists
          if (gltf.animations && gltf.animations.length) {
            const mixer = new THREE.AnimationMixer(soldierRoot);
            mixer.clipAction(gltf.animations[0]).play();

            // simple mixer update
            let lastTime = performance.now();
            function updateMixer() {
              const now = performance.now();
              const dt = (now - lastTime) / 1000;
              lastTime = now;
              mixer.update(dt);
              requestAnimationFrame(updateMixer);
            }
            updateMixer();
          }
        },
        undefined,
        (err) => {
          console.error('GLB load error', err);
          msgEl.textContent = 'Import error: ' + (err && err.message ? err.message : 'unknown');
        }
      );
    }
  </script>
</body>
</html>
