<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test, base vs neon edge override</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
      white-space:pre;
      text-shadow:0 1px 0 rgba(0,0,0,.6);
      max-width:96vw;
      pointer-events:none;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    function log(line){
      msgEl.textContent += "\n" + line;
    }

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      // Camera starts reasonably zoomed out, then we frame after load
      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.2,
        Math.PI / 2.35,
        25.0,
        new BABYLON.Vector3(0, 1.0, 0),
        scene
      );
      camera.attachControl(canvas, true);
      camera.panningSensibility = 0;
      camera.wheelPrecision = 60;

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.1;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
      dir.intensity = 1.0;

      // Debug cube
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:0.6 }, scene);
      debugBox.position.set(0, 0.3, -6);
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      async function fetchHeadOrGet(url){
        try{
          const r = await fetch(url, { method:"HEAD", cache:"no-store" });
          if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
        }catch(e){}
        return fetch(url, { method:"GET", cache:"no-store" });
      }

      async function checkUrl(url){
        try{
          const r = await fetchHeadOrGet(url);
          const ct = (r.headers && r.headers.get) ? (r.headers.get("content-type") || "") : "";
          return { ok: r.ok, status: r.status, ct };
        }catch(e){
          return { ok:false, status:0, ct:String(e) };
        }
      }

      function joinUrl(rootUrl, rel){
        if (!rel) return rootUrl;
        if (/^https?:\/\//i.test(rel)) return rel;
        if (rel.startsWith("/")) return rel;
        return rootUrl + rel;
      }

      async function preflightGltf(label, rootUrl, fileName){
        const gltfUrl = rootUrl + fileName;
        log("Preflight " + label + " gltf, " + gltfUrl);

        const gltfCheck = await checkUrl(gltfUrl);
        if (!gltfCheck.ok){
          log("Preflight FAIL " + label + ", gltf missing, " + gltfCheck.status);
          return null;
        }

        let gltf;
        try{
          const r = await fetch(gltfUrl, { cache:"no-store" });
          gltf = await r.json();
        }catch(e){
          log("Preflight FAIL " + label + ", gltf JSON parse error, " + e);
          return null;
        }

        const deps = [];
        if (Array.isArray(gltf.buffers)){
          gltf.buffers.forEach(b => b?.uri && deps.push({ kind:"buffer", uri:b.uri }));
        }
        if (Array.isArray(gltf.images)){
          gltf.images.forEach(img => img?.uri && deps.push({ kind:"image", uri:img.uri }));
        }

        for (const d of deps){
          const url = joinUrl(rootUrl, d.uri);
          const st = await checkUrl(url);
          if (!st.ok){
            log("Preflight FAIL " + label + ", missing " + d.kind + ", " + url + ", status " + st.status);
            return null;
          }
          log("Preflight OK " + label + ", " + d.kind + ", " + d.uri + ", status " + st.status + ", type " + (st.ct || "unknown"));
        }

        log("Preflight OK " + label + ", deps=" + deps.length);
        return gltf;
      }

      async function preflightThemeFiles(label, folderUrl, files){
        log("Preflight " + label + " theme folder, " + folderUrl);
        for (const f of files){
          const url = folderUrl + f;
          const st = await checkUrl(url);
          if(!st.ok){
            log("Preflight FAIL " + label + ", missing theme file, " + f + ", status " + st.status);
            return false;
          }
          log("Preflight OK " + label + ", theme file, " + f + ", status " + st.status + ", type " + (st.ct || "unknown"));
        }
        log("Preflight OK " + label + ", theme files=" + files.length);
        return true;
      }

      function getBounds(node){
        const b = node.getHierarchyBoundingVectors(true);
        return { min: b.min.clone(), max: b.max.clone() };
      }

      function normalizeToGroundAndHeight(root, targetHeight = 1.75){
        const bb1 = getBounds(root);
        const size1 = bb1.max.subtract(bb1.min);
        const h1 = Math.max(0.000001, size1.y);

        const s = targetHeight / h1;
        root.scaling = new BABYLON.Vector3(s, s, s);

        const bb2 = getBounds(root);
        const minY = bb2.min.y;
        root.position.y -= minY;

        return { scale: s, bounds: bb2 };
      }

      function frameCameraToRoots(roots){
        let min = new BABYLON.Vector3( 1e9, 1e9, 1e9);
        let max = new BABYLON.Vector3(-1e9,-1e9,-1e9);
        let any = false;

        for (const r of roots){
          if(!r) continue;
          const bb = getBounds(r);
          if(!isFinite(bb.min.x) || !isFinite(bb.max.x)) continue;
          min = BABYLON.Vector3.Minimize(min, bb.min);
          max = BABYLON.Vector3.Maximize(max, bb.max);
          any = true;
        }

        if(!any){
          log("Camera frame failed, bounds invalid, fallback");
          camera.target = new BABYLON.Vector3(0, 1, 0);
          camera.radius = 25;
          return;
        }

        const size = max.subtract(min);
        const center = min.add(size.scale(0.5));
        const maxDim = Math.max(size.x, size.y, size.z) || 1;

        camera.target = center;
        camera.radius = maxDim * 1.9;
        camera.lowerRadiusLimit = camera.radius * 0.5;
        camera.upperRadiusLimit = camera.radius * 4.0;

        log("Framed camera, size=" + maxDim.toFixed(3) + ", radius=" + camera.radius.toFixed(3));
      }

      function fileFromAnyUrl(u){
        try{
          const s = (u || "").toString();
          const q = s.split("?")[0];
          const parts = q.split("/");
          return parts[parts.length - 1] || "";
        }catch(e){
          return "";
        }
      }

      function overrideTextureOnMaterial(mat, texProp, baseTexturesUrl, themeFolder, allowedFiles){
        try{
          const tex = mat && mat[texProp];
          if(!tex) return false;

          const urlOrName = (tex.url || tex.name || "");
          const file = fileFromAnyUrl(urlOrName);
          if(!file) return false;

          if(!allowedFiles.includes(file)) return false;

          const newUrl = `${baseTexturesUrl}${themeFolder}/${file}`;
          const newTex = new BABYLON.Texture(newUrl, scene, true, false);
          newTex.hasAlpha = tex.hasAlpha || false;
          newTex.level = (typeof tex.level === "number") ? tex.level : 1.0;

          mat[texProp] = newTex;
          return true;
        }catch(e){
          return false;
        }
      }

      function applyThemeOverridesToImportedMeshes(importResult, baseTexturesUrl, themeFolder, allowedFiles){
        const meshes = (importResult && importResult.meshes) ? importResult.meshes : [];
        let touched = 0;

        meshes.forEach(m => {
          if(!m || !m.material) return;
          const mat = m.material;

          // glTF typically uses PBRMaterial (albedoTexture), but we safely try both
          const t1 = overrideTextureOnMaterial(mat, "albedoTexture",  baseTexturesUrl, themeFolder, allowedFiles);
          const t2 = overrideTextureOnMaterial(mat, "diffuseTexture", baseTexturesUrl, themeFolder, allowedFiles);

          if (t1 || t2) touched++;
        });

        log("Theme apply, folder=" + themeFolder + ", materials touched=" + touched);
      }

      async function importSoldier(label, rootUrl, fileName){
        log("Loading " + label + " | " + rootUrl + fileName);

        const result = await BABYLON.SceneLoader.ImportMeshAsync(
          "",
          rootUrl,
          fileName,
          scene
        );

        const wrapper = new BABYLON.TransformNode(label + "Root", scene);

        const gltfRoot = result.meshes && result.meshes.length ? result.meshes[0] : null;
        if (gltfRoot){
          gltfRoot.parent = wrapper;
        } else {
          result.meshes.forEach(m => { m.parent = wrapper; });
        }

        wrapper.rotation.y = Math.PI;

        const geoMeshes = result.meshes.filter(m => m && m.getTotalVertices && m.getTotalVertices() > 0);
        log(label + " imported OK, geoMeshes=" + geoMeshes.length);

        if (result.animationGroups && result.animationGroups.length){
          result.animationGroups.forEach(g => g.stop());
          result.animationGroups[0].start(true);
          log(label + " anim started, " + (result.animationGroups[0].name || "anim0"));
        } else {
          log(label + " no animGroups");
        }

        return { root: wrapper, result };
      }

      // ---------- Paths (NEW METHOD, SAME BASE SOLDIER) ----------
      const SOLDIER_ROOT   = "/assets/warzone3d/soldier_gltf_3/";
      const SOLDIER_GLTFF  = "scene.gltf";

      // Theme folder lives under the SAME textures base
      const TEXTURES_BASE  = "/assets/warzone3d/soldier_gltf_3/textures/";
      const NEON_FOLDER    = "neon_edge/";

      // ONLY the 4 files you showed, nothing else touched
      const OVERRIDE_FILES = [
        "material_8_diffuse.png",
        "material_9_diffuse.png",
        "material_10_diffuse.png",
        "material_11_diffuse.png"
      ];
      // ----------------------------------------------------------

      (async () => {
        try{
          msgEl.textContent = "Booting Babylon…";

          // Base gltf must exist
          const ok = await preflightGltf("base-soldier", SOLDIER_ROOT, SOLDIER_GLTFF);
          if(!ok){
            log("Base soldier failed preflight, stop");
            return;
          }

          // Neon theme files must exist
          const neonOk = await preflightThemeFiles("neon_edge", TEXTURES_BASE + "neon_edge/", OVERRIDE_FILES);
          if(!neonOk){
            log("Neon theme files missing, stop");
            return;
          }

          const roots = [];

          // Load BASE (left)
          const base = await importSoldier("base", SOLDIER_ROOT, SOLDIER_GLTFF);
          normalizeToGroundAndHeight(base.root, 1.75);
          base.root.position.x = -1.2;
          roots.push(base.root);

          // Load NEON (right), same model, but apply texture overrides
          const neon = await importSoldier("neon_edge", SOLDIER_ROOT, SOLDIER_GLTFF);

          // Apply overrides on the imported meshes BEFORE normalize, does not matter but keeps it consistent
          applyThemeOverridesToImportedMeshes(neon.result, TEXTURES_BASE, "neon_edge", OVERRIDE_FILES);

          normalizeToGroundAndHeight(neon.root, 1.75);
          neon.root.position.x = 1.2;
          roots.push(neon.root);

          frameCameraToRoots(roots);

          // Slow spin both
          scene.onBeforeRenderObservable.clear();
          scene.onBeforeRenderObservable.add(() => {
            const dt = scene.getEngine().getDeltaTime() * 0.001;
            if (base?.root) base.root.rotation.y += dt * 0.35;
            if (neon?.root) neon.root.rotation.y += dt * 0.35;
            debugBox.rotation.y += dt;
          });

          log("Done, base vs neon_edge override");
        }catch(e){
          console.warn("Test loader failed", e);
          log("FAILED, check console log");
        }
      })();
    }
  </script>
</body>
</html>
