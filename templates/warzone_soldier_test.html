<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if (!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,1);

      // Camera looking at the origin by default
      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.3,
        Math.PI / 2.4,
        8.0,
        new BABYLON.Vector3(0,1,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // Debug cube so we always see *something*
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:1 }, scene);
      debugBox.position.y = 1;
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1);
      debugBox.material = debugMat;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      function safeFrameCamera(root){
        try{
          const bounds = root.getHierarchyBoundingVectors(true);
          const min = bounds.min;
          const max = bounds.max;
          const size = max.subtract(min);
          const center = min.add(size.scale(0.5));

          const maxDim = Math.max(size.x, size.y, size.z);

          if (!isFinite(maxDim) || maxDim <= 0){
            msgEl.textContent = "Soldier imported but bounds invalid – fallback camera";
            camera.target = new BABYLON.Vector3(0,1,0);
            camera.radius = 8;
            camera.lowerRadiusLimit = 4;
            camera.upperRadiusLimit = 20;
            return;
          }

          const radius = maxDim * 1.8;

          msgEl.textContent =
            "Soldier imported OK | size: " +
            maxDim.toFixed(3) +
            " | radius: " +
            radius.toFixed(3);

          camera.target = center;
          camera.radius = radius;
          camera.lowerRadiusLimit = radius * 0.8;
          camera.upperRadiusLimit = radius * 2.2;
        }catch(e){
          console.warn("safeFrameCamera failed", e);
          msgEl.textContent = "Soldier imported, camera frame failed – fallback";
          camera.target = new BABYLON.Vector3(0,1,0);
          camera.radius = 8;
        }
      }

      // ==== NEW: point to the glTF you just uploaded ====
      const ROOT_URL  = "/assets/warzone3d/soldier_gltf_3/";
      const FILE_NAME = "scene.gltf";

      msgEl.textContent = "Loading soldier (gltf)…";

      BABYLON.SceneLoader.ImportMesh(
        "",
        ROOT_URL,
        FILE_NAME,
        scene,
        function(meshes, ps, skeletons, animGroups){
          // Keep the cube so we can see the camera hasn't broken
          debugBox.position.x = -3;
          debugBox.position.y = 0.5;

          const root = new BABYLON.TransformNode("soldierRoot", scene);

          const geoMeshes = meshes.filter(m =>
            m && m.getTotalVertices && m.getTotalVertices() > 0
          );
          geoMeshes.forEach(m => {
            m.parent = root;
          });

          if (!geoMeshes.length){
            msgEl.textContent = "Soldier imported but no geometry meshes";
          } else {
            safeFrameCamera(root);

            // Slow spin so it's obvious when it appears
            scene.onBeforeRenderObservable.clear();
            scene.onBeforeRenderObservable.add(() => {
              const dt = scene.getEngine().getDeltaTime() * 0.001;
              root.rotation.y      += dt * 0.5;
              debugBox.rotation.y  += dt;
            });

            if (animGroups && animGroups.length){
              animGroups.forEach(g => g.stop());
              animGroups[0].start(true);
            }
          }
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
