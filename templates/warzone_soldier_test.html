<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone Test, FPS Viewmodel Tuner, Soldier Arms + Neon Marksman</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
      outline:none;
      background:transparent;
    }
    #hud{
      position:fixed;
      left:10px;
      top:10px;
      z-index:9999;
      color:#35ff6b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      line-height:1.32;
      text-shadow: 0 0 10px rgba(0,0,0,.85);
      white-space:pre;
      pointer-events:none;
      max-width: calc(100vw - 20px);
      overflow:hidden;
      background: rgba(0,0,0,.30);
      padding:8px 10px;
      border: 1px solid rgba(53,255,107,.25);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .stick{
      position:fixed;
      width:140px;
      height:140px;
      border-radius:50%;
      border:1px solid rgba(127,209,255,.35);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.18),rgba(0,0,0,.15));
      box-shadow:0 0 24px rgba(0,255,255,.08);
      touch-action:none;
      z-index:9000;
    }
    .stick.left{ left:16px; bottom:18px; }
    .stick.right{ right:16px; bottom:18px; }
    .nub{
      position:absolute;
      left:50%;
      top:50%;
      width:52px;
      height:52px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px solid rgba(255,59,107,.35);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.22),rgba(0,0,0,.10));
      box-shadow:0 0 18px rgba(255,59,107,.10);
      pointer-events:none;
    }

    /* Mobile tuning UI */
    #ui{
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10000;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      user-select:none;
      -webkit-user-select:none;
    }
    .btn{
      border: 1px solid rgba(127,209,255,.35);
      background: rgba(0,0,0,.45);
      color: #d9f3ff;
      font: 600 12px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      padding: 10px 12px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
      touch-action: manipulation;
    }
    .btn:active{ transform: scale(0.98); }

    #pad{
      display:none;
      width: 220px;
      border: 1px solid rgba(127,209,255,.22);
      background: rgba(0,0,0,.35);
      border-radius: 14px;
      padding: 10px;
      backdrop-filter: blur(4px);
    }
    #pad.show{ display:block; }

    .row{ display:flex; gap:8px; justify-content:flex-end; }
    .pill{
      min-width: 46px;
      text-align:center;
      padding: 10px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,59,107,.30);
      background: rgba(0,0,0,.35);
      color:#ffd4df;
      font: 700 12px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      touch-action: manipulation;
    }
    .pill.blue{
      border-color: rgba(127,209,255,.35);
      color:#d9f3ff;
    }
    .label{
      color:#9fdcff;
      font: 700 11px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      opacity:.85;
      padding: 6px 0 2px 0;
      text-align:right;
    }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud">Loading...</div>

  <div id="ui">
    <button class="btn" id="toggleHudBtn">HUD, hide</button>
    <button class="btn" id="togglePadBtn">Tuner, show</button>

    <div id="pad">
      <div class="label">Mode</div>
      <div class="row">
        <button class="pill blue" data-act="modePrev">◀</button>
        <button class="pill blue" data-act="modeNext">▶</button>
      </div>

      <div class="label">Step</div>
      <div class="row">
        <button class="pill" data-act="stepFine">fine</button>
        <button class="pill" data-act="stepNorm">norm</button>
        <button class="pill" data-act="stepFast">fast</button>
      </div>

      <div class="label">Adjust</div>
      <div class="row">
        <button class="pill blue" data-act="xNeg">X-</button>
        <button class="pill blue" data-act="xPos">X+</button>
        <button class="pill blue" data-act="yNeg">Y-</button>
        <button class="pill blue" data-act="yPos">Y+</button>
      </div>
      <div class="row">
        <button class="pill blue" data-act="zNeg">Z-</button>
        <button class="pill blue" data-act="zPos">Z+</button>
        <button class="pill" data-act="copy">copy</button>
        <button class="pill" data-act="reload">reload</button>
      </div>
    </div>
  </div>

  <div class="stick left" id="moveStick"><div class="nub" id="moveNub"></div></div>
  <div class="stick right" id="lookStick"><div class="nub" id="lookNub"></div></div>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const hud = document.getElementById("hud");

    canvas.tabIndex = 1;
    canvas.addEventListener("pointerdown", () => canvas.focus(), { passive:true });
    window.addEventListener("keydown", () => canvas.focus());

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });
    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0,0,0,0);

    const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
    hemi.intensity = 1.15;

    const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.2,-1,-0.1), scene);
    dir.intensity = 0.45;

    const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 220, height: 220 }, scene);
    const gmat = new BABYLON.StandardMaterial("gmat", scene);
    gmat.diffuseColor = new BABYLON.Color3(0.03,0.04,0.07);
    gmat.emissiveColor = new BABYLON.Color3(0.02,0.03,0.06);
    gmat.specularColor = new BABYLON.Color3(0,0,0);
    ground.material = gmat;

    const camera = new BABYLON.UniversalCamera("fpsCam", new BABYLON.Vector3(0,1.7,0), scene);
    camera.minZ = 0.05;
    camera.maxZ = 5000;
    camera.fov = 1.0;

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // ---------- assets ----------
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    const WEAPON_ROOT = "/assets/warzone3d/weapons/wz_neon_marksman/";
    const WEAPON_FILE = "scene.gltf";

    // ---------- joystick tuning ----------
    const JOY = {
      DEADZONE: 0.10,
      LOOK_SENS: 2.35,
      MOVE_SPEED: 4.20,
      INVERT_Y: false
    };

    const moveState = { active:false, id:null, dx:0, dy:0 };
    const lookState = { active:false, id:null, dx:0, dy:0 };

    const moveStick = document.getElementById("moveStick");
    const moveNub   = document.getElementById("moveNub");
    const lookStick = document.getElementById("lookStick");
    const lookNub   = document.getElementById("lookNub");

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    function setupStick(el, nub, state){
      const r = () => el.getBoundingClientRect();

      function setNub(x, y){
        const max = (r().width / 2) - (nub.getBoundingClientRect().width / 2);
        const nx = clamp(x, -max, max);
        const ny = clamp(y, -max, max);
        nub.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
        state.dx = nx / max;
        state.dy = ny / max;
      }

      function reset(){
        nub.style.transform = "translate(-50%,-50%)";
        state.dx = 0;
        state.dy = 0;
      }

      el.addEventListener("pointerdown", (e) => {
        state.active = true;
        state.id = e.pointerId;
        el.setPointerCapture(e.pointerId);
        const box = r();
        const cx = box.left + box.width/2;
        const cy = box.top + box.height/2;
        setNub(e.clientX - cx, e.clientY - cy);
      }, { passive:false });

      el.addEventListener("pointermove", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        const box = r();
        const cx = box.left + box.width/2;
        const cy = box.top + box.height/2;
        setNub(e.clientX - cx, e.clientY - cy);
      }, { passive:false });

      function end(e){
        if(e && state.id !== null && e.pointerId !== state.id) return;
        state.active = false;
        state.id = null;
        reset();
      }

      el.addEventListener("pointerup", end, { passive:true });
      el.addEventListener("pointercancel", end, { passive:true });
      el.addEventListener("pointerleave", end, { passive:true });
    }

    setupStick(moveStick, moveNub, moveState);
    setupStick(lookStick, lookNub, lookState);

    function applyDeadzone(x){
      const ax = Math.abs(x);
      if(ax < JOY.DEADZONE) return 0;
      const s = (ax - JOY.DEADZONE) / (1 - JOY.DEADZONE);
      return Math.sign(x) * clamp(s, 0, 1);
    }

    // ---------- viewmodel + weapon tuning ----------
    const TUNE = {
      // start values that should visibly show something, then you tune from here
      VM_POS:   new BABYLON.Vector3( 0.00, -1.25,  0.90),
      VM_ROT:   new BABYLON.Vector3( 0.00,  Math.PI, 0.00),
      VM_SCALE: 0.78,

      WEAPON_SCALE: 0.03000,
      WEAPON_YAW_FIX: 3.24160,
      WEAPON_PITCH_FIX: 0.12000,

      WEAPON_POS:      new BABYLON.Vector3(-1.16900,  0.09700, -0.05800),
      WEAPON_GRIP_POS: new BABYLON.Vector3(48.64112,  0.58674,  9.32631),
      WEAPON_GRIP_ROT: new BABYLON.Vector3( 1.22000, -0.54000, -0.10000),
    };

    let MODE = 1;

    function modeName(){
      return (
        MODE===1 ? "VM_POS" :
        MODE===2 ? "VM_ROT" :
        MODE===3 ? "VM_SCALE" :
        MODE===4 ? "WEAPON_POS" :
        MODE===5 ? "GRIP_POS" :
        MODE===6 ? "GRIP_ROT" :
        MODE===7 ? "YAW_FIX" :
        MODE===8 ? "PITCH_FIX" :
        MODE===9 ? "WEAPON_SCALE" :
        MODE===10 ? "JOY_DEADZONE" :
        MODE===11 ? "JOY_LOOK_SENS" :
        MODE===12 ? "JOY_MOVE_SPEED" :
        MODE===13 ? "JOY_INVERT_Y" : "???"
      );
    }

    // step control (mobile)
    let STEP = 0.01; // norm
    function setStep(which){
      STEP = which === "fine" ? 0.001 : which === "fast" ? 0.05 : 0.01;
      logLine(`[step] ${which}, ${STEP}`);
      renderHud();
    }

    function lockText(){
      return `// LOCK THESE IN, FPS TUNE
const VM_POS   = new BABYLON.Vector3(${TUNE.VM_POS.x.toFixed(5)}, ${TUNE.VM_POS.y.toFixed(5)}, ${TUNE.VM_POS.z.toFixed(5)});
const VM_ROT   = new BABYLON.Vector3(${TUNE.VM_ROT.x.toFixed(5)}, ${TUNE.VM_ROT.y.toFixed(5)}, ${TUNE.VM_ROT.z.toFixed(5)});
const VM_SCALE = ${TUNE.VM_SCALE.toFixed(5)};

const WEAPON_SCALE = ${TUNE.WEAPON_SCALE.toFixed(5)};
const WEAPON_YAW_FIX = ${TUNE.WEAPON_YAW_FIX.toFixed(5)};
const WEAPON_PITCH_FIX = ${TUNE.WEAPON_PITCH_FIX.toFixed(5)};

const WEAPON_POS      = new BABYLON.Vector3(${TUNE.WEAPON_POS.x.toFixed(5)}, ${TUNE.WEAPON_POS.y.toFixed(5)}, ${TUNE.WEAPON_POS.z.toFixed(5)});
const WEAPON_GRIP_POS = new BABYLON.Vector3(${TUNE.WEAPON_GRIP_POS.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.z.toFixed(5)});
const WEAPON_GRIP_ROT = new BABYLON.Vector3(${TUNE.WEAPON_GRIP_ROT.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.z.toFixed(5)});

const JOY_DEADZONE = ${JOY.DEADZONE.toFixed(3)};
const JOY_LOOK_SENS = ${JOY.LOOK_SENS.toFixed(3)};
const JOY_MOVE_SPEED = ${JOY.MOVE_SPEED.toFixed(3)};
const JOY_INVERT_Y = ${JOY.INVERT_Y};`;
    }

    async function copyLock(){
      const txt = lockText();
      try{
        await navigator.clipboard.writeText(txt);
      }catch(e){
        prompt("Copy these constants", txt);
      }
    }

    // ---------- live refs ----------
    let soldierContainer = null;
    let soldierRoot = null;
    let skinnedMesh = null;
    let skeleton = null;

    let weaponContainer = null;
    let weaponRoot = null;
    let weaponGrip = null;
    let weaponHold = null;
    let mergedWeaponMesh = null;

    const logLines = [];
    function logLine(s){
      logLines.push(String(s || ""));
      if (logLines.length > 10) logLines.shift();
    }

    function findSkinnedMeshFromContainer(container){
      try{
        const meshes = (container && container.meshes) ? container.meshes : [];
        return meshes.find(m => m && m.skeleton) || null;
      }catch(e){
        return null;
      }
    }

    function findBoneSmart(skel){
      if(!skel || !skel.bones || !skel.bones.length) return null;

      const exact = skel.bones.find(b => (b.name || "") === "mixamorig:RightHand.209_221");
      if(exact) return exact;

      const rx = skel.bones.find(b => /mixamorig:RightHand/i.test(b.name || ""));
      if(rx) return rx;

      const generic = skel.bones.find(b => /RightHand/i.test(b.name || ""));
      if(generic) return generic;

      const anyHand = skel.bones.find(b => /Hand/i.test(b.name || ""));
      if(anyHand) return anyHand;

      return skel.bones[skel.bones.length - 1] || null;
    }

    function clearAll(){
      try{ if(mergedWeaponMesh){ mergedWeaponMesh.dispose(false, true); mergedWeaponMesh = null; } }catch(e){}
      try{ if(weaponHold){ weaponHold.dispose(true, false); weaponHold = null; } }catch(e){}
      try{ if(weaponGrip){ weaponGrip.dispose(true, false); weaponGrip = null; } }catch(e){}
      try{ if(weaponRoot){ weaponRoot.dispose(true, false); weaponRoot = null; } }catch(e){}
      try{
        if(weaponContainer){
          weaponContainer.removeAllFromScene();
          weaponContainer.dispose();
          weaponContainer = null;
        }
      }catch(e){}

      try{ if(soldierRoot){ soldierRoot.dispose(true, false); soldierRoot = null; } }catch(e){}
      try{
        if(soldierContainer){
          soldierContainer.removeAllFromScene();
          soldierContainer.dispose();
          soldierContainer = null;
        }
      }catch(e){}

      skinnedMesh = null;
      skeleton = null;
    }

    function applyViewmodelTune(){
      if(!soldierRoot) return;
      soldierRoot.position.copyFrom(TUNE.VM_POS);
      soldierRoot.rotation.copyFrom(TUNE.VM_ROT);
      soldierRoot.scaling.set(TUNE.VM_SCALE, TUNE.VM_SCALE, TUNE.VM_SCALE);
    }

    function applyTuneToWeapon(){
      if(!weaponRoot || !weaponGrip) return;

      weaponRoot.position.copyFrom(TUNE.WEAPON_POS);
      weaponRoot.rotation.set(
        (TUNE.WEAPON_PITCH_FIX || 0.0),
        Math.PI + (TUNE.WEAPON_YAW_FIX || 0.0),
        0
      );
      weaponRoot.scaling.set(TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE);

      weaponGrip.position.copyFrom(TUNE.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(TUNE.WEAPON_GRIP_ROT);
    }

    function tryMergeWeaponMeshes(meshes){
      try{
        const valid = (meshes || []).filter(m => m && m.getTotalVertices && m.getTotalVertices() > 0);
        if (valid.length <= 1) return valid[0] || null;

        valid.forEach(m => { try{ m.parent = null; }catch(e){} });

        const merged = BABYLON.Mesh.MergeMeshes(valid, true, true, undefined, false, true);
        return merged || null;
      }catch(e){
        return null;
      }
    }

    function forceVisible(container, groupId){
      const meshes = (container && container.meshes) ? container.meshes : [];
      meshes.forEach(m => {
        if(!m) return;
        try{
          m.visibility = 1.0;
          m.isPickable = false;
          m.alwaysSelectAsActiveMesh = true;
          m.renderingGroupId = groupId || 2;
        }catch(e){}
      });
    }

    async function loadFPSViewmodelAndWeapon(){
      clearAll();

      logLine("[boot] loading soldier");
      const sCont = await BABYLON.SceneLoader.LoadAssetContainerAsync(SOLDIER_ROOT, SOLDIER_FILE, scene);
      sCont.addAllToScene();
      soldierContainer = sCont;

      soldierRoot = new BABYLON.TransformNode("soldierRootFPS", scene);
      soldierRoot.parent = camera;

      // SAFE, keep hierarchy, parent only root nodes
      (sCont.rootNodes || []).forEach(rn => {
        if(!rn) return;
        try{ rn.parent = soldierRoot; }catch(e){}
      });

      applyViewmodelTune();
      forceVisible(sCont, 2);

      skinnedMesh = findSkinnedMeshFromContainer(sCont);
      skeleton = skinnedMesh?.skeleton || null;

      if(!skinnedMesh || !skeleton){
        logLine("[vm] skeleton not found");
      } else {
        logLine(`[vm] bones ${skeleton.bones.length}`);
      }

      logLine("[boot] loading weapon");
      const wCont = await BABYLON.SceneLoader.LoadAssetContainerAsync(WEAPON_ROOT, WEAPON_FILE, scene);
      wCont.addAllToScene();
      weaponContainer = wCont;

      const rightHand = findBoneSmart(skeleton);
      if(!rightHand){
        logLine("[gun] no right hand bone, camera parent fallback");
      }

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponHold = new BABYLON.TransformNode("weaponHold", scene);

      weaponGrip.parent = weaponRoot;
      weaponHold.parent = weaponGrip;

      if(rightHand && skinnedMesh){
        weaponRoot.attachToBone(rightHand, skinnedMesh);
        logLine(`[gun] bone ${rightHand.name || "RightHand"}`);
      } else {
        weaponRoot.parent = camera;
        weaponRoot.position.copyFrom(TUNE.VM_POS);
      }

      // Attach weapon meshes (do NOT rely on rootNodes for this asset)
      const wMeshes = (wCont.meshes || []).filter(m => m && (m.name || "").toLowerCase() !== "__root__");
      const merged = tryMergeWeaponMeshes(wMeshes);

      if(merged){
        mergedWeaponMesh = merged;
        merged.parent = weaponHold;
        logLine(`[gun] merged ${wMeshes.length} -> 1`);
      } else {
        wMeshes.forEach(m => { try{ m.parent = weaponHold; }catch(e){} });
        logLine(`[gun] parts ${wMeshes.length}`);
      }

      forceVisible(wCont, 2);
      if(mergedWeaponMesh){
        try{
          mergedWeaponMesh.visibility = 1.0;
          mergedWeaponMesh.renderingGroupId = 2;
          mergedWeaponMesh.alwaysSelectAsActiveMesh = true;
        }catch(e){}
      }

      applyTuneToWeapon();
      logLine("[ready] tuner ok");
    }

    function renderHud(){
      // SHORT HUD so it doesn't cover the screen
      hud.textContent =
`FPS tuner
Mode ${MODE} ${modeName()}
Step ${STEP}

VM_POS   ${TUNE.VM_POS.x.toFixed(3)}, ${TUNE.VM_POS.y.toFixed(3)}, ${TUNE.VM_POS.z.toFixed(3)}
VM_ROT   ${TUNE.VM_ROT.x.toFixed(3)}, ${TUNE.VM_ROT.y.toFixed(3)}, ${TUNE.VM_ROT.z.toFixed(3)}
VM_SCALE ${TUNE.VM_SCALE.toFixed(3)}

W_POS    ${TUNE.WEAPON_POS.x.toFixed(3)}, ${TUNE.WEAPON_POS.y.toFixed(3)}, ${TUNE.WEAPON_POS.z.toFixed(3)}
GRIP_POS ${TUNE.WEAPON_GRIP_POS.x.toFixed(3)}, ${TUNE.WEAPON_GRIP_POS.y.toFixed(3)}, ${TUNE.WEAPON_GRIP_POS.z.toFixed(3)}
YAW ${TUNE.WEAPON_YAW_FIX.toFixed(3)}  PITCH ${TUNE.WEAPON_PITCH_FIX.toFixed(3)}  W_SCALE ${TUNE.WEAPON_SCALE.toFixed(4)}

log ${logLines.join(" , ")}`;
    }

    function adjust(dx, dy, dz){
      const s = STEP;

      if (MODE === 1){
        TUNE.VM_POS.x += dx*s; TUNE.VM_POS.y += dy*s; TUNE.VM_POS.z += dz*s;
        applyViewmodelTune();
      } else if (MODE === 2){
        TUNE.VM_ROT.x += dx*s; TUNE.VM_ROT.y += dy*s; TUNE.VM_ROT.z += dz*s;
        applyViewmodelTune();
      } else if (MODE === 3){
        TUNE.VM_SCALE = Math.max(0.05, TUNE.VM_SCALE + dy*s);
        applyViewmodelTune();
      } else if (MODE === 4){
        TUNE.WEAPON_POS.x += dx*s; TUNE.WEAPON_POS.y += dy*s; TUNE.WEAPON_POS.z += dz*s;
        applyTuneToWeapon();
      } else if (MODE === 5){
        TUNE.WEAPON_GRIP_POS.x += dx*s; TUNE.WEAPON_GRIP_POS.y += dy*s; TUNE.WEAPON_GRIP_POS.z += dz*s;
        applyTuneToWeapon();
      } else if (MODE === 6){
        TUNE.WEAPON_GRIP_ROT.x += dx*s; TUNE.WEAPON_GRIP_ROT.y += dy*s; TUNE.WEAPON_GRIP_ROT.z += dz*s;
        applyTuneToWeapon();
      } else if (MODE === 7){
        TUNE.WEAPON_YAW_FIX += dx*s;
        applyTuneToWeapon();
      } else if (MODE === 8){
        TUNE.WEAPON_PITCH_FIX += dy*s;
        applyTuneToWeapon();
      } else if (MODE === 9){
        TUNE.WEAPON_SCALE = Math.max(0.0001, TUNE.WEAPON_SCALE + dy*s);
        applyTuneToWeapon();
      } else if (MODE === 10){
        JOY.DEADZONE = clamp(JOY.DEADZONE + dy*s, 0.00, 0.50);
      } else if (MODE === 11){
        JOY.LOOK_SENS = clamp(JOY.LOOK_SENS + dy*s, 0.10, 10.0);
      } else if (MODE === 12){
        JOY.MOVE_SPEED = clamp(JOY.MOVE_SPEED + dy*s, 0.10, 20.0);
      } else if (MODE === 13){
        if(dy !== 0) JOY.INVERT_Y = !JOY.INVERT_Y;
      }

      renderHud();
    }

    // Keyboard still works on desktop
    window.addEventListener("keydown", async (ev) => {
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(ev.key)) ev.preventDefault();

      if (ev.key >= "1" && ev.key <= "9"){ MODE = parseInt(ev.key, 10); renderHud(); return; }
      if (ev.key === "0"){ MODE = 10; renderHud(); return; }
      if (ev.key.toLowerCase() === "l"){ MODE = 11; renderHud(); return; }
      if (ev.key.toLowerCase() === "m"){ MODE = 12; renderHud(); return; }
      if (ev.key.toLowerCase() === "i"){ MODE = 13; renderHud(); return; }

      if (ev.key.toLowerCase() === "r"){ await loadFPSViewmodelAndWeapon(); renderHud(); return; }
      if (ev.key.toLowerCase() === "c"){ await copyLock(); logLine("[copied]"); renderHud(); return; }

      if (ev.shiftKey) STEP = 0.05;
      else if (ev.altKey) STEP = 0.001;
      else STEP = 0.01;

      if (ev.key === "ArrowLeft")  return adjust(-1,  0,  0);
      if (ev.key === "ArrowRight") return adjust( 1,  0,  0);
      if (ev.key === "ArrowUp")    return adjust( 0,  1,  0);
      if (ev.key === "ArrowDown")  return adjust( 0, -1,  0);
      if (ev.key.toLowerCase() === "q") return adjust(0, 0, -1);
      if (ev.key.toLowerCase() === "e") return adjust(0, 0,  1);
    }, { passive:false });

    // ---------- FPS movement loop using sticks ----------
    scene.onBeforeRenderObservable.add(() => {
      const dt = scene.getEngine().getDeltaTime() * 0.001;

      // move
      const mvX = applyDeadzone(moveState.dx);
      const mvY = applyDeadzone(moveState.dy);

      const forward = camera.getDirection(new BABYLON.Vector3(0,0,1));
      const right   = camera.getDirection(new BABYLON.Vector3(1,0,0));

      const moveF = -mvY;
      const moveS = mvX;

      const spd = JOY.MOVE_SPEED * dt;
      const delta = forward.scale(moveF * spd).add(right.scale(moveS * spd));
      camera.position.addInPlace(new BABYLON.Vector3(delta.x, 0, delta.z));

      // look
      const lx = applyDeadzone(lookState.dx);
      const lyRaw = applyDeadzone(lookState.dy);
      const ly = JOY.INVERT_Y ? -lyRaw : lyRaw;

      camera.rotation.y += lx * JOY.LOOK_SENS * dt;
      camera.rotation.x += ly * JOY.LOOK_SENS * dt;
      camera.rotation.x = clamp(camera.rotation.x, -1.2, 1.2);
    });

    // ---------- Mobile UI wiring ----------
    const toggleHudBtn = document.getElementById("toggleHudBtn");
    const togglePadBtn = document.getElementById("togglePadBtn");
    const pad = document.getElementById("pad");

    let hudShown = true;
    toggleHudBtn.addEventListener("click", () => {
      hudShown = !hudShown;
      hud.style.display = hudShown ? "block" : "none";
      toggleHudBtn.textContent = hudShown ? "HUD, hide" : "HUD, show";
    });

    togglePadBtn.addEventListener("click", () => {
      const show = !pad.classList.contains("show");
      pad.classList.toggle("show", show);
      togglePadBtn.textContent = show ? "Tuner, hide" : "Tuner, show";
    });

    function modeClamp(m){ return clamp(m, 1, 13) | 0; }

    function doAction(act){
      if(act === "modePrev"){ MODE = modeClamp(MODE - 1); renderHud(); return; }
      if(act === "modeNext"){ MODE = modeClamp(MODE + 1); renderHud(); return; }

      if(act === "stepFine"){ setStep("fine"); return; }
      if(act === "stepNorm"){ setStep("norm"); return; }
      if(act === "stepFast"){ setStep("fast"); return; }

      if(act === "xNeg"){ adjust(-1,0,0); return; }
      if(act === "xPos"){ adjust( 1,0,0); return; }
      if(act === "yNeg"){ adjust(0,-1,0); return; }
      if(act === "yPos"){ adjust(0, 1,0); return; }
      if(act === "zNeg"){ adjust(0,0,-1); return; }
      if(act === "zPos"){ adjust(0,0, 1); return; }

      if(act === "copy"){ copyLock(); logLine("[copied]"); renderHud(); return; }
      if(act === "reload"){ loadFPSViewmodelAndWeapon().then(renderHud); return; }
    }

    pad.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-act]");
      if(!btn) return;
      doAction(btn.getAttribute("data-act"));
    });

    // ---------- boot ----------
    (async () => {
      try{
        logLine("[boot]");
        renderHud();
        await loadFPSViewmodelAndWeapon();
        renderHud();
      }catch(e){
        logLine(`[EXC] ${e?.message || e}`);
        renderHud();
        console.warn("Test failed", e);
      }
    })();
  </script>
</body>
</html>
