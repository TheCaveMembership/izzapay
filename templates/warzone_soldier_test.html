<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA WARZONE, Camera Test, Soldier + Neon Marksman</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    :root{
      --bg:#02030a;
      --panel:#070b18;
      --line:#222b47;
      --txt:#edf3ff;
      --muted:#9fb0d6;
      --accent1:#0ff;
      --accent2:#ff3b6b;
      --accent3:#ffcf4d;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      color:var(--txt);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
      touch-action:none;
      user-select:none;
    }

    /* SAME MANUAL ROTATION MODEL AS YOUR FPS SCREEN */
    .rot-wrapper{
      position:fixed;
      top:0;
      left:0;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg) translateY(-100%);
      transition:transform .15s ease,width .15s ease,height .15s ease;
      background:#000;
    }

    .fps-root{
      width:100%;
      height:100%;
      position:relative;
      background:radial-gradient(circle at top,#15192e 0,#02030a 55%,#000 100%);
      overflow:hidden;
    }

    #renderCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      touch-action:none;
      outline:none;
    }

    .hud-top{
      position:absolute;
      left:10px;
      top:10px;
      right:10px;
      z-index:10;
      display:flex;
      justify-content:space-between;
      gap:10px;
      pointer-events:none;
    }
    .hud-box{
      border-radius:14px;
      border:1px solid rgba(132,153,255,.35);
      background:rgba(7,11,24,.62);
      box-shadow:0 0 26px rgba(0,255,255,.10), 0 0 30px rgba(255,59,107,.08);
      padding:10px 12px;
      backdrop-filter:blur(8px);
      max-width:52vw;
      pointer-events:auto;
    }
    .hud-title{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(159,176,214,.95);
      margin-bottom:6px;
    }
    .hud-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color:#e7f0ff;
    }
    .tag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(127,209,255,.45);
      background:linear-gradient(90deg,rgba(2,8,36,.85),rgba(0,87,126,.45));
      color:#e7f0ff;
      font-size:11px;
      white-space:nowrap;
    }
    .tag.warn{
      border-color:rgba(255,184,107,.55);
      background:linear-gradient(90deg,rgba(60,34,0,.60),rgba(120,65,0,.35));
    }
    .tag.btn{
      cursor:pointer;
      user-select:none;
      border-color:rgba(255,59,107,.55);
      background:linear-gradient(90deg,rgba(30,6,18,.75),rgba(80,10,30,.45));
    }
    .tag.btn:active{ transform:scale(.98); }

    .touch-ui{
      position:absolute;
      inset:0;
      z-index:20;
      pointer-events:none;
    }
    .stick{
      position:absolute;
      width:140px;
      height:140px;
      border-radius:50%;
      border:1px solid rgba(127,209,255,.35);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.18),rgba(0,0,0,.15));
      box-shadow:0 0 24px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      opacity:0.95;
    }
    .stick.left{ left:16px; bottom:18px; }
    .stick.right{ right:16px; bottom:18px; }
    .stick .nub{
      position:absolute;
      left:50%;
      top:50%;
      width:52px;
      height:52px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px solid rgba(255,59,107,.35);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.22),rgba(0,0,0,.10));
      box-shadow:0 0 18px rgba(255,59,107,.10);
      pointer-events:none;
    }

    .hint{
      opacity:.9;
      font-size:11px;
      line-height:1.35;
      color:#c3cff5;
    }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>

<body>
  <div class="rot-wrapper" id="rotWrapper">
    <div class="fps-root">
      <canvas id="renderCanvas"></canvas>

      <div class="hud-top">
        <div class="hud-box">
          <div class="hud-title">Camera Test</div>
          <div class="hud-row">
            <span class="tag" id="hudMode">MODE, ORBIT</span>
            <button class="tag btn" id="toggleModeBtn" type="button">Toggle Mode</button>
            <button class="tag btn" id="resetBtn" type="button">Reset</button>
          </div>
          <div class="hint" id="hintText">
            Orbit, drag to rotate, pinch to zoom, tap Toggle Mode for FPS sticks
          </div>
        </div>

        <div class="hud-box" style="text-align:right;">
          <div class="hud-title">Assets</div>
          <div class="hud-row" style="justify-content:flex-end;">
            <span class="tag" id="hudSoldier">SOLDIER, loading</span>
            <span class="tag warn" id="hudWeapon">WEAPON, neon marksman</span>
          </div>
        </div>
      </div>

      <div class="touch-ui" id="touchUi">
        <div class="stick left" id="moveStick">
          <div class="nub" id="moveNub"></div>
        </div>

        <div class="stick right" id="lookStick">
          <div class="nub" id="lookNub"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Rotation wrapper, same behavior as lobby and current FPS
    (function(){
      const wrapper = document.getElementById("rotWrapper");
      function updateLayout(){
        if (!wrapper) return;

        // Use visualViewport when present, Pi Browser is more accurate
        const vv = window.visualViewport;
        const w = vv ? vv.width : window.innerWidth;
        const h = vv ? vv.height : window.innerHeight;

        const landscape = w >= h;
        if (landscape){
          wrapper.style.transform = "none";
          wrapper.style.width = "100%";
          wrapper.style.height = "100%";
        } else {
          wrapper.style.width = h + "px";
          wrapper.style.height = w + "px";
          wrapper.style.transform = "rotate(90deg) translateY(-100%)";
        }
      }
      window.addEventListener("resize", updateLayout);
      window.addEventListener("orientationchange", () => setTimeout(updateLayout, 150));
      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", updateLayout);
        window.visualViewport.addEventListener("scroll", updateLayout);
      }
      updateLayout();
    })();

    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });

    const hudMode   = document.getElementById("hudMode");
    const hudSoldier= document.getElementById("hudSoldier");
    const hudWeapon = document.getElementById("hudWeapon");
    const hintText  = document.getElementById("hintText");

    const toggleModeBtn = document.getElementById("toggleModeBtn");
    const resetBtn = document.getElementById("resetBtn");

    const touchUi = document.getElementById("touchUi");
    const moveStick = document.getElementById("moveStick");
    const moveNub   = document.getElementById("moveNub");
    const lookStick = document.getElementById("lookStick");
    const lookNub   = document.getElementById("lookNub");

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    // Assets
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    const WEAPON_ROOT = "/assets/warzone3d/weapons/wz_neon_marksman/";
    const WEAPON_FILE = "scene.gltf";

    // Weapon tune, from your tuner values for neon marksman
    const WEAPON_TUNE = {
      WEAPON_SCALE: 0.03000,
      WEAPON_YAW_FIX: 3.24160,
      WEAPON_PITCH_FIX: 0.12000,
      WEAPON_POS:      new BABYLON.Vector3(-1.16900,  0.09700, -0.05800),
      WEAPON_GRIP_POS: new BABYLON.Vector3(48.64112,  0.58674,  9.32631),
      WEAPON_GRIP_ROT: new BABYLON.Vector3( 1.22000, -0.54000, -0.10000),
    };

    // Scene
    let scene;
    let orbitCam;
    let fpsCam;
    let activeCam;

    // Soldier and weapon
    let soldierContainer = null;
    let soldierRoot = null;
    let soldierSkinned = null;

    let weaponContainer = null;
    let weaponRoot = null;
    let weaponGrip = null;

    function findSkinnedMeshFromContainer(container){
      try{
        const meshes = (container && container.meshes) ? container.meshes : [];
        return meshes.find(m => m && m.skeleton) || null;
      }catch(e){
        return null;
      }
    }

    function findRightHandBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;

      const exact = skeleton.bones.find(b => (b.name || "") === "mixamorig:RightHand.209_221");
      if(exact) return exact;

      const rx = skeleton.bones.find(b => /mixamorig:RightHand/i.test(b.name || ""));
      if(rx) return rx;

      const generic = skeleton.bones.find(b => /RightHand/i.test(b.name || ""));
      if(generic) return generic;

      const anyHand = skeleton.bones.find(b => /Hand/i.test(b.name || ""));
      if(anyHand) return anyHand;

      return null;
    }

    function clearWeapon(){
      try{ if(weaponGrip){ weaponGrip.dispose(true,false); weaponGrip = null; } }catch(e){}
      try{ if(weaponRoot){ weaponRoot.dispose(true,false); weaponRoot = null; } }catch(e){}
      try{
        if(weaponContainer){
          weaponContainer.removeAllFromScene();
          weaponContainer.dispose();
          weaponContainer = null;
        }
      }catch(e){}
    }

    function clearSoldier(){
      clearWeapon();
      soldierSkinned = null;
      try{ if(soldierRoot){ soldierRoot.dispose(true,false); soldierRoot = null; } }catch(e){}
      try{
        if(soldierContainer){
          soldierContainer.removeAllFromScene();
          soldierContainer.dispose();
          soldierContainer = null;
        }
      }catch(e){}
    }

    async function loadSoldierWorld(){
      clearSoldier();
      hudSoldier.textContent = "SOLDIER, loading";

      const cont = await BABYLON.SceneLoader.LoadAssetContainerAsync(SOLDIER_ROOT, SOLDIER_FILE, scene);
      cont.addAllToScene();
      soldierContainer = cont;

      // Root transform in world
      soldierRoot = new BABYLON.TransformNode("soldierRootWorld", scene);

      // Parent root nodes to soldierRoot
      (cont.rootNodes || []).forEach(rn => {
        if(!rn) return;
        try{ rn.parent = soldierRoot; }catch(e){}
      });

      // Position soldier in front of camera, standing on ground
      soldierRoot.position.set(0, 0, 8);
      soldierRoot.rotation.set(0, Math.PI, 0);
      soldierRoot.scaling.set(1.0, 1.0, 1.0);

      soldierSkinned = findSkinnedMeshFromContainer(cont);

      hudSoldier.textContent = "SOLDIER, loaded";
    }

    async function loadWeaponAttach(){
      clearWeapon();
      hudWeapon.textContent = "WEAPON, loading";

      const w = await BABYLON.SceneLoader.LoadAssetContainerAsync(WEAPON_ROOT, WEAPON_FILE, scene);
      w.addAllToScene();
      weaponContainer = w;

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      // Try attach to bone
      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const rightHand = findRightHandBone(sk);

      if(rightHand && soldierSkinned){
        weaponRoot.attachToBone(rightHand, soldierSkinned);
      } else {
        // Fallback, attach to soldierRoot so you can still see and tune
        weaponRoot.parent = soldierRoot;
        weaponRoot.position.set(0.4, 1.1, -0.3);
      }

      weaponRoot.position.copyFrom(WEAPON_TUNE.WEAPON_POS);
      weaponRoot.rotation.set(
        (WEAPON_TUNE.WEAPON_PITCH_FIX || 0.0),
        Math.PI + (WEAPON_TUNE.WEAPON_YAW_FIX || 0.0),
        0
      );
      weaponRoot.scaling.set(WEAPON_TUNE.WEAPON_SCALE, WEAPON_TUNE.WEAPON_SCALE, WEAPON_TUNE.WEAPON_SCALE);

      weaponGrip.position.copyFrom(WEAPON_TUNE.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(WEAPON_TUNE.WEAPON_GRIP_ROT);

      // Parent meshes under weaponGrip
      (w.meshes || []).forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        try{
          m.parent = weaponGrip;
          m.isPickable = false;
          m.renderingGroupId = 2;
        }catch(e){}
      });

      hudWeapon.textContent = "WEAPON, neon marksman";
    }

    // Camera modes
    let MODE = "ORBIT"; // ORBIT or FPS

    function setMode(next){
      MODE = next;

      if(MODE === "ORBIT"){
        activeCam = orbitCam;
        scene.activeCamera = orbitCam;
        orbitCam.attachControl(canvas, true);

        // Disable FPS sticks in orbit
        touchUi.style.display = "none";

        hudMode.textContent = "MODE, ORBIT";
        hintText.textContent = "Orbit, drag to rotate, pinch to zoom, Toggle Mode for FPS sticks";

      } else {
        activeCam = fpsCam;
        scene.activeCamera = fpsCam;
        fpsCam.attachControl(canvas, true);

        // Enable sticks in FPS
        touchUi.style.display = "block";

        hudMode.textContent = "MODE, FPS";
        hintText.textContent = "FPS, left stick move, right stick look, Toggle Mode for orbit";
      }
    }

    function resetCameras(){
      // Orbit camera around the soldier
      orbitCam.setTarget(new BABYLON.Vector3(0, 1.4, 8));
      orbitCam.alpha = -Math.PI / 2;
      orbitCam.beta  = 1.15;
      orbitCam.radius = 10.5;

      // FPS camera near origin, looking toward soldier
      fpsCam.position.set(0, 1.7, 0);
      fpsCam.rotation.set(0, 0, 0);
    }

    // Touch sticks for FPS look and move
    const moveState = { active:false, id:null, dx:0, dy:0 };
    const lookState = { active:false, id:null, dx:0, dy:0 };

    function setupStick(el, nub, state){
      const r = () => el.getBoundingClientRect();

      function setNub(x, y){
        const max = (r().width / 2) - (nub.getBoundingClientRect().width / 2);
        const nx = clamp(x, -max, max);
        const ny = clamp(y, -max, max);
        nub.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
        state.dx = nx / max;
        state.dy = ny / max;
      }

      function reset(){
        nub.style.transform = "translate(-50%,-50%)";
        state.dx = 0;
        state.dy = 0;
      }

      el.addEventListener("pointerdown", (e) => {
        state.active = true;
        state.id = e.pointerId;
        el.setPointerCapture(e.pointerId);

        const box = r();
        const cx = box.left + box.width/2;
        const cy = box.top + box.height/2;
        setNub(e.clientX - cx, e.clientY - cy);
      }, { passive:false });

      el.addEventListener("pointermove", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        const box = r();
        const cx = box.left + box.width/2;
        const cy = box.top + box.height/2;
        setNub(e.clientX - cx, e.clientY - cy);
      }, { passive:false });

      function end(e){
        if(e && state.id !== null && e.pointerId !== state.id) return;
        state.active = false;
        state.id = null;
        reset();
      }

      el.addEventListener("pointerup", end, { passive:true });
      el.addEventListener("pointercancel", end, { passive:true });
      el.addEventListener("pointerleave", end, { passive:true });
    }

    setupStick(moveStick, moveNub, moveState);
    setupStick(lookStick, lookNub, lookState);

    const JOY = {
      MOVE_SPEED: 4.2,
      LOOK_SENS: 2.4,
      DEADZONE: 0.10,
      INVERT_Y: false
    };

    function applyDeadzone(x){
      const ax = Math.abs(x);
      if(ax < JOY.DEADZONE) return 0;
      const s = (ax - JOY.DEADZONE) / (1 - JOY.DEADZONE);
      return Math.sign(x) * clamp(s, 0, 1);
    }

    function createScene(){
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,0);

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.10;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.2,-1,-0.1), scene);
      dir.intensity = 0.55;

      const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 220, height: 220 }, scene);
      const gmat = new BABYLON.StandardMaterial("gmat", scene);
      gmat.diffuseColor = new BABYLON.Color3(0.03,0.04,0.07);
      gmat.emissiveColor = new BABYLON.Color3(0.02,0.03,0.06);
      gmat.specularColor = new BABYLON.Color3(0,0,0);
      ground.material = gmat;

      // Orbit camera
      orbitCam = new BABYLON.ArcRotateCamera(
        "orbitCam",
        -Math.PI/2,
        1.15,
        10.5,
        new BABYLON.Vector3(0, 1.4, 8),
        scene
      );
      orbitCam.lowerRadiusLimit = 3.5;
      orbitCam.upperRadiusLimit = 22;
      orbitCam.wheelPrecision = 60;
      orbitCam.pinchPrecision = 110;
      orbitCam.panningSensibility = 0;
      orbitCam.useAutoRotationBehavior = false;

      // FPS camera
      fpsCam = new BABYLON.UniversalCamera("fpsCam", new BABYLON.Vector3(0,1.7,0), scene);
      fpsCam.minZ = 0.05;
      fpsCam.maxZ = 5000;
      fpsCam.fov = 1.0;
      fpsCam.rotation.set(0,0,0);
      fpsCam.inputs.clear();

      // Render loop
      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      // FPS loop
      scene.onBeforeRenderObservable.add(() => {
        if(MODE !== "FPS") return;

        const dt = scene.getEngine().getDeltaTime() * 0.001;

        const mvX = applyDeadzone(moveState.dx);
        const mvY = applyDeadzone(moveState.dy);

        const forward = fpsCam.getDirection(new BABYLON.Vector3(0,0,1));
        const right   = fpsCam.getDirection(new BABYLON.Vector3(1,0,0));

        const moveF = -mvY;
        const moveS = mvX;

        const spd = JOY.MOVE_SPEED * dt;
        const delta = forward.scale(moveF * spd).add(right.scale(moveS * spd));
        fpsCam.position.addInPlace(new BABYLON.Vector3(delta.x, 0, delta.z));

        const lx = applyDeadzone(lookState.dx);
        const lyRaw = applyDeadzone(lookState.dy);
        const ly = JOY.INVERT_Y ? -lyRaw : lyRaw;

        fpsCam.rotation.y += lx * JOY.LOOK_SENS * dt;
        fpsCam.rotation.x += ly * JOY.LOOK_SENS * dt;
        fpsCam.rotation.x = clamp(fpsCam.rotation.x, -1.2, 1.2);
      });

      // Default mode
      setMode("ORBIT");

      return scene;
    }

    toggleModeBtn.addEventListener("click", () => {
      setMode(MODE === "ORBIT" ? "FPS" : "ORBIT");
    });

    resetBtn.addEventListener("click", () => {
      resetCameras();
    });

    // Boot
    (async function(){
      createScene();
      resetCameras();

      try{
        await loadSoldierWorld();
        await loadWeaponAttach();
      }catch(e){
        console.error("[CAM TEST] boot failed", e);
        hudSoldier.textContent = "SOLDIER, failed";
      }
    })();
  </script>
</body>
</html>
