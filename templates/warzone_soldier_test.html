<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA WARZONE, Chest Cam Align, Soldier, Pistol, SMG</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    :root{
      --bg:#02030a;
      --panel:#070b18;
      --line:#222b47;
      --txt:#edf3ff;
      --muted:#9fb0d6;
      --accent1:#0ff;
      --accent2:#ff3b6b;
      --accent3:#ffcf4d;
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select:none;
      user-select:none;
    }
    html,body{
      width:100%;
      height:100%;
      background:#000;
      color:var(--txt);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
      touch-action:none;
    }

    .rot-wrapper{
      position:fixed;
      top:0;
      left:0;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg) translateY(-100%);
      transition:transform .15s ease,width .15s ease,height .15s ease;
      background:#000;
    }

    .fps-root{
      width:100%;
      height:100%;
      position:relative;
      background:radial-gradient(circle at top,#15192e 0,#02030a 55%,#000 100%);
      overflow:hidden;
    }

    #renderCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      touch-action:none;
      outline:none;
    }

    .hud-top{
      position:absolute;
      left:10px;
      top:10px;
      right:10px;
      z-index:10;
      display:flex;
      justify-content:space-between;
      gap:10px;
      pointer-events:none;
    }
    .hud-box{
      border-radius:14px;
      border:1px solid rgba(132,153,255,.35);
      background:rgba(7,11,24,.62);
      box-shadow:0 0 26px rgba(0,255,255,.10), 0 0 30px rgba(255,59,107,.08);
      padding:10px 12px;
      backdrop-filter:blur(8px);
      max-width:60vw;
      pointer-events:auto;
    }
    .hud-title{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(159,176,214,.95);
      margin-bottom:6px;
    }
    .hud-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color:#e7f0ff;
    }
    .tag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(127,209,255,.45);
      background:linear-gradient(90deg,rgba(2,8,36,.85),rgba(0,87,126,.45));
      color:#e7f0ff;
      font-size:11px;
      white-space:nowrap;
    }
    .tag.warn{
      border-color:rgba(255,184,107,.55);
      background:linear-gradient(90deg,rgba(60,34,0,.60),rgba(120,65,0,.35));
    }
    .tag.btn{
      cursor:pointer;
      user-select:none;
      border-color:rgba(255,59,107,.55);
      background:linear-gradient(90deg,rgba(30,6,18,.75),rgba(80,10,30,.45));
      appearance:none;
      -webkit-appearance:none;
      outline:none;
    }
    .tag.btn:active{ transform:scale(.98); }

    .hint{
      opacity:.9;
      font-size:11px;
      line-height:1.35;
      color:#c3cff5;
      margin-top:6px;
    }

    .tuner{
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:11px;
      color:#cfe0ff;
    }
    .tuner label{
      opacity:.9;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:10px;
      color:rgba(159,176,214,.95);
      white-space:nowrap;
    }
    .tuner input[type="range"]{
      width:180px;
      max-width:34vw;
      accent-color: rgba(0,255,255,.9);
      touch-action:none;
    }
    .tuner .val{
      min-width:54px;
      text-align:right;
      font-variant-numeric: tabular-nums;
      opacity:.95;
    }

    .touch-ui{
      position:absolute;
      inset:0;
      z-index:20;
      pointer-events:none;
    }
    .stick{
      position:absolute;
      width:140px;
      height:140px;
      border-radius:50%;
      border:1px solid rgba(127,209,255,.35);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.18),rgba(0,0,0,.15));
      box-shadow:0 0 24px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      opacity:0.95;
    }
    .stick.left{ left:16px; bottom:18px; }
    .stick.right{ right:16px; bottom:18px; }
    .stick .nub{
      position:absolute;
      left:50%;
      top:50%;
      width:52px;
      height:52px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px solid rgba(255,59,107,.35);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.22),rgba(0,0,0,.10));
      box-shadow:0 0 18px rgba(255,59,107,.10);
      pointer-events:none;
    }

    .fire-btn{
      position:absolute;
      right:182px;
      bottom:46px;
      width:110px;
      height:110px;
      border-radius:50%;
      border:1px solid rgba(255,59,107,.55);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.28),rgba(0,0,0,.22));
      box-shadow:0 0 28px rgba(255,59,107,.14), 0 0 26px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:#ffe7ef;
      opacity:0.96;
    }
    .fire-btn:active{ transform:scale(.98); }
    .fire-sub{
      font-size:10px;
      opacity:.85;
      margin-top:2px;
      letter-spacing:.12em;
      color:#ffd2de;
    }
    .fire-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1.1;
    }

    .reticle{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:18px;
      height:18px;
      z-index:24;
      pointer-events:none;
      opacity:0.92;
      filter:drop-shadow(0 0 10px rgba(0,255,255,.10));
    }
    .reticle::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:3px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      transform:translate(-50%,-50%);
    }
    .reticle .h,.reticle .v{
      position:absolute;
      left:50%;
      top:50%;
      background:rgba(255,255,255,.85);
      transform:translate(-50%,-50%);
    }
    .reticle .h{ width:18px; height:1px; opacity:.55; }
    .reticle .v{ width:1px; height:18px; opacity:.55; }

    .hit{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:28px;
      height:28px;
      z-index:25;
      pointer-events:none;
      opacity:0;
    }
    .hit::before,.hit::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:28px;
      height:2px;
      background:rgba(255,255,255,.9);
      transform-origin:center;
      box-shadow:0 0 10px rgba(0,255,255,.18);
    }
    .hit::before{ transform:translate(-50%,-50%) rotate(45deg); }
    .hit::after{ transform:translate(-50%,-50%) rotate(-45deg); }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
</head>

<body>
  <div class="rot-wrapper" id="rotWrapper">
    <div class="fps-root">
      <canvas id="renderCanvas"></canvas>

      <div class="hud-top">
        <div class="hud-box">
          <div class="hud-title">Chest Cam Align</div>
          <div class="hud-row">
            <span class="tag" id="hudControl">CONTROL, SOLDIER</span>
            <button class="tag btn" id="weaponBtn" type="button">Weapon, pistol</button>
            <button class="tag btn" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="tuner">
            <label for="gripYaw">Grip yaw</label>
            <input id="gripYaw" type="range" min="-0.80" max="0.80" step="0.01" value="0">
            <div class="val" id="gripYawVal">0.00</div>
          </div>

          <div class="hint" id="hintText">
            Left stick moves, right stick looks, grip yaw tunes barrel left or right, fire shoots
          </div>
        </div>

        <div class="hud-box" style="text-align:right;">
          <div class="hud-title">Status</div>
          <div class="hud-row" style="justify-content:flex-end;">
            <span class="tag" id="hudSoldier">SOLDIER, loading</span>
            <span class="tag warn" id="hudWeapon">WEAPON, pistol</span>
            <span class="tag" id="hudBone">CHEST, ?</span>
            <span class="tag" id="hudCam">CAM, ?</span>
            <span class="tag" id="hudPos">POS, ?</span>
          </div>
        </div>
      </div>

      <div class="reticle" id="reticle"><div class="h"></div><div class="v"></div></div>
      <div class="hit" id="hitMarker"></div>

      <div class="touch-ui" id="touchUi">
        <div class="stick left" id="moveStick"><div class="nub" id="moveNub"></div></div>
        <div class="stick right" id="turnStick"><div class="nub" id="turnNub"></div></div>

        <div class="fire-btn" id="fireBtn" role="button" aria-label="Fire">
          <div class="fire-wrap">
            <div>FIRE</div>
            <div class="fire-sub" id="fireModeText">tap</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Hard block text selection / context menus during play
    document.addEventListener("selectstart", (e) => { e.preventDefault(); }, { passive:false });
    document.addEventListener("contextmenu", (e) => { e.preventDefault(); }, { passive:false });
    document.addEventListener("gesturestart", (e) => { e.preventDefault(); }, { passive:false });

    // Portrait rotation flag, used to rotate joystick input back into "game space"
    let ROTATED_UI = true;

    (function(){
      const wrapper = document.getElementById("rotWrapper");
      function updateLayout(){
        if (!wrapper) return;
        const vv = window.visualViewport;
        const w = vv ? vv.width : window.innerWidth;
        const h = vv ? vv.height : window.innerHeight;
        const landscape = w >= h;

        if (landscape){
          ROTATED_UI = false;
          wrapper.style.transform = "none";
          wrapper.style.width = "100%";
          wrapper.style.height = "100%";
        } else {
          ROTATED_UI = true;
          wrapper.style.width = h + "px";
          wrapper.style.height = w + "px";
          wrapper.style.transform = "rotate(90deg) translateY(-100%)";
        }
      }
      window.addEventListener("resize", updateLayout);
      window.addEventListener("orientationchange", () => setTimeout(updateLayout, 150));
      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", updateLayout);
        window.visualViewport.addEventListener("scroll", updateLayout);
      }
      updateLayout();
    })();

    const canvas = document.getElementById("renderCanvas");
    canvas.tabIndex = 1;

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });

    const hudSoldier = document.getElementById("hudSoldier");
    const hudWeapon  = document.getElementById("hudWeapon");
    const hudBone    = document.getElementById("hudBone");
    const hudCam     = document.getElementById("hudCam");
    const hudPos     = document.getElementById("hudPos");

    const weaponBtn = document.getElementById("weaponBtn");
    const resetBtn  = document.getElementById("resetBtn");

    const moveStick = document.getElementById("moveStick");
    const moveNub   = document.getElementById("moveNub");

    const lookStick = document.getElementById("turnStick");
    const lookNub   = document.getElementById("turnNub");

    const fireBtn = document.getElementById("fireBtn");
    const fireModeText = document.getElementById("fireModeText");
    const hitMarker = document.getElementById("hitMarker");

    const gripYawSlider = document.getElementById("gripYaw");
    const gripYawVal = document.getElementById("gripYawVal");

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    function getWeaponAsset(sku){
      if(sku === "wz_cityrunner_smg") return { rootUrl:"/assets/warzone3d/weapons/wz_cityrunner_smg/", fileName:"scene.gltf" };
      return { rootUrl:"/assets/warzone3d/weapons/wz_basic_pistol/", fileName:"scene.gltf" };
    }

    const WEAPON_TUNING = {
      wz_basic_pistol: {
        WEAPON_SCALE: 0.06000,
        WEAPON_YAW_FIX: 1.52080,
        WEAPON_PITCH_FIX: -0.03000,
        WEAPON_POS:      new BABYLON.Vector3(-1.06900,  0.32700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 2.98400,  1.23000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.23000,  0.00000,  0.01000),
      },
      wz_cityrunner_smg: {
        WEAPON_SCALE: 0.11000,
        WEAPON_YAW_FIX: 1.10080,
        WEAPON_PITCH_FIX: -1.84000,
        WEAPON_POS:      new BABYLON.Vector3( 1.18100,  1.01700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 7.42400, -2.71000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.05000, -0.22000,  0.01000),
      }
    };

    /* Recentered into the "old head space" */
    const CHEST_LOCK = {
      pivotPos: new BABYLON.Vector3(0.00, 0.30, 0.06),
      camPos:   new BABYLON.Vector3(0.00, 1.72, -0.28),
      pitch:    -0.10,
      yaw:       0.00
    };

    const CHEST = {
      pivotPos: CHEST_LOCK.pivotPos.clone(),
      camPos:   CHEST_LOCK.camPos.clone(),
      pitch:    CHEST_LOCK.pitch,
      yaw:      CHEST_LOCK.yaw
    };

    const IDLE = { SPEED: 0.05, LOOP: true };
    const BOB  = { LOCK_HIPS_Y: true };

    const JOY = {
      MOVE_SPEED: 5.5,
      DEADZONE: 0.10
    };

    const LOOK = {
      YAW_SPEED:  1.75,
      PITCH_SPEED: 1.25,
      PITCH_MIN: -1.05,
      PITCH_MAX:  0.55
    };

    const LOOK_SENS = { TOUCH_MULT: 0.90 };

    const FIRE = {
      pistol: { rpm: 240, spread: 0.0035, maxDist: 120, tracerLife: 0.06, recoil: 0.020 },
      smg:    { rpm: 900, spread: 0.0070, maxDist: 120, tracerLife: 0.045, recoil: 0.010 }
    };

    function applyDeadzone(x){
      const ax = Math.abs(x);
      if(ax < JOY.DEADZONE) return 0;
      const s = (ax - JOY.DEADZONE) / (1 - JOY.DEADZONE);
      return Math.sign(x) * clamp(s, 0, 1);
    }

    const lookState = { active:false, id:null, dx:0, dy:0, el:null, nub:null, max:1, cx:0, cy:0, recalc:null };
    const moveState = { active:false, id:null, dx:0, dy:0, el:null, nub:null, max:1, cx:0, cy:0, recalc:null };

    function stickSetup(state, el, nub){
      state.el = el;
      state.nub = nub;
      function recalc(){
        const box = el.getBoundingClientRect();
        state.cx = box.left + box.width/2;
        state.cy = box.top + box.height/2;
        state.max = (box.width/2) - (nub.getBoundingClientRect().width/2);
        if(state.max < 10) state.max = 10;
      }
      state.recalc = recalc;
      recalc();
      window.addEventListener("resize", recalc);
      if(window.visualViewport){
        window.visualViewport.addEventListener("resize", recalc);
        window.visualViewport.addEventListener("scroll", recalc);
      }
    }

    stickSetup(lookState, lookStick, lookNub);
    stickSetup(moveState, moveStick, moveNub);

    // Rotate stick vector by -90 deg when UI is rotated in portrait
    function rotateIfPortrait(nx, ny){
      if(!ROTATED_UI) return { nx, ny };
      // -90 degrees: (x, y) -> (y, -x)
      return { nx: ny, ny: -nx };
    }

    function stickSetFromClient(state, clientX, clientY){
      let nx = clamp(clientX - state.cx, -state.max, state.max);
      let ny = clamp(clientY - state.cy, -state.max, state.max);

      const r = rotateIfPortrait(nx, ny);
      nx = clamp(r.nx, -state.max, state.max);
      ny = clamp(r.ny, -state.max, state.max);

      state.nub.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;

      // FIX, left and right were reversed, invert X only, keep Y as is
      state.dx = -(nx / state.max);
      state.dy =  (ny / state.max);
    }

    function stickReset(state){
      state.nub.style.transform = "translate(-50%,-50%)";
      state.dx = 0;
      state.dy = 0;
    }

    function bindGlobalStick(state){
      state.el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        state.recalc && state.recalc();
        state.active = true;
        state.id = e.pointerId;
        stickSetFromClient(state, e.clientX, e.clientY);
      }, { passive:false });

      window.addEventListener("pointermove", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        e.preventDefault();
        stickSetFromClient(state, e.clientX, e.clientY);
      }, { passive:false });

      window.addEventListener("pointerup", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        state.active = false;
        state.id = null;
        stickReset(state);
      }, { passive:true });

      window.addEventListener("pointercancel", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        state.active = false;
        state.id = null;
        stickReset(state);
      }, { passive:true });

      state.el.addEventListener("touchstart", (e) => {
        if(!e.changedTouches || !e.changedTouches.length) return;
        e.preventDefault();
        state.recalc && state.recalc();
        const t = e.changedTouches[0];
        state.active = true;
        state.id = t.identifier;
        stickSetFromClient(state, t.clientX, t.clientY);
      }, { passive:false });

      window.addEventListener("touchmove", (e) => {
        if(!state.active) return;
        if(!e.changedTouches || !e.changedTouches.length) return;
        for(const t of e.changedTouches){
          if(t.identifier === state.id){
            stickSetFromClient(state, t.clientX, t.clientY);
            break;
          }
        }
      }, { passive:false });

      window.addEventListener("touchend", (e) => {
        if(!state.active) return;
        if(!e.changedTouches || !e.changedTouches.length) return;
        for(const t of e.changedTouches){
          if(t.identifier === state.id){
            state.active = false;
            state.id = null;
            stickReset(state);
            break;
          }
        }
      }, { passive:true });

      window.addEventListener("touchcancel", () => {
        if(!state.active) return;
        state.active = false;
        state.id = null;
        stickReset(state);
      }, { passive:true });
    }

    bindGlobalStick(lookState);
    bindGlobalStick(moveState);

    /* Desktop fallback movement */
    const keys = { w:false,a:false,s:false,d:false };
    window.addEventListener("keydown", (e) => {
      const k = (e.key || "").toLowerCase();
      if(k in keys){ keys[k] = true; }
    });
    window.addEventListener("keyup", (e) => {
      const k = (e.key || "").toLowerCase();
      if(k in keys){ keys[k] = false; }
    });

    let scene;
    let camera;

    let soldierContainer = null;
    let soldierRoot = null;
    let soldierSkinned = null;

    let chestBoneNode = null;
    let chestPivot = null;

    let hipsBone = null;
    let hipsBaseY = null;

    let weaponSku = "wz_basic_pistol";
    let weaponContainer = null;
    let weaponRoot = null;
    let weaponGrip = null;

    let isFiring = false;
    let nextShotAt = 0;

    /* Look state */
    let aimYaw = 0.0;
    let aimPitch = CHEST_LOCK.pitch;

    // Grip yaw tuner, stored per weapon
    const GRIP_TUNER = {
      wz_basic_pistol: 0.0,
      wz_cityrunner_smg: 0.0
    };

    function loadGripTuner(){
      try{
        const raw = localStorage.getItem("izza_grip_tuner");
        if(!raw) return;
        const obj = JSON.parse(raw);
        if(obj && typeof obj === "object"){
          if(typeof obj.wz_basic_pistol === "number") GRIP_TUNER.wz_basic_pistol = obj.wz_basic_pistol;
          if(typeof obj.wz_cityrunner_smg === "number") GRIP_TUNER.wz_cityrunner_smg = obj.wz_cityrunner_smg;
        }
      }catch(e){}
    }
    function saveGripTuner(){
      try{
        localStorage.setItem("izza_grip_tuner", JSON.stringify(GRIP_TUNER));
      }catch(e){}
    }
    function currentGripYaw(){
      return (weaponSku === "wz_cityrunner_smg") ? GRIP_TUNER.wz_cityrunner_smg : GRIP_TUNER.wz_basic_pistol;
    }
    function setCurrentGripYaw(v){
      v = clamp(v, -0.80, 0.80);
      if(weaponSku === "wz_cityrunner_smg") GRIP_TUNER.wz_cityrunner_smg = v;
      else GRIP_TUNER.wz_basic_pistol = v;
      saveGripTuner();
      syncGripYawUi();
      applyGripYawToWeapon();
    }
    function syncGripYawUi(){
      const v = currentGripYaw();
      gripYawSlider.value = String(v);
      gripYawVal.textContent = (Math.round(v * 100) / 100).toFixed(2);
    }
    function applyGripYawToWeapon(){
      if(!weaponGrip) return;
      const T = (weaponSku === "wz_cityrunner_smg") ? WEAPON_TUNING.wz_cityrunner_smg : WEAPON_TUNING.wz_basic_pistol;
      const base = T.WEAPON_GRIP_ROT || new BABYLON.Vector3(0,0,0);

      // Add yaw offset here, this rotates the gun left or right in the hands
      weaponGrip.rotation.set(base.x, base.y + currentGripYaw(), base.z);
    }

    gripYawSlider.addEventListener("input", (e) => {
      e.preventDefault();
      setCurrentGripYaw(parseFloat(gripYawSlider.value || "0") || 0);
    }, { passive:false });

    function fmt(v){ return (Math.round(v*1000)/1000).toFixed(3); }

    function updateCamHud(){
      hudCam.textContent = `CAM, x ${fmt(CHEST.camPos.x)} y ${fmt(CHEST.camPos.y)} z ${fmt(CHEST.camPos.z)}`;
    }
    function updatePosHud(){
      if(!soldierRoot) return;
      hudPos.textContent = `POS, x ${fmt(soldierRoot.position.x)} z ${fmt(soldierRoot.position.z)}`;
    }

    function setFireModeLabel(){
      fireModeText.textContent = (weaponSku === "wz_cityrunner_smg") ? "hold" : "tap";
    }

    function flashHit(){
      hitMarker.style.opacity = "1";
      hitMarker.style.transition = "none";
      requestAnimationFrame(() => {
        hitMarker.style.transition = "opacity 120ms ease";
        hitMarker.style.opacity = "0";
      });
    }

    function findSkinnedMeshFromContainer(container){
      try{
        const meshes = (container && container.meshes) ? container.meshes : [];
        return meshes.find(m => m && m.skeleton) || null;
      }catch(e){
        return null;
      }
    }

    function findRightHandBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;
      const exact = skeleton.bones.find(b => (b.name || "") === "mixamorig:RightHand.209_221");
      if(exact) return exact;
      const rx = skeleton.bones.find(b => /mixamorig:RightHand/i.test(b.name || ""));
      if(rx) return rx;
      const generic = skeleton.bones.find(b => /RightHand/i.test(b.name || ""));
      if(generic) return generic;
      const anyHand = skeleton.bones.find(b => /Hand/i.test(b.name || ""));
      if(anyHand) return anyHand;
      return null;
    }

    function findChestBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;
      const prefer = [
        /mixamorig:Spine2/i,
        /mixamorig:Spine1/i,
        /mixamorig:Spine\b/i,
        /mixamorig:Neck/i
      ];
      for(const rx of prefer){
        const b = skeleton.bones.find(x => rx.test(x.name || ""));
        if(b) return b;
      }
      return skeleton.bones.find(x => /Spine/i.test(x.name || "")) || null;
    }

    function findHipsBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;
      return skeleton.bones.find(b => /mixamorig:Hips/i.test(b.name || "")) || skeleton.bones.find(b => /Hips/i.test(b.name || "")) || null;
    }

    function playIdleAnimationsSlow(container){
      try{
        const groups = (container && container.animationGroups) ? container.animationGroups : [];
        if(!groups.length) return;
        groups.forEach(g => {
          try{
            g.stop();
            g.start(true, IDLE.SPEED);
          }catch(e){}
        });
      }catch(e){}
    }

    // Force hide head and neck, arms protected
    function hideHeadAndNeck(container){
      const meshes = (container && container.meshes) ? container.meshes : [];

      const keepRx = /(arm|forearm|hand|wrist|glove|sleeve|weapon|gun|pistol|smg)/i;
      const hideRx = /(head|neck|helmet|face|hair|ear|mask|hood|cap|hat|beard|brow|eye|teeth|tongue|jaw|cheek|skull|cranium|visor|goggles|glass|glasses|mouth|lip)/i;

      const HEAD_ZONE = { minY: 1.35, minZ: -0.35 };

      meshes.forEach(m => {
        if(!m) return;

        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        if(keepRx.test(nm)) return;

        let hide = false;
        if(hideRx.test(nm)) hide = true;

        if(!hide){
          try{
            const bi = m.getBoundingInfo && m.getBoundingInfo();
            if(bi){
              const c = bi.boundingBox.centerWorld;
              if(c.y >= HEAD_ZONE.minY && c.z >= HEAD_ZONE.minZ) hide = true;
            }
          }catch(e){}
        }

        if(!hide) return;

        try{
          m.isPickable = false;
          m.visibility = 0.0;
          m.setEnabled(false);
        }catch(e){
          try{ m.visibility = 0.0; }catch(_){}
        }
      });
    }

    function setArmsOnlyVisibility(container){
      const meshes = (container && container.meshes) ? container.meshes : [];
      let shown = 0;

      meshes.forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        const isArms =
          nm.includes("arm") ||
          nm.includes("forearm") ||
          nm.includes("hand") ||
          nm.includes("wrist") ||
          nm.includes("glove") ||
          nm.includes("sleeve");

        try{
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = isArms ? 1.0 : 0.0;
          m.setEnabled(isArms);
          if(isArms) shown += 1;
        }catch(e){}
      });

      if(shown === 0){
        meshes.forEach(m => {
          if(!m) return;
          const nm = (m.name || "").toLowerCase();
          const hideBody =
            nm.includes("head") ||
            nm.includes("helmet") ||
            nm.includes("torso") ||
            nm.includes("spine") ||
            nm.includes("chest") ||
            nm.includes("body") ||
            nm.includes("neck") ||
            nm.includes("face") ||
            nm.includes("hair") ||
            nm.includes("ear") ||
            nm.includes("hip") ||
            nm.includes("leg") ||
            nm.includes("thigh") ||
            nm.includes("calf") ||
            nm.includes("foot") ||
            nm.includes("boot");
          try{
            m.isPickable = false;
            m.renderingGroupId = 2;
            m.visibility = hideBody ? 0.0 : 1.0;
            m.setEnabled(!hideBody);
          }catch(e){}
        });
      }

      hideHeadAndNeck(container);
    }

    function clearWeapon(){
      try{ if(weaponGrip){ weaponGrip.dispose(true,false); weaponGrip = null; } }catch(e){}
      try{ if(weaponRoot){ weaponRoot.dispose(true,false); weaponRoot = null; } }catch(e){}
      try{
        if(weaponContainer){
          weaponContainer.removeAllFromScene();
          weaponContainer.dispose();
          weaponContainer = null;
        }
      }catch(e){}
    }

    function clearSoldier(){
      clearWeapon();
      hipsBone = null;
      hipsBaseY = null;

      try{ if(chestPivot){ chestPivot.dispose(true,false); chestPivot = null; } }catch(e){}
      try{ if(chestBoneNode){ chestBoneNode.dispose(true,false); chestBoneNode = null; } }catch(e){}
      try{ if(soldierRoot){ soldierRoot.dispose(true,false); soldierRoot = null; } }catch(e){}

      soldierSkinned = null;

      try{
        if(soldierContainer){
          soldierContainer.removeAllFromScene();
          soldierContainer.dispose();
          soldierContainer = null;
        }
      }catch(e){}
    }

    function applyChestMountAimed(){
      if(!chestPivot || !camera) return;

      chestPivot.position.copyFrom(CHEST_LOCK.pivotPos);
      chestPivot.rotation.set(0, 0, 0);

      camera.position.copyFrom(CHEST_LOCK.camPos);
      camera.rotation.set(aimPitch, 0, 0);

      CHEST.pivotPos.copyFrom(CHEST_LOCK.pivotPos);
      CHEST.camPos.copyFrom(CHEST_LOCK.camPos);
      CHEST.pitch = aimPitch;
      CHEST.yaw = soldierRoot ? soldierRoot.rotation.y : aimYaw;

      updateCamHud();
    }

    async function loadSoldierAndChestCam(){
      clearSoldier();
      hudSoldier.textContent = "SOLDIER, loading";
      hudBone.textContent = "CHEST, ?";
      hudCam.textContent = "CAM, ?";
      hudPos.textContent = "POS, ?";

      const cont = await BABYLON.SceneLoader.LoadAssetContainerAsync(SOLDIER_ROOT, SOLDIER_FILE, scene);
      cont.addAllToScene();
      soldierContainer = cont;

      soldierRoot = new BABYLON.TransformNode("soldierRoot", scene);
      (cont.rootNodes || []).forEach(rn => {
        if(!rn) return;
        try{ rn.parent = soldierRoot; }catch(e){}
      });

      soldierRoot.position.set(0, 0, 0);
      soldierRoot.rotation.set(0, 0, 0);
      soldierRoot.scaling.set(1, 1, 1);

      soldierSkinned = findSkinnedMeshFromContainer(cont);

      playIdleAnimationsSlow(cont);
      setArmsOnlyVisibility(cont);

      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const chestBone = findChestBone(sk);

      chestBoneNode = new BABYLON.TransformNode("chestBoneNode", scene);
      chestPivot = new BABYLON.TransformNode("chestPivot", scene);

      if(chestBone && soldierSkinned){
        chestBoneNode.attachToBone(chestBone, soldierSkinned);
        hudBone.textContent = "CHEST, " + (chestBone.name || "bone");
      } else {
        chestBoneNode.parent = soldierRoot;
        chestBoneNode.position.set(0, 1.52, 0.06);
        hudBone.textContent = "CHEST, fallback";
      }

      chestPivot.parent = chestBoneNode;
      camera.parent = chestPivot;

      aimYaw = 0.0;
      aimPitch = CHEST_LOCK.pitch;
      applyChestMountAimed();

      hipsBone = findHipsBone(sk);
      if(hipsBone && BOB.LOCK_HIPS_Y){
        hipsBaseY = hipsBone.position.y;
      }

      hudSoldier.textContent = "SOLDIER, loaded";
      updatePosHud();
    }

    async function loadWeaponToRightHand(sku){
      clearWeapon();

      const T = (sku === "wz_cityrunner_smg") ? WEAPON_TUNING.wz_cityrunner_smg : WEAPON_TUNING.wz_basic_pistol;
      const asset = getWeaponAsset(sku);

      const w = await BABYLON.SceneLoader.LoadAssetContainerAsync(asset.rootUrl, asset.fileName, scene);
      w.addAllToScene();
      weaponContainer = w;

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const rh = findRightHandBone(sk);

      if(rh && soldierSkinned){
        weaponRoot.attachToBone(rh, soldierSkinned);
      } else {
        weaponRoot.parent = soldierRoot;
        weaponRoot.position.set(0.35, 1.10, 0.25);
      }

      weaponRoot.position.copyFrom(T.WEAPON_POS);
      weaponRoot.rotation.set(
        (T.WEAPON_PITCH_FIX || 0.0),
        Math.PI + (T.WEAPON_YAW_FIX || 0.0),
        0
      );
      weaponRoot.scaling.set(T.WEAPON_SCALE, T.WEAPON_SCALE, T.WEAPON_SCALE);

      weaponGrip.position.copyFrom(T.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(T.WEAPON_GRIP_ROT);

      (w.meshes || []).forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        try{
          m.parent = weaponGrip;
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = 1.0;
          m.setEnabled(true);
        }catch(e){}
      });

      weaponSku = sku;

      // Sync tuner UI and apply yaw tuner immediately for this weapon
      syncGripYawUi();
      applyGripYawToWeapon();

      hudWeapon.textContent = (weaponSku === "wz_cityrunner_smg") ? "WEAPON, SMG" : "WEAPON, pistol";
      weaponBtn.textContent = (weaponSku === "wz_cityrunner_smg") ? "Weapon, SMG" : "Weapon, pistol";
      setFireModeLabel();
    }

    function resetAll(){
      if(!soldierRoot) return;
      soldierRoot.position.set(0,0,0);
      soldierRoot.rotation.y = 0;
      aimYaw = 0.0;
      aimPitch = CHEST_LOCK.pitch;
      applyChestMountAimed();
      if(soldierContainer) playIdleAnimationsSlow(soldierContainer);
      if(hipsBone && hipsBaseY !== null){ hipsBone.position.y = hipsBaseY; }
      updatePosHud();
    }

    function randSpread(spread){
      const a = (Math.random() * 2 - 1) * spread;
      const b = (Math.random() * 2 - 1) * spread;
      return new BABYLON.Vector3(a, b, 0);
    }

    function getMuzzleOrigin(){
      if(weaponGrip){
        try{ return weaponGrip.getAbsolutePosition().clone(); }catch(e){}
      }
      const p = camera.getAbsolutePosition();
      const dir = camera.getForwardRay(1).direction;
      return p.add(dir.scale(0.35));
    }

    function shootOnce(){
      if(!scene || !camera) return;

      const mode = (weaponSku === "wz_cityrunner_smg") ? "smg" : "pistol";
      const cfg = FIRE[mode];

      const origin = getMuzzleOrigin();

      // Aim direction from muzzle toward the reticle ray target, so bullets line up with the crosshair
      const camPos = camera.getAbsolutePosition();
      const camDir = camera.getForwardRay(1).direction.clone();
      const target = camPos.add(camDir.scale(cfg.maxDist));

      let dir = target.subtract(origin).normalize();

      const s = randSpread(cfg.spread);
      dir = dir.add(new BABYLON.Vector3(s.x, s.y, 0)).normalize();

      const ray = new BABYLON.Ray(origin, dir, cfg.maxDist);

      const pick = scene.pickWithRay(ray, (m) => {
        if(!m) return false;
        if(m === weaponRoot) return false;
        if(m === weaponGrip) return false;
        if(m.parent === weaponGrip) return false;
        return true;
      });

      const hitPoint = (pick && pick.hit && pick.pickedPoint) ? pick.pickedPoint.clone() : origin.add(dir.scale(cfg.maxDist));

      const tracer = BABYLON.MeshBuilder.CreateLines("tr", { points: [origin, hitPoint] }, scene);
      tracer.isPickable = false;
      tracer.alpha = 0.9;
      tracer.color = new BABYLON.Color3(0.9, 0.95, 1.0);
      tracer.renderingGroupId = 3;
      setTimeout(() => { try{ tracer.dispose(); }catch(e){} }, Math.round(cfg.tracerLife * 1000));

      const flash = BABYLON.MeshBuilder.CreateSphere("mf", { diameter: 0.06 }, scene);
      flash.isPickable = false;
      flash.renderingGroupId = 3;
      const mm = new BABYLON.StandardMaterial("mfm", scene);
      mm.emissiveColor = new BABYLON.Color3(1.0, 0.85, 0.35);
      mm.diffuseColor = new BABYLON.Color3(0,0,0);
      mm.specularColor = new BABYLON.Color3(0,0,0);
      flash.material = mm;
      flash.position.copyFrom(origin);
      setTimeout(() => { try{ flash.dispose(); }catch(e){} }, 40);

      if(pick && pick.hit) flashHit();
    }

    function startFiring(){
      isFiring = true;
      if(weaponSku === "wz_basic_pistol"){
        shootOnce();
        isFiring = false;
      } else {
        // Set next shot time immediately, avoids backlog loops and prevents freezes
        nextShotAt = performance.now() * 0.001;
      }
    }
    function stopFiring(){ isFiring = false; }

    function createScene(){
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,0);

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.10;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.2,-1,-0.1), scene);
      dir.intensity = 0.55;

      const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 220, height: 220 }, scene);
      const grid = new BABYLON.GridMaterial("grid", scene);
      grid.majorUnitFrequency = 5;
      grid.minorUnitVisibility = 0.25;
      grid.gridRatio = 1;
      grid.backFaceCulling = false;
      grid.opacity = 0.35;
      ground.material = grid;
      ground.isPickable = true;

      camera = new BABYLON.UniversalCamera("chestCam", new BABYLON.Vector3(0,1.6,0), scene);
      camera.minZ = 0.02;
      camera.maxZ = 5000;
      camera.fov = 1.0;
      camera.inputs.clear();
      scene.activeCamera = camera;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      scene.onAfterAnimationsObservable.add(() => {
        if(BOB.LOCK_HIPS_Y && hipsBone && hipsBaseY !== null){
          hipsBone.position.y = hipsBaseY;
        }
      });

      const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

      scene.onBeforeRenderObservable.add(() => {
        if(!soldierRoot || !chestPivot) return;

        const dt = scene.getEngine().getDeltaTime() * 0.001;
        const now = performance.now() * 0.001;

        // RIGHT stick LOOK
        const lookMult = isTouch ? LOOK_SENS.TOUCH_MULT : 1.0;
        const lookX = applyDeadzone(lookState.dx) * lookMult;
        const lookY = applyDeadzone(lookState.dy) * lookMult;

        // Yaw, right = turn right, left = turn left
        aimYaw   += (lookX * LOOK.YAW_SPEED * dt);

        // Pitch, up = look up, down = look down
        aimPitch += (lookY * LOOK.PITCH_SPEED * dt);
        aimPitch  = clamp(aimPitch, LOOK.PITCH_MIN, LOOK.PITCH_MAX);

        // LEFT stick MOVE
        let mvX = applyDeadzone(moveState.dx);
        let mvY = applyDeadzone(moveState.dy);

        if(!moveState.active){
          const kx = (keys.d ? 1 : 0) + (keys.a ? -1 : 0);
          const ky = (keys.s ? 1 : 0) + (keys.w ? -1 : 0);
          mvX = clamp(kx, -1, 1);
          mvY = clamp(ky, -1, 1);
        }

        soldierRoot.rotation.y = aimYaw;

        const yaw = soldierRoot.rotation.y;
        const forward = new BABYLON.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right   = new BABYLON.Vector3(forward.z, 0, -forward.x);

        const moveF = -mvY;
        const moveS = mvX;

        const spd = JOY.MOVE_SPEED * dt;
        const delta = forward.scale(moveF * spd).add(right.scale(moveS * spd));
        soldierRoot.position.addInPlace(new BABYLON.Vector3(delta.x, 0, delta.z));

        applyChestMountAimed();

        // SMG firing, single shot per interval, no while loop backlog, prevents screen freeze
        if(isFiring && weaponSku === "wz_cityrunner_smg"){
          const cfg = FIRE.smg;
          const interval = 60.0 / cfg.rpm;
          if(now >= nextShotAt){
            shootOnce();
            nextShotAt = now + interval;
          }
        }

        updatePosHud();
      });

      return scene;
    }

    (function(){
      fireBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        startFiring();
      }, { passive:false });

      function end(){ stopFiring(); }
      fireBtn.addEventListener("pointerup", end, { passive:true });
      fireBtn.addEventListener("pointercancel", end, { passive:true });

      // Prevent any stray selection gestures from the fire button
      fireBtn.addEventListener("touchstart", (e) => { e.preventDefault(); }, { passive:false });
    })();

    resetBtn.addEventListener("click", resetAll);

    weaponBtn.addEventListener("click", async () => {
      const next = (weaponSku === "wz_basic_pistol") ? "wz_cityrunner_smg" : "wz_basic_pistol";
      try{ await loadWeaponToRightHand(next); }catch(e){ console.warn("weapon swap failed", e); }
    });

    (async function(){
      loadGripTuner();
      createScene();
      try{
        await loadSoldierAndChestCam();
        await loadWeaponToRightHand("wz_basic_pistol");
        applyChestMountAimed();
        syncGripYawUi();
        setFireModeLabel();
      }catch(e){
        console.error("[CHEST CAM TEST] boot failed", e);
        hudSoldier.textContent = "SOLDIER, failed";
      }
    })();
  </script>

  <!--
    What I adjusted, in plain terms,
    1, Fixed left and right being reversed on BOTH sticks by inverting only the X axis after the portrait rotation mapping,
    2, Added a Grip yaw slider that rotates the weaponGrip left or right, per weapon, it is saved in localStorage, so you can tune pistol and SMG separately,
    3, Fixed SMG fire freeze by removing the while loop backlog, now it fires one shot per interval, no catch up loops, much lighter on pickWithRay and mesh creation,
    4, Kept hard blocks against text selection and context menus so moving and aiming never highlights page UI
  -->
</body>
</html>
