<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone test, soldier + weapon attach, keyboard tuner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
      outline:none;
    }
    /* debug text */
    #hud{
      position:fixed;
      left:10px;
      top:10px;
      z-index:9999;
      color:#35ff6b;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      line-height:1.35;
      text-shadow: 0 0 10px rgba(0,0,0,.85);
      white-space:pre;
      pointer-events:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud">Loading...</div>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const hud = document.getElementById("hud");

    canvas.tabIndex = 1;
    canvas.addEventListener("pointerdown", () => canvas.focus());
    window.addEventListener("keydown", () => canvas.focus());

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });
    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);

    const camera = new BABYLON.ArcRotateCamera(
      "cam", Math.PI * 1.2, Math.PI / 2.35, 10.0,
      new BABYLON.Vector3(0, 1.0, 0), scene
    );
    camera.attachControl(canvas, true);
    camera.panningSensibility = 0;
    camera.wheelPrecision = 60;

    // allow arrow keys for our tuner, kill camera keyboard
    camera.inputs.removeByType("ArcRotateCameraKeyboardMoveInput");
    if (camera.inputs && camera.inputs.attached && camera.inputs.attached.keyboard) {
      camera.inputs.attached.keyboard.keysUp = [];
      camera.inputs.attached.keyboard.keysDown = [];
      camera.inputs.attached.keyboard.keysLeft = [];
      camera.inputs.attached.keyboard.keysRight = [];
    }

    const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
    hemi.intensity = 1.05;

    const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
    dir.intensity = 0.95;

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // ---------- config ----------
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    const BASIC_PISTOL_ROOT   = "/assets/warzone3d/weapons/wz_basic_pistol/";
    const CITYRUNNER_SMG_ROOT = "/assets/warzone3d/weapons/wz_cityrunner_smg/";
    const WEAPON_FILE = "scene.gltf";

    const WEAPON_MAP = {
      basic_pistol:   { root: BASIC_PISTOL_ROOT,   file: WEAPON_FILE },
      cityrunner_smg: { root: CITYRUNNER_SMG_ROOT, file: WEAPON_FILE }
    };

    // Start on SMG (with fixes)
    let ACTIVE_WEAPON_KEY = "cityrunner_smg";

    const SOLDIER_ANIM_SPEED = 0.65;
    const AUTO_OSC_SPEED = 0.35;
    const AUTO_MAX_YAW   = Math.PI * 0.45;

    // ----- Per-weapon defaults -----
    const PRESETS = {
      basic_pistol: {
        WEAPON_SCALE: 0.07,
        WEAPON_YAW_FIX: Math.PI * 0.5,
        WEAPON_PITCH_FIX: 0.00,

        WEAPON_POS:      new BABYLON.Vector3(-1.069,  0.327, -0.058),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 3.634, -0.030, -11.272),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.260, -0.040,  0.010)
      },
      cityrunner_smg: {
        WEAPON_SCALE: 0.11,
        WEAPON_YAW_FIX: Math.PI * 0.5,

        // points up to counter "downward barrel"
        WEAPON_PITCH_FIX: -0.55,

        WEAPON_POS:      new BABYLON.Vector3(-1.069,  0.327, -0.058),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 3.634, -0.030, -11.272),

        // less downward tilt than pistol, as a starting point
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.120, -0.040,  0.010)
      }
    };

    const TUNE = {
      WEAPON_SCALE: 0.07,
      WEAPON_YAW_FIX: Math.PI * 0.5,
      WEAPON_PITCH_FIX: 0.0,
      WEAPON_POS: new BABYLON.Vector3(0,0,0),
      WEAPON_GRIP_POS: new BABYLON.Vector3(0,0,0),
      WEAPON_GRIP_ROT: new BABYLON.Vector3(0,0,0)
    };

    function loadPresetIntoTune(key){
      const p = PRESETS[key] || PRESETS.basic_pistol;
      TUNE.WEAPON_SCALE = p.WEAPON_SCALE;
      TUNE.WEAPON_YAW_FIX = p.WEAPON_YAW_FIX;
      TUNE.WEAPON_PITCH_FIX = p.WEAPON_PITCH_FIX;
      TUNE.WEAPON_POS.copyFrom(p.WEAPON_POS);
      TUNE.WEAPON_GRIP_POS.copyFrom(p.WEAPON_GRIP_POS);
      TUNE.WEAPON_GRIP_ROT.copyFrom(p.WEAPON_GRIP_ROT);
    }

    function saveTuneBackToPreset(key){
      const p = PRESETS[key] || PRESETS.basic_pistol;
      p.WEAPON_SCALE = TUNE.WEAPON_SCALE;
      p.WEAPON_YAW_FIX = TUNE.WEAPON_YAW_FIX;
      p.WEAPON_PITCH_FIX = TUNE.WEAPON_PITCH_FIX;
      p.WEAPON_POS.copyFrom(TUNE.WEAPON_POS);
      p.WEAPON_GRIP_POS.copyFrom(TUNE.WEAPON_GRIP_POS);
      p.WEAPON_GRIP_ROT.copyFrom(TUNE.WEAPON_GRIP_ROT);
    }

    // Arm correction (same as before)
    const qArm     = BABYLON.Quaternion.FromEulerAngles(-0.10,  0.00,  0.00);
    const qForeArm = BABYLON.Quaternion.FromEulerAngles(-0.25,  0.00,  0.00);
    const qShould  = BABYLON.Quaternion.FromEulerAngles( 0.00,  0.00, -0.05);

    const WRIST_TWIST_ON = false;
    const qWrist = BABYLON.Quaternion.FromEulerAngles(0.00, 0.00, -0.25);

    // ---------- helpers ----------
    async function fetchHeadOrGet(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
      }catch(e){}
      return fetch(url, { method:"GET", cache:"no-store" });
    }

    async function checkUrl(url){
      try{
        const r = await fetchHeadOrGet(url);
        const ct = (r.headers && r.headers.get) ? (r.headers.get("content-type") || "") : "";
        return { ok: r.ok, status: r.status, ct };
      }catch(e){
        return { ok:false, status:0, ct:String(e) };
      }
    }

    function joinUrl(rootUrl, rel){
      if (!rel) return rootUrl;
      if (/^https?:\/\//i.test(rel)) return rel;
      if (rel.startsWith("/")) return rel;
      return rootUrl + rel;
    }

    async function preflightGltf(rootUrl, fileName, label){
      const gltfUrl = rootUrl + fileName;
      hud.textContent += `\n[check] ${label} gltf: ${gltfUrl}`;

      const gltfCheck = await checkUrl(gltfUrl);
      hud.textContent += `\n       status: ${gltfCheck.status} ok:${gltfCheck.ok}`;
      if (!gltfCheck.ok) return false;

      let gltf;
      try{
        const r = await fetch(gltfUrl, { cache:"no-store" });
        gltf = await r.json();
      }catch(e){
        hud.textContent += `\n       json read failed`;
        return false;
      }

      const deps = [];
      if (Array.isArray(gltf.buffers)) gltf.buffers.forEach(b => b?.uri && deps.push(b.uri));
      if (Array.isArray(gltf.images))  gltf.images.forEach(i => i?.uri && deps.push(i.uri));

      for (const uri of deps){
        const url = joinUrl(rootUrl, uri);
        const st = await checkUrl(url);
        hud.textContent += `\n       dep: ${uri} -> ${st.status} ok:${st.ok}`;
        if (!st.ok) return false;
      }
      return true;
    }

    function getBounds(node){
      const b = node.getHierarchyBoundingVectors(true);
      return { min: b.min.clone(), max: b.max.clone() };
    }

    function normalizeToGroundAndHeight(root, targetHeight = 1.75){
      const bb1 = getBounds(root);
      const size1 = bb1.max.subtract(bb1.min);
      const h1 = Math.max(0.000001, size1.y);

      const s = targetHeight / h1;
      root.scaling = new BABYLON.Vector3(s, s, s);

      const bb2 = getBounds(root);
      root.position.y -= bb2.min.y;
      return s;
    }

    function frameCameraToRoot(root){
      const bb = getBounds(root);
      const size = bb.max.subtract(bb.min);
      const center = bb.min.add(size.scale(0.5));
      const maxDim = Math.max(size.x, size.y, size.z) || 1;

      camera.target = center;
      camera.radius = maxDim * 1.9;
      camera.lowerRadiusLimit = camera.radius * 0.5;
      camera.upperRadiusLimit = camera.radius * 4.0;
    }

    async function importModel(label, rootUrl, fileName){
      hud.textContent += `\n[load] ${label}: ${rootUrl}${fileName}`;
      const result = await BABYLON.SceneLoader.ImportMeshAsync("", rootUrl, fileName, scene);

      const wrapper = new BABYLON.TransformNode(label + "Root", scene);

      const gltfRoot = result.meshes && result.meshes.length ? result.meshes[0] : null;
      if (gltfRoot) gltfRoot.parent = wrapper;
      else result.meshes.forEach(m => { m.parent = wrapper; });

      hud.textContent += `\n       meshes:${(result.meshes||[]).length} skeletons:${(result.skeletons||[]).length} animGroups:${(result.animationGroups||[]).length}`;
      return { root: wrapper, result };
    }

    function findSkinnedMesh(importResult){
      const meshes = importResult?.meshes || [];
      return meshes.find(m => m && m.skeleton) || null;
    }

    function findBoneByNameOrIncludes(skeleton, want){
      if (!skeleton || !skeleton.bones) return null;
      const exact = skeleton.bones.find(b => (b.name || "") === want);
      if (exact) return exact;
      const wantLow = (want || "").toLowerCase();
      return skeleton.bones.find(b => ((b.name || "").toLowerCase().includes(wantLow))) || null;
    }

    // ---- live refs ----
    let soldier = null;
    let weapon = null;
    let attachInfo = null;

    let weaponRoot = null;
    let weaponGrip = null;

    function attachWeaponToRightHandLive(soldierImport, weaponImport){
      const skinned = findSkinnedMesh(soldierImport.result);
      const skeleton = skinned?.skeleton || (soldierImport.result?.skeletons?.[0] || null);
      if (!skinned || !skeleton) return { ok:false };

      const boneNameExact = "mixamorig:RightHand.209_221";
      let rightHand = findBoneByNameOrIncludes(skeleton, boneNameExact);
      if (!rightHand){
        rightHand = skeleton.bones.find(b => /RightHand/i.test(b.name || "")) || null;
      }
      if (!rightHand) return { ok:false };

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponRoot.attachToBone(rightHand, skinned);

      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      (weaponImport.result?.meshes || []).forEach(m => {
        if (!m) return;
        if (m === weaponImport.result.meshes[0]) return;
        m.parent = weaponGrip;
      });

      const rightArm      = findBoneByNameOrIncludes(skeleton, "mixamorig:RightArm.207_219") || findBoneByNameOrIncludes(skeleton, "RightArm");
      const rightForeArm  = findBoneByNameOrIncludes(skeleton, "mixamorig:RightForeArm.208_220") || findBoneByNameOrIncludes(skeleton, "RightForeArm");
      const rightShoulder = findBoneByNameOrIncludes(skeleton, "mixamorig:RightShoulder.206_218") || findBoneByNameOrIncludes(skeleton, "RightShoulder");

      return { ok:true, skinned, bones: { rightHand, rightArm, rightForeArm, rightShoulder } };
    }

    function applyTuneToWeapon(){
      if (!weaponRoot || !weaponGrip) return;

      weaponRoot.position.copyFrom(TUNE.WEAPON_POS);
      weaponRoot.rotation.set(
        TUNE.WEAPON_PITCH_FIX,
        Math.PI + TUNE.WEAPON_YAW_FIX,
        0
      );
      weaponRoot.scaling.set(TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE);

      weaponGrip.position.copyFrom(TUNE.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(TUNE.WEAPON_GRIP_ROT);
    }

    function clearWeaponModel(){
      try{ if (weapon && weapon.root) weapon.root.dispose(false, true); }catch(e){}
      try{ if (weaponRoot) weaponRoot.dispose(false, true); }catch(e){}
      try{ if (weaponGrip) weaponGrip.dispose(false, true); }catch(e){}
      weapon = null;
      weaponRoot = null;
      weaponGrip = null;
      attachInfo = null;
    }

    async function loadWeapon(key){
      clearWeaponModel();

      const cfg = WEAPON_MAP[key] || WEAPON_MAP.basic_pistol;
      const okWeapon = await preflightGltf(cfg.root, cfg.file, `weapon:${key}`);
      if (!okWeapon){
        hud.textContent += `\n[FAIL] weapon preflight`;
        return;
      }

      weapon = await importModel("weapon", cfg.root, cfg.file);
      weapon.root.setEnabled(false);

      attachInfo = attachWeaponToRightHandLive(soldier, weapon);
      if (!attachInfo?.ok){
        hud.textContent += `\n[FAIL] attachWeaponToRightHand`;
        return;
      }

      applyTuneToWeapon();
      hud.textContent += `\n[OK] weapon attached`;
    }

    // ---------- Keyboard tuner ----------
    // Keys:
    //   1-6 select what to edit
    //   arrows = adjust axis (X/Y), Q/E = Z
    //   Shift = faster, Alt = slower
    //   Tab = cycle weapons
    //   C = copy constants to clipboard
    //   R = reset current weapon to its preset
    //
    // Modes:
    //   1: WEAPON_POS
    //   2: WEAPON_GRIP_POS
    //   3: WEAPON_GRIP_ROT
    //   4: YAW_FIX
    //   5: PITCH_FIX
    //   6: SCALE
    let MODE = 1;

    function stepForEvent(ev){
      let s = 0.01;
      if (ev.shiftKey) s = 0.05;
      if (ev.altKey)   s = 0.001;
      return s;
    }

    function lockText(){
      return `// LOCK THESE IN, ${ACTIVE_WEAPON_KEY}
const WEAPON_SCALE = ${TUNE.WEAPON_SCALE.toFixed(5)};
const WEAPON_YAW_FIX = ${TUNE.WEAPON_YAW_FIX.toFixed(5)};
const WEAPON_PITCH_FIX = ${TUNE.WEAPON_PITCH_FIX.toFixed(5)};

const WEAPON_POS      = new BABYLON.Vector3(${TUNE.WEAPON_POS.x.toFixed(5)}, ${TUNE.WEAPON_POS.y.toFixed(5)}, ${TUNE.WEAPON_POS.z.toFixed(5)});
const WEAPON_GRIP_POS = new BABYLON.Vector3(${TUNE.WEAPON_GRIP_POS.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.z.toFixed(5)});
const WEAPON_GRIP_ROT = new BABYLON.Vector3(${TUNE.WEAPON_GRIP_ROT.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.z.toFixed(5)});`;
    }

    async function copyLock(){
      const txt = lockText();
      try{
        await navigator.clipboard.writeText(txt);
        hud.textContent += `\n[COPIED]`;
      }catch(e){
        prompt("Copy these constants", txt);
      }
    }

    function printHud(){
      const modeName =
        MODE===1 ? "WEAPON_POS" :
        MODE===2 ? "GRIP_POS" :
        MODE===3 ? "GRIP_ROT" :
        MODE===4 ? "YAW_FIX" :
        MODE===5 ? "PITCH_FIX" :
        MODE===6 ? "SCALE" : "???";

      hud.textContent =
`Weapon: ${ACTIVE_WEAPON_KEY}   Mode: ${MODE} (${modeName})
Keys: 1-6 mode, arrows XY, Q/E Z, Shift fast, Alt slow, Tab switch weapon, R reset, C copy

WEAPON_POS     : ${TUNE.WEAPON_POS.x.toFixed(5)}, ${TUNE.WEAPON_POS.y.toFixed(5)}, ${TUNE.WEAPON_POS.z.toFixed(5)}
GRIP_POS       : ${TUNE.WEAPON_GRIP_POS.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_POS.z.toFixed(5)}
GRIP_ROT       : ${TUNE.WEAPON_GRIP_ROT.x.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.y.toFixed(5)}, ${TUNE.WEAPON_GRIP_ROT.z.toFixed(5)}
YAW_FIX        : ${TUNE.WEAPON_YAW_FIX.toFixed(5)}
PITCH_FIX      : ${TUNE.WEAPON_PITCH_FIX.toFixed(5)}
SCALE          : ${TUNE.WEAPON_SCALE.toFixed(5)}

${lockText()}`;
    }

    function adjust(ev, dx, dy, dz){
      const s = stepForEvent(ev);
      if (MODE === 1){
        TUNE.WEAPON_POS.x += dx*s; TUNE.WEAPON_POS.y += dy*s; TUNE.WEAPON_POS.z += dz*s;
      } else if (MODE === 2){
        TUNE.WEAPON_GRIP_POS.x += dx*s; TUNE.WEAPON_GRIP_POS.y += dy*s; TUNE.WEAPON_GRIP_POS.z += dz*s;
      } else if (MODE === 3){
        TUNE.WEAPON_GRIP_ROT.x += dx*s; TUNE.WEAPON_GRIP_ROT.y += dy*s; TUNE.WEAPON_GRIP_ROT.z += dz*s;
      } else if (MODE === 4){
        TUNE.WEAPON_YAW_FIX += dx*s; // use left/right
      } else if (MODE === 5){
        TUNE.WEAPON_PITCH_FIX += dy*s; // use up/down
      } else if (MODE === 6){
        TUNE.WEAPON_SCALE = Math.max(0.0001, TUNE.WEAPON_SCALE + dy*s); // up/down
      }
      applyTuneToWeapon();
      saveTuneBackToPreset(ACTIVE_WEAPON_KEY);
      printHud();
    }

    window.addEventListener("keydown", async (ev) => {
      // prevent scrolling
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Tab"," "].includes(ev.key)) ev.preventDefault();

      if (ev.key >= "1" && ev.key <= "6"){
        MODE = parseInt(ev.key, 10);
        printHud();
        return;
      }

      if (ev.key === "Tab"){
        ev.preventDefault();
        saveTuneBackToPreset(ACTIVE_WEAPON_KEY);
        ACTIVE_WEAPON_KEY = (ACTIVE_WEAPON_KEY === "cityrunner_smg") ? "basic_pistol" : "cityrunner_smg";
        loadPresetIntoTune(ACTIVE_WEAPON_KEY);
        await loadWeapon(ACTIVE_WEAPON_KEY);
        printHud();
        return;
      }

      if (ev.key.toLowerCase() === "r"){
        loadPresetIntoTune(ACTIVE_WEAPON_KEY);
        applyTuneToWeapon();
        printHud();
        return;
      }

      if (ev.key.toLowerCase() === "c"){
        await copyLock();
        printHud();
        return;
      }

      // Arrow/QE adjustments
      if (ev.key === "ArrowLeft")  return adjust(ev, -1,  0,  0);
      if (ev.key === "ArrowRight") return adjust(ev,  1,  0,  0);
      if (ev.key === "ArrowUp")    return adjust(ev,  0,  1,  0);
      if (ev.key === "ArrowDown")  return adjust(ev,  0, -1,  0);
      if (ev.key.toLowerCase() === "q") return adjust(ev, 0, 0, -1);
      if (ev.key.toLowerCase() === "e") return adjust(ev, 0, 0,  1);
    }, { passive:false });

    // ---------- main ----------
    (async () => {
      try{
        hud.textContent = "Loading, preflight soldier...";
        const okSoldier = await preflightGltf(SOLDIER_ROOT, SOLDIER_FILE, "soldier");
        if (!okSoldier){
          hud.textContent += "\n[FAIL] soldier preflight";
          return;
        }

        soldier = await importModel("soldier", SOLDIER_ROOT, SOLDIER_FILE);
        soldier.root.rotation.y = Math.PI;
        normalizeToGroundAndHeight(soldier.root, 1.75);

        const ag = soldier.result?.animationGroups || [];
        if (ag.length){
          ag.forEach(g => g.stop());
          ag[0].start(true);
          ag[0].speedRatio = SOLDIER_ANIM_SPEED;
        }

        frameCameraToRoot(soldier.root);

        // start on SMG preset
        loadPresetIntoTune(ACTIVE_WEAPON_KEY);
        await loadWeapon(ACTIVE_WEAPON_KEY);

        scene.onBeforeRenderObservable.clear();

        let t = 0;
        const baseY = soldier.root.rotation.y;

        scene.onBeforeRenderObservable.add(() => {
          const dt = scene.getEngine().getDeltaTime() * 0.001;

          t += dt * AUTO_OSC_SPEED;
          const yaw = Math.sin(t) * AUTO_MAX_YAW;
          soldier.root.rotation.y = baseY + yaw;

          if (attachInfo?.ok && attachInfo?.bones && attachInfo?.skinned){
            const skinned = attachInfo.skinned;
            const b = attachInfo.bones;

            if (b.rightShoulder && b.rightShoulder.getRotationQuaternion){
              const cur = b.rightShoulder.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightShoulder.setRotationQuaternion(cur.multiply(qShould), BABYLON.Space.LOCAL, skinned);
            }
            if (b.rightArm && b.rightArm.getRotationQuaternion){
              const cur = b.rightArm.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightArm.setRotationQuaternion(cur.multiply(qArm), BABYLON.Space.LOCAL, skinned);
            }
            if (b.rightForeArm && b.rightForeArm.getRotationQuaternion){
              const cur = b.rightForeArm.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightForeArm.setRotationQuaternion(cur.multiply(qForeArm), BABYLON.Space.LOCAL, skinned);
            }
            if (WRIST_TWIST_ON && b.rightHand && b.rightHand.getRotationQuaternion){
              const cur = b.rightHand.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightHand.setRotationQuaternion(cur.multiply(qWrist), BABYLON.Space.LOCAL, skinned);
            }
          }
        });

        printHud();

      }catch(e){
        hud.textContent += "\n[EXCEPTION] " + (e?.message || e);
        console.warn("Test failed", e);
      }
    })();
  </script>
</body>
</html>
