<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone test, soldier + weapon attach, iPhone tuner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
      outline:none;
    }

    /* ---- iPhone tuning HUD ---- */
    .hud{
      position:fixed;
      left:10px;
      right:10px;
      bottom:10px;
      z-index:9999;
      pointer-events:none;
    }
    .panel{
      pointer-events:auto;
      background:rgba(0,0,0,.72);
      border:1px solid rgba(127,209,255,.35);
      border-radius:14px;
      padding:10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 0 24px rgba(0,0,0,.6);
    }
    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .row:last-child{ margin-bottom:0; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(127,209,255,.35);
      background:rgba(10,14,28,.75);
      color:#e7f0ff;
      font-size:12px;
      letter-spacing:.02em;
      user-select:none;
      -webkit-user-select:none;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 10px;
      background:linear-gradient(90deg,#0ff,#7fd1ff);
      color:#001520;
      font-weight:800;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
      user-select:none;
      -webkit-user-select:none;
    }
    .btn.secondary{
      background:linear-gradient(90deg,#ff3b6b,#ffcf4d);
      color:#1b0a10;
    }
    .btn.ghost{
      background:transparent;
      border:1px solid rgba(127,209,255,.35);
      color:#e7f0ff;
      font-weight:700;
      letter-spacing:.08em;
    }
    .small{
      font-size:11px;
      color:#9fb0d6;
      margin-left:auto;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:6px;
      margin-top:6px;
    }
    .axis{
      border:1px solid rgba(127,209,255,.25);
      border-radius:12px;
      padding:8px;
      background:rgba(5,8,18,.72);
    }
    .axis h4{
      margin:0 0 6px 0;
      font-size:11px;
      color:#cfe2ff;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .axis .mini{
      display:flex;
      gap:6px;
      align-items:center;
      margin-bottom:6px;
    }
    .axis .mini:last-child{ margin-bottom:0; }

    .mini .label{
      width:18px;
      text-align:center;
      font-weight:800;
      color:#7fd1ff;
      font-size:12px;
    }
    .mini .val{
      flex:1;
      color:#e7f0ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      opacity:.95;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .mini .b{
      width:44px;
      padding:7px 0;
      border-radius:10px;
      border:1px solid rgba(127,209,255,.35);
      background:rgba(2,6,14,.7);
      color:#e7f0ff;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
    }

    .copybox{
      margin-top:8px;
      padding:8px;
      border-radius:12px;
      border:1px dashed rgba(127,209,255,.35);
      background:rgba(2,6,14,.55);
      color:#cfe2ff;
      font-size:11px;
      line-height:1.35;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      white-space:pre;
      overflow:auto;
      max-height:160px;
    }

    @media (max-height: 700px){
      .copybox{ max-height:120px; }
    }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- iPhone tuning HUD -->
  <div class="hud">
    <div class="panel">
      <div class="row">
        <div class="pill" id="weaponLabel">Weapon, cityrunner_smg</div>

        <button class="btn ghost" id="weaponToggle">Switch weapon</button>

        <button class="btn ghost" id="resetBtn">Reset</button>

        <button class="btn secondary" id="copyBtn">Copy</button>

        <div class="small">
          Step, <span id="stepLabel">0.01</span>
        </div>
      </div>

      <div class="row">
        <button class="btn ghost" data-step="0.001">0.001</button>
        <button class="btn ghost" data-step="0.005">0.005</button>
        <button class="btn ghost" data-step="0.01">0.01</button>
        <button class="btn ghost" data-step="0.05">0.05</button>
      </div>

      <div class="grid">
        <div class="axis">
          <h4>WEAPON_POS</h4>
          <div class="mini">
            <div class="label">X</div>
            <div class="val" id="wpX"></div>
            <button class="b" data-k="WEAPON_POS.x" data-d="-">-</button>
            <button class="b" data-k="WEAPON_POS.x" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Y</div>
            <div class="val" id="wpY"></div>
            <button class="b" data-k="WEAPON_POS.y" data-d="-">-</button>
            <button class="b" data-k="WEAPON_POS.y" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Z</div>
            <div class="val" id="wpZ"></div>
            <button class="b" data-k="WEAPON_POS.z" data-d="-">-</button>
            <button class="b" data-k="WEAPON_POS.z" data-d="+">+</button>
          </div>
        </div>

        <div class="axis">
          <h4>GRIP_POS</h4>
          <div class="mini">
            <div class="label">X</div>
            <div class="val" id="gpX"></div>
            <button class="b" data-k="WEAPON_GRIP_POS.x" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_POS.x" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Y</div>
            <div class="val" id="gpY"></div>
            <button class="b" data-k="WEAPON_GRIP_POS.y" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_POS.y" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Z</div>
            <div class="val" id="gpZ"></div>
            <button class="b" data-k="WEAPON_GRIP_POS.z" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_POS.z" data-d="+">+</button>
          </div>
        </div>

        <div class="axis">
          <h4>GRIP_ROT</h4>
          <div class="mini">
            <div class="label">X</div>
            <div class="val" id="grX"></div>
            <button class="b" data-k="WEAPON_GRIP_ROT.x" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_ROT.x" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Y</div>
            <div class="val" id="grY"></div>
            <button class="b" data-k="WEAPON_GRIP_ROT.y" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_ROT.y" data-d="+">+</button>
          </div>
          <div class="mini">
            <div class="label">Z</div>
            <div class="val" id="grZ"></div>
            <button class="b" data-k="WEAPON_GRIP_ROT.z" data-d="-">-</button>
            <button class="b" data-k="WEAPON_GRIP_ROT.z" data-d="+">+</button>
          </div>
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <div class="pill">Scale, <span id="scaleVal" style="font-family:ui-monospace;"></span></div>
        <button class="btn ghost" data-k="WEAPON_SCALE" data-d="-">Scale -</button>
        <button class="btn ghost" data-k="WEAPON_SCALE" data-d="+">Scale +</button>

        <div class="pill">YawFix, <span id="yawVal" style="font-family:ui-monospace;"></span></div>
        <button class="btn ghost" data-k="WEAPON_YAW_FIX" data-d="-">Yaw -</button>
        <button class="btn ghost" data-k="WEAPON_YAW_FIX" data-d="+">Yaw +</button>
      </div>

      <div class="copybox" id="copyBox"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("renderCanvas");
    canvas.tabIndex = 1;
    canvas.addEventListener("pointerdown", () => canvas.focus());

    const engine = new BABYLON.Engine(canvas, true, {
      preserveDrawingBuffer:true,
      stencil:true
    });

    const scene  = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);

    const camera = new BABYLON.ArcRotateCamera(
      "cam",
      Math.PI * 1.2,
      Math.PI / 2.35,
      10.0,
      new BABYLON.Vector3(0, 1.0, 0),
      scene
    );

    camera.attachControl(canvas, true);
    camera.panningSensibility = 0;
    camera.wheelPrecision = 60;

    camera.inputs.removeByType("ArcRotateCameraKeyboardMoveInput");
    if (camera.inputs && camera.inputs.attached && camera.inputs.attached.keyboard) {
      camera.inputs.attached.keyboard.keysUp = [];
      camera.inputs.attached.keyboard.keysDown = [];
      camera.inputs.attached.keyboard.keysLeft = [];
      camera.inputs.attached.keyboard.keysRight = [];
    }

    const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
    hemi.intensity = 1.05;

    const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.3,-1,-0.4), scene);
    dir.intensity = 0.95;

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // ---------- config ----------
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    const BASIC_PISTOL_ROOT = "/assets/warzone3d/weapons/wz_basic_pistol/";
    const CITYRUNNER_SMG_ROOT = "/assets/warzone3d/weapons/wz_cityrunner_smg/";
    const WEAPON_FILE = "scene.gltf";

    const WEAPON_MAP = {
      basic_pistol:   { root: BASIC_PISTOL_ROOT,   file: WEAPON_FILE },
      cityrunner_smg: { root: CITYRUNNER_SMG_ROOT, file: WEAPON_FILE }
    };

    // Start on SMG
    let ACTIVE_WEAPON_KEY = "cityrunner_smg";

    const SOLDIER_ANIM_SPEED = 0.65;

    const AUTO_OSC_SPEED = 0.35;
    const AUTO_MAX_YAW   = Math.PI * 0.45;

    // --- Tunables (defaults = your pistol lock-in) ---
    const DEFAULTS = {
      WEAPON_SCALE: 0.07,
      WEAPON_YAW_FIX: Math.PI * 0.5,

      WEAPON_POS:      new BABYLON.Vector3(-1.069,  0.327, -0.058),
      WEAPON_GRIP_POS: new BABYLON.Vector3( 3.634, -0.030, -11.272),
      WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.260, -0.040,  0.010)
    };

    const TUNE = {
      WEAPON_SCALE: DEFAULTS.WEAPON_SCALE,
      WEAPON_YAW_FIX: DEFAULTS.WEAPON_YAW_FIX,

      WEAPON_POS: DEFAULTS.WEAPON_POS.clone(),
      WEAPON_GRIP_POS: DEFAULTS.WEAPON_GRIP_POS.clone(),
      WEAPON_GRIP_ROT: DEFAULTS.WEAPON_GRIP_ROT.clone()
    };

    // Arm correction
    const qArm     = BABYLON.Quaternion.FromEulerAngles(-0.10,  0.00,  0.00);
    const qForeArm = BABYLON.Quaternion.FromEulerAngles(-0.25,  0.00,  0.00);
    const qShould  = BABYLON.Quaternion.FromEulerAngles( 0.00,  0.00, -0.05);

    const WRIST_TWIST_ON = false;
    const qWrist = BABYLON.Quaternion.FromEulerAngles(0.00, 0.00, -0.25);

    // ---------- helpers ----------
    async function fetchHeadOrGet(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
      }catch(e){}
      return fetch(url, { method:"GET", cache:"no-store" });
    }

    async function checkUrl(url){
      try{
        const r = await fetchHeadOrGet(url);
        const ct = (r.headers && r.headers.get) ? (r.headers.get("content-type") || "") : "";
        return { ok: r.ok, status: r.status, ct };
      }catch(e){
        return { ok:false, status:0, ct:String(e) };
      }
    }

    function joinUrl(rootUrl, rel){
      if (!rel) return rootUrl;
      if (/^https?:\/\//i.test(rel)) return rel;
      if (rel.startsWith("/")) return rel;
      return rootUrl + rel;
    }

    async function preflightGltf(rootUrl, fileName){
      const gltfUrl = rootUrl + fileName;

      const gltfCheck = await checkUrl(gltfUrl);
      if (!gltfCheck.ok) return false;

      let gltf;
      try{
        const r = await fetch(gltfUrl, { cache:"no-store" });
        gltf = await r.json();
      }catch(e){
        return false;
      }

      const deps = [];
      if (Array.isArray(gltf.buffers)){
        gltf.buffers.forEach(b => b?.uri && deps.push(b.uri));
      }
      if (Array.isArray(gltf.images)){
        gltf.images.forEach(img => img?.uri && deps.push(img.uri));
      }

      for (const uri of deps){
        const url = joinUrl(rootUrl, uri);
        const st = await checkUrl(url);
        if (!st.ok) return false;
      }
      return true;
    }

    function getBounds(node){
      const b = node.getHierarchyBoundingVectors(true);
      return { min: b.min.clone(), max: b.max.clone() };
    }

    function normalizeToGroundAndHeight(root, targetHeight = 1.75){
      const bb1 = getBounds(root);
      const size1 = bb1.max.subtract(bb1.min);
      const h1 = Math.max(0.000001, size1.y);

      const s = targetHeight / h1;
      root.scaling = new BABYLON.Vector3(s, s, s);

      const bb2 = getBounds(root);
      root.position.y -= bb2.min.y;
      return s;
    }

    function frameCameraToRoot(root){
      const bb = getBounds(root);
      const size = bb.max.subtract(bb.min);
      const center = bb.min.add(size.scale(0.5));
      const maxDim = Math.max(size.x, size.y, size.z) || 1;

      camera.target = center;
      camera.radius = maxDim * 1.9;
      camera.lowerRadiusLimit = camera.radius * 0.5;
      camera.upperRadiusLimit = camera.radius * 4.0;
    }

    async function importModel(label, rootUrl, fileName){
      const result = await BABYLON.SceneLoader.ImportMeshAsync("", rootUrl, fileName, scene);

      const wrapper = new BABYLON.TransformNode(label + "Root", scene);

      const gltfRoot = result.meshes && result.meshes.length ? result.meshes[0] : null;
      if (gltfRoot){
        gltfRoot.parent = wrapper;
      } else {
        result.meshes.forEach(m => { m.parent = wrapper; });
      }

      return { root: wrapper, result };
    }

    function findSkinnedMesh(importResult){
      const meshes = importResult?.meshes || [];
      return meshes.find(m => m && m.skeleton) || null;
    }

    function findBoneByNameOrIncludes(skeleton, want){
      if (!skeleton || !skeleton.bones) return null;

      const exact = skeleton.bones.find(b => (b.name || "") === want);
      if (exact) return exact;

      const wantLow = (want || "").toLowerCase();
      return skeleton.bones.find(b => ((b.name || "").toLowerCase().includes(wantLow))) || null;
    }

    // ---- live refs so we can retune without reload ----
    let soldier = null;
    let weapon = null;
    let attachInfo = null;

    let weaponRoot = null;
    let weaponGrip = null;
    let weaponMeshes = [];

    function attachWeaponToRightHandLive(soldierImport, weaponImport){
      const skinned = findSkinnedMesh(soldierImport.result);
      const skeleton = skinned?.skeleton || (soldierImport.result?.skeletons?.[0] || null);
      if (!skinned || !skeleton) return { ok:false };

      const boneNameExact = "mixamorig:RightHand.209_221";
      let rightHand = findBoneByNameOrIncludes(skeleton, boneNameExact);
      if (!rightHand){
        rightHand = skeleton.bones.find(b => /RightHand/i.test(b.name || "")) || null;
      }
      if (!rightHand) return { ok:false };

      // weaponRoot attaches to the hand bone
      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponRoot.attachToBone(rightHand, skinned);

      // weaponGrip re-centers model to land in palm
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      // Parent weapon meshes under weaponGrip
      weaponMeshes = [];
      (weaponImport.result?.meshes || []).forEach(m => {
        if (!m) return;
        if (m === weaponImport.result.meshes[0]) return;
        m.parent = weaponGrip;
        weaponMeshes.push(m);
      });

      const rightArm      = findBoneByNameOrIncludes(skeleton, "mixamorig:RightArm.207_219") || findBoneByNameOrIncludes(skeleton, "RightArm");
      const rightForeArm  = findBoneByNameOrIncludes(skeleton, "mixamorig:RightForeArm.208_220") || findBoneByNameOrIncludes(skeleton, "RightForeArm");
      const rightShoulder = findBoneByNameOrIncludes(skeleton, "mixamorig:RightShoulder.206_218") || findBoneByNameOrIncludes(skeleton, "RightShoulder");

      return { ok:true, skinned, bones: { rightHand, rightArm, rightForeArm, rightShoulder } };
    }

    function applyTuneToWeapon(){
      if (!weaponRoot || !weaponGrip) return;

      weaponRoot.position.copyFrom(TUNE.WEAPON_POS);
      weaponRoot.rotation.set(0, Math.PI + TUNE.WEAPON_YAW_FIX, 0);
      weaponRoot.scaling.set(TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE, TUNE.WEAPON_SCALE);

      weaponGrip.position.copyFrom(TUNE.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(TUNE.WEAPON_GRIP_ROT);
    }

    function clearWeaponModel(){
      try{
        if (weapon && weapon.root){
          weapon.root.dispose(false, true);
        }
      }catch(e){}
      try{
        if (weaponRoot){
          weaponRoot.dispose(false, true);
          weaponRoot = null;
        }
      }catch(e){}
      try{
        if (weaponGrip){
          weaponGrip.dispose(false, true);
          weaponGrip = null;
        }
      }catch(e){}
      weaponMeshes = [];
      weapon = null;
      attachInfo = null;
    }

    async function loadWeapon(key){
      clearWeaponModel();

      const cfg = WEAPON_MAP[key] || WEAPON_MAP.basic_pistol;

      const okWeapon = await preflightGltf(cfg.root, cfg.file);
      if (!okWeapon) return;

      weapon = await importModel("weapon", cfg.root, cfg.file);
      weapon.root.setEnabled(false);

      attachInfo = attachWeaponToRightHandLive(soldier, weapon);
      applyTuneToWeapon();
    }

    // ---- HUD wiring ----
    let STEP = 0.01;

    function fmt(n){
      const v = (typeof n === "number") ? n : 0;
      return (Math.round(v * 100000) / 100000).toFixed(5);
    }

    function updateHud(){
      document.getElementById("weaponLabel").textContent = "Weapon, " + ACTIVE_WEAPON_KEY;
      document.getElementById("stepLabel").textContent = STEP.toString();

      document.getElementById("wpX").textContent = fmt(TUNE.WEAPON_POS.x);
      document.getElementById("wpY").textContent = fmt(TUNE.WEAPON_POS.y);
      document.getElementById("wpZ").textContent = fmt(TUNE.WEAPON_POS.z);

      document.getElementById("gpX").textContent = fmt(TUNE.WEAPON_GRIP_POS.x);
      document.getElementById("gpY").textContent = fmt(TUNE.WEAPON_GRIP_POS.y);
      document.getElementById("gpZ").textContent = fmt(TUNE.WEAPON_GRIP_POS.z);

      document.getElementById("grX").textContent = fmt(TUNE.WEAPON_GRIP_ROT.x);
      document.getElementById("grY").textContent = fmt(TUNE.WEAPON_GRIP_ROT.y);
      document.getElementById("grZ").textContent = fmt(TUNE.WEAPON_GRIP_ROT.z);

      document.getElementById("scaleVal").textContent = fmt(TUNE.WEAPON_SCALE);
      document.getElementById("yawVal").textContent = fmt(TUNE.WEAPON_YAW_FIX);

      const txt =
`// LOCK THESE IN (screenshot this)
const WEAPON_SCALE = ${fmt(TUNE.WEAPON_SCALE)};
const WEAPON_YAW_FIX = ${fmt(TUNE.WEAPON_YAW_FIX)};

const WEAPON_POS      = new BABYLON.Vector3(${fmt(TUNE.WEAPON_POS.x)}, ${fmt(TUNE.WEAPON_POS.y)}, ${fmt(TUNE.WEAPON_POS.z)});
const WEAPON_GRIP_POS = new BABYLON.Vector3(${fmt(TUNE.WEAPON_GRIP_POS.x)}, ${fmt(TUNE.WEAPON_GRIP_POS.y)}, ${fmt(TUNE.WEAPON_GRIP_POS.z)});
const WEAPON_GRIP_ROT = new BABYLON.Vector3(${fmt(TUNE.WEAPON_GRIP_ROT.x)}, ${fmt(TUNE.WEAPON_GRIP_ROT.y)}, ${fmt(TUNE.WEAPON_GRIP_ROT.z)});`;

      document.getElementById("copyBox").textContent = txt;
    }

    function bump(path, dir){
      const sign = (dir === "+") ? 1 : -1;

      if (path === "WEAPON_SCALE"){
        TUNE.WEAPON_SCALE = Math.max(0.0001, TUNE.WEAPON_SCALE + sign * STEP);
      } else if (path === "WEAPON_YAW_FIX"){
        TUNE.WEAPON_YAW_FIX = TUNE.WEAPON_YAW_FIX + sign * STEP;
      } else {
        // Vector path: "WEAPON_POS.x"
        const [obj, axis] = path.split(".");
        if (!obj || !axis) return;
        const v = TUNE[obj];
        if (!v) return;
        v[axis] = v[axis] + sign * STEP;
      }

      applyTuneToWeapon();
      updateHud();
    }

    function resetTune(){
      TUNE.WEAPON_SCALE = DEFAULTS.WEAPON_SCALE;
      TUNE.WEAPON_YAW_FIX = DEFAULTS.WEAPON_YAW_FIX;

      TUNE.WEAPON_POS.copyFrom(DEFAULTS.WEAPON_POS);
      TUNE.WEAPON_GRIP_POS.copyFrom(DEFAULTS.WEAPON_GRIP_POS);
      TUNE.WEAPON_GRIP_ROT.copyFrom(DEFAULTS.WEAPON_GRIP_ROT);

      applyTuneToWeapon();
      updateHud();
    }

    async function toggleWeapon(){
      ACTIVE_WEAPON_KEY = (ACTIVE_WEAPON_KEY === "cityrunner_smg") ? "basic_pistol" : "cityrunner_smg";
      updateHud();
      await loadWeapon(ACTIVE_WEAPON_KEY);
    }

    async function copyToClipboard(){
      const text = document.getElementById("copyBox").textContent || "";
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        // fallback: select via prompt
        window.prompt("Copy these constants", text);
      }
    }

    // step buttons
    document.querySelectorAll("[data-step]").forEach(b => {
      b.addEventListener("click", () => {
        STEP = parseFloat(b.getAttribute("data-step") || "0.01") || 0.01;
        updateHud();
      });
    });

    // +/- buttons
    document.querySelectorAll("[data-k][data-d]").forEach(b => {
      b.addEventListener("click", () => bump(b.getAttribute("data-k"), b.getAttribute("data-d")));
    });

    document.getElementById("weaponToggle").addEventListener("click", toggleWeapon);
    document.getElementById("resetBtn").addEventListener("click", resetTune);
    document.getElementById("copyBtn").addEventListener("click", copyToClipboard);

    // ---------- main ----------
    (async () => {
      try{
        const okSoldier = await preflightGltf(SOLDIER_ROOT, SOLDIER_FILE);
        if (!okSoldier) return;

        soldier = await importModel("soldier", SOLDIER_ROOT, SOLDIER_FILE);
        soldier.root.rotation.y = Math.PI;
        normalizeToGroundAndHeight(soldier.root, 1.75);

        const ag = soldier.result?.animationGroups || [];
        if (ag.length){
          ag.forEach(g => g.stop());
          ag[0].start(true);
          ag[0].speedRatio = SOLDIER_ANIM_SPEED;
        }

        frameCameraToRoot(soldier.root);

        await loadWeapon(ACTIVE_WEAPON_KEY);

        scene.onBeforeRenderObservable.clear();

        let t = 0;
        const baseY = soldier.root.rotation.y;

        scene.onBeforeRenderObservable.add(() => {
          const dt = scene.getEngine().getDeltaTime() * 0.001;

          t += dt * AUTO_OSC_SPEED;
          const yaw = Math.sin(t) * AUTO_MAX_YAW;
          soldier.root.rotation.y = baseY + yaw;

          if (attachInfo?.ok && attachInfo?.bones && attachInfo?.skinned){
            const skinned = attachInfo.skinned;
            const b = attachInfo.bones;

            if (b.rightShoulder && b.rightShoulder.getRotationQuaternion){
              const cur = b.rightShoulder.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightShoulder.setRotationQuaternion(cur.multiply(qShould), BABYLON.Space.LOCAL, skinned);
            }
            if (b.rightArm && b.rightArm.getRotationQuaternion){
              const cur = b.rightArm.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightArm.setRotationQuaternion(cur.multiply(qArm), BABYLON.Space.LOCAL, skinned);
            }
            if (b.rightForeArm && b.rightForeArm.getRotationQuaternion){
              const cur = b.rightForeArm.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightForeArm.setRotationQuaternion(cur.multiply(qForeArm), BABYLON.Space.LOCAL, skinned);
            }
            if (WRIST_TWIST_ON && b.rightHand && b.rightHand.getRotationQuaternion){
              const cur = b.rightHand.getRotationQuaternion(BABYLON.Space.LOCAL, skinned) || BABYLON.Quaternion.Identity();
              b.rightHand.setRotationQuaternion(cur.multiply(qWrist), BABYLON.Space.LOCAL, skinned);
            }
          }
        });

        updateHud();

      }catch(e){
        console.warn("Test failed", e);
      }
    })();
  </script>
</body>
</html>
