<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA WARZONE, FPS, Soldier Skins, Pistol, SMG</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    :root{
      --bg:#02030a;
      --panel:#070b18;
      --line:#222b47;
      --txt:#edf3ff;
      --muted:#9fb0d6;
      --accent1:#00fff0;
      --accent2:#ff3b6b;
      --accent3:#ffcf4d;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      color:var(--txt);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-drag:none;
      overscroll-behavior:none;
    }

    .rot-wrapper{
      position:fixed;
      top:0;
      left:0;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg) translateY(-100%);
      transition:transform .15s ease,width .15s ease,height .15s ease;
      background:#000;
    }
    .fps-root{
      width:100%;
      height:100%;
      position:relative;
      background:radial-gradient(circle at top,#15192e 0,#02030a 55%,#000 100%);
      overflow:hidden;
    }
    #renderCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      touch-action:none;
      outline:none;
    }

    .hud-top{
      position:absolute;
      left:10px;
      top:10px;
      right:10px;
      z-index:60;
      display:flex;
      justify-content:space-between;
      gap:10px;
      pointer-events:auto;
      max-height:38vh;
      overflow:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }
    .hud-box{
      border-radius:14px;
      border:1px solid rgba(132,153,255,.35);
      background:rgba(7,11,24,.62);
      box-shadow:0 0 26px rgba(0,255,255,.10), 0 0 30px rgba(255,59,107,.08);
      padding:10px 12px;
      backdrop-filter:blur(8px);
      max-width:48vw;
      pointer-events:auto;
    }
    .hud-title{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(159,176,214,.95);
      margin-bottom:6px;
    }
    .hud-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color:#e7f0ff;
    }
    .tag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(127,209,255,.45);
      background:linear-gradient(90deg,rgba(2,8,36,.85),rgba(0,87,126,.45));
      color:#e7f0ff;
      font-size:11px;
      white-space:nowrap;
    }
    .tag.warn{
      border-color:rgba(255,184,107,.55);
      background:linear-gradient(90deg,rgba(60,34,0,.60),rgba(120,65,0,.35));
    }
    .tag.btn{
      cursor:pointer;
      user-select:none;
      border-color:rgba(255,59,107,.55);
      background:linear-gradient(90deg,rgba(30,6,18,.75),rgba(80,10,30,.45));
    }
    .tag.btn:active{ transform:scale(.98); }

    .hint{
      opacity:.9;
      font-size:11px;
      line-height:1.35;
      color:#c3cff5;
      margin-top:6px;
    }

    .touch-ui{
      position:absolute;
      inset:0;
      z-index:50;
      pointer-events:none;
    }
    .stick{
      position:absolute;
      width:140px;
      height:140px;
      border-radius:50%;
      border:1px solid rgba(127,209,255,.35);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.18),rgba(0,0,0,.15));
      box-shadow:0 0 24px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      opacity:0.95;
    }
    .stick.left{ left:16px; bottom:18px; }
    .stick.right{ right:16px; bottom:18px; }
    .stick .nub{
      position:absolute;
      left:50%;
      top:50%;
      width:52px;
      height:52px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      border:1px solid rgba(255,59,107,.35);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.22),rgba(0,0,0,.10));
      box-shadow:0 0 18px rgba(255,59,107,.10);
      pointer-events:none;
    }

    .fire-btn{
      position:absolute;
      right:182px;
      bottom:46px;
      width:110px;
      height:110px;
      border-radius:50%;
      border:1px solid rgba(255,59,107,.55);
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.28),rgba(0,0,0,.22));
      box-shadow:0 0 28px rgba(255,59,107,.14), 0 0 26px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:#ffe7ef;
      user-select:none;
      opacity:0.96;
    }
    .fire-btn:active{ transform:scale(.98); }
    .fire-sub{
      font-size:10px;
      opacity:.85;
      margin-top:2px;
      letter-spacing:.12em;
      color:#ffd2de;
    }
    .fire-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1.1;
    }

    .reticle{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:18px;
      height:18px;
      z-index:24;
      pointer-events:none;
      opacity:0.92;
      filter:drop-shadow(0 0 10px rgba(0,255,255,.10));
    }
    .reticle::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:3px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      transform:translate(-50%,-50%);
    }
    .reticle .h,.reticle .v{
      position:absolute;
      left:50%;
      top:50%;
      background:rgba(255,255,255,.85);
      transform:translate(-50%,-50%);
    }
    .reticle .h{ width:18px; height:1px; opacity:.55; }
    .reticle .v{ width:1px; height:18px; opacity:.55; }

    .hit{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:28px;
      height:28px;
      z-index:25;
      pointer-events:none;
      opacity:0;
    }
    .hit::before,.hit::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:28px;
      height:2px;
      background:rgba(255,255,255,.9);
      transform-origin:center;
      box-shadow:0 0 10px rgba(0,255,255,.18);
    }
    .hit::before{ transform:translate(-50%,-50%) rotate(45deg); }
    .hit::after{ transform:translate(-50%,-50%) rotate(-45deg); }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
</head>

<body>
  <div class="rot-wrapper" id="rotWrapper">
    <div class="fps-root">
      <canvas id="renderCanvas"></canvas>

      <div class="hud-top">
        <div class="hud-box">
          <div class="hud-title">Warzone FPS</div>
          <div class="hud-row">
            <span class="tag" id="hudState">STATE, loading</span>
            <button class="tag btn" id="weaponBtn" type="button">Weapon, pistol</button>
            <button class="tag btn" id="skinBtn" type="button">Skin, default</button>
            <button class="tag btn" id="resetBtn" type="button">Reset</button>
          </div>
          <div class="hint" id="hintText">
            Left stick moves, right stick looks, fire shoots, targets are green cubes
          </div>
        </div>

        <div class="hud-box" style="text-align:right;">
          <div class="hud-title">Status</div>
          <div class="hud-row" style="justify-content:flex-end;">
            <span class="tag" id="hudWeapon">WEAPON, pistol</span>
            <span class="tag warn" id="hudAmmo">AMMO, 12</span>
            <span class="tag" id="hudBone">HAND, ?</span>
            <span class="tag" id="hudPos">POS, ?</span>
          </div>
        </div>
      </div>

      <div class="reticle" id="reticle"><div class="h"></div><div class="v"></div></div>
      <div class="hit" id="hitMarker"></div>

      <div class="touch-ui" id="touchUi">
        <div class="stick left" id="moveStick"><div class="nub" id="moveNub"></div></div>
        <div class="stick right" id="turnStick"><div class="nub" id="turnNub"></div></div>

        <div class="fire-btn" id="fireBtn" role="button" aria-label="Fire">
          <div class="fire-wrap">
            <div>FIRE</div>
            <div class="fire-sub" id="fireModeText">tap</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const wrapper = document.getElementById("rotWrapper");
      function updateLayout(){
        const vv = window.visualViewport;
        const w = vv ? vv.width : window.innerWidth;
        const h = vv ? vv.height : window.innerHeight;
        const landscape = w >= h;
        if (landscape){
          wrapper.style.transform = "none";
          wrapper.style.width = "100%";
          wrapper.style.height = "100%";
        } else {
          wrapper.style.width = h + "px";
          wrapper.style.height = w + "px";
          wrapper.style.transform = "rotate(90deg) translateY(-100%)";
        }
      }
      window.addEventListener("resize", updateLayout);
      window.addEventListener("orientationchange", () => setTimeout(updateLayout, 150));
      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", updateLayout);
        window.visualViewport.addEventListener("scroll", updateLayout);
      }
      updateLayout();
    })();

    const canvas = document.getElementById("renderCanvas");
    canvas.tabIndex = 1;

    const hudState  = document.getElementById("hudState");
    const hudWeapon = document.getElementById("hudWeapon");
    const hudAmmo   = document.getElementById("hudAmmo");
    const hudBone   = document.getElementById("hudBone");
    const hudPos    = document.getElementById("hudPos");

    const weaponBtn = document.getElementById("weaponBtn");
    const skinBtn   = document.getElementById("skinBtn");
    const resetBtn  = document.getElementById("resetBtn");

    const moveStick = document.getElementById("moveStick");
    const moveNub   = document.getElementById("moveNub");
    const lookStick = document.getElementById("turnStick");
    const lookNub   = document.getElementById("turnNub");
    const fireBtn   = document.getElementById("fireBtn");
    const fireModeText = document.getElementById("fireModeText");
    const hitMarker = document.getElementById("hitMarker");

    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function fmt(v){ return (Math.round(v*1000)/1000).toFixed(3); }

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });
    let scene, camera;

    // ---------- config ----------
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    function getWeaponAsset(sku){
      if(sku === "wz_cityrunner_smg") return { rootUrl:"/assets/warzone3d/weapons/wz_cityrunner_smg/", fileName:"scene.gltf" };
      return { rootUrl:"/assets/warzone3d/weapons/wz_basic_pistol/", fileName:"scene.gltf" };
    }

    // TUNED, LOCKED presets (same idea as test page presets, but no tuner UI)
    const WEAPON_TUNING = {
      wz_basic_pistol: {
        WEAPON_SCALE: 0.06000,
        WEAPON_YAW_FIX: 1.52080,
        WEAPON_PITCH_FIX: -0.03000,
        WEAPON_POS:      new BABYLON.Vector3(-1.06900,  0.32700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 2.98400,  1.23000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.23000,  0.00000,  0.01000),
      },
      wz_cityrunner_smg: {
        WEAPON_SCALE: 0.11000,
        WEAPON_YAW_FIX: 1.10080,
        WEAPON_PITCH_FIX: -1.84000,
        WEAPON_POS:      new BABYLON.Vector3( 1.18100,  1.01700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 7.42400, -2.71000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.05000, -0.22000,  0.01000),
      }
    };

    // FPS camera lock
    const CHEST_LOCK = {
      pivotPos: new BABYLON.Vector3(0.00, 0.22, 0.10),
      camPos:   new BABYLON.Vector3(-0.650, 1.640, -0.969),
      pitch:    -0.30
    };

    const JOY = { MOVE_SPEED: 5.5, DEADZONE: 0.10 };
    const LOOK = { YAW_SPEED: 1.55, PITCH_SPEED: 1.15, PITCH_MIN: -1.05, PITCH_MAX: 0.45 };
    const LOOK_SENS = { TOUCH_MULT: 0.78 };

    // Auto rotate when idle (FPS safe)
    const AUTO_OSC_SPEED = 0.28;
    const AUTO_MAX_YAW   = Math.PI * 0.12;

    const FIRE = {
      pistol: { rpm: 240, spread: 0.0035, maxDist: 120, tracerLife: 0.06, recoil: 0.020, mag: 12 },
      smg:    { rpm: 900, spread: 0.0070, maxDist: 120, tracerLife: 0.045, recoil: 0.010, mag: 30 }
    };

    // Locked muzzle offsets (from your screenshot values)
    const LOCKED_UP = 0.08;
    const LOCKED_RIGHT = 0.31;
    const LOCKED_FLASH_SIZE = 0.05;
    const LOCKED_FORWARD = 0.73;

    // ---------- soldier texture override system (same logic as test page) ----------
    const TEXTURE_BASE = "/assets/warzone3d/soldier_gltf_3/textures/";
    const SKU_TO_TEXTURE_FOLDER = {
      "wz_basic_soldier": null,
      "wz_neon_edge": "neon_edge",
      "wz_urban_shadow": "urban_shadow",
      "wz_cinder_camo": "cinder_camo",
      "wz_glow_legend": "glow_legend"
    };
    const FOLDER_OVERRIDE_FILE = {};
    const OVERRIDE_CANDIDATES = [
      "texture.png","textures.png","basecolor.png","base_color.png","albedo.png","diffuse.png","skin.png","skin_diffuse.png","main.png",
      "material_8_diffuse.png","material_9_diffuse.png","material_10_diffuse.png","material_11_diffuse.png"
    ];

    async function fetchHeadOrGet(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        if (r && (r.ok || r.status === 404 || r.status === 403)) return r;
      }catch(e){}
      return fetch(url, { method:"GET", cache:"no-store" });
    }
    async function checkUrlOk(url){
      try{
        const r = await fetchHeadOrGet(url);
        return !!(r && r.ok);
      }catch(e){ return false; }
    }
    async function detectSingleTextureFile(folder){
      if (!folder) return null;
      if (folder in FOLDER_OVERRIDE_FILE) return FOLDER_OVERRIDE_FILE[folder];

      for (const f of OVERRIDE_CANDIDATES){
        const url = `${TEXTURE_BASE}${folder}/${f}`;
        if (await checkUrlOk(url)){
          FOLDER_OVERRIDE_FILE[folder] = f;
          return f;
        }
      }
      FOLDER_OVERRIDE_FILE[folder] = null;
      return null;
    }
    function applySingleTextureToMaterials(container, folder, file){
      try{
        if(!container || !folder || !file) return;
        const texUrl = `${TEXTURE_BASE}${folder}/${file}`;
        const mats = container.materials || [];
        mats.forEach(mat => {
          if(!mat) return;
          if (mat.albedoTexture){
            const t = new BABYLON.Texture(texUrl, scene, true, false);
            t.hasAlpha = !!mat.albedoTexture.hasAlpha;
            t.level = (typeof mat.albedoTexture.level === "number") ? mat.albedoTexture.level : 1.0;
            mat.albedoTexture = t;
          }
          if (mat.diffuseTexture){
            const t = new BABYLON.Texture(texUrl, scene, true, false);
            t.hasAlpha = !!mat.diffuseTexture.hasAlpha;
            t.level = (typeof mat.diffuseTexture.level === "number") ? mat.diffuseTexture.level : 1.0;
            mat.diffuseTexture = t;
          }
          if (!mat.albedoTexture && mat.getClassName && /PBR/i.test(mat.getClassName())){
            mat.albedoTexture = new BABYLON.Texture(texUrl, scene, true, false);
          }
          if (!mat.diffuseTexture && mat.getClassName && /Standard/i.test(mat.getClassName())){
            mat.diffuseTexture = new BABYLON.Texture(texUrl, scene, true, false);
          }
        });
      }catch(e){}
    }
    async function applyTextureOverrides(container, skinSku){
      const folder = SKU_TO_TEXTURE_FOLDER[(skinSku||"").toString().trim()];
      if(!folder) return;
      const f = await detectSingleTextureFile(folder);
      if(!f) return;
      applySingleTextureToMaterials(container, folder, f);
    }

    // ---------- shadow plane (same behavior, but attached under FPS player) ----------
    let shadowPlane = null;
    let shadowMat = null;
    function ensureShadowMaterial(){
      if(shadowMat) return shadowMat;

      const dt = new BABYLON.DynamicTexture("shadowDT", { width:512, height:512 }, scene, true);
      dt.hasAlpha = true;
      const ctx = dt.getContext();
      ctx.clearRect(0,0,512,512);

      const g = ctx.createRadialGradient(256,256,6,256,256,220);
      g.addColorStop(0.00, "rgba(0,0,0,1.00)");
      g.addColorStop(0.20, "rgba(0,0,0,0.98)");
      g.addColorStop(0.40, "rgba(0,0,0,0.82)");
      g.addColorStop(0.62, "rgba(0,0,0,0.45)");
      g.addColorStop(0.80, "rgba(0,0,0,0.14)");
      g.addColorStop(1.00, "rgba(0,0,0,0.00)");

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(256, 305, 200, 120, 0, 0, Math.PI * 2);
      ctx.fill();

      dt.update(false);

      shadowMat = new BABYLON.StandardMaterial("shadowMat", scene);
      shadowMat.diffuseColor = new BABYLON.Color3(0,0,0);
      shadowMat.emissiveColor = new BABYLON.Color3(0,0,0);
      shadowMat.specularColor = new BABYLON.Color3(0,0,0);
      shadowMat.opacityTexture = dt;
      shadowMat.alpha = 1.0;
      shadowMat.disableLighting = true;

      return shadowMat;
    }
    function attachShadowToPlayer(playerRoot){
      try{
        if(shadowPlane){ shadowPlane.dispose(false, true); shadowPlane = null; }
      }catch(e){}
      const mat = ensureShadowMaterial();
      shadowPlane = BABYLON.MeshBuilder.CreateGround("shadowPlane", { width: 2.6, height: 2.6 }, scene);
      shadowPlane.material = mat;
      shadowPlane.isPickable = false;
      shadowPlane.renderingGroupId = 1;
      shadowPlane.parent = playerRoot;
      shadowPlane.position.set(0, 0.01, 0);
      shadowPlane.rotation.y = Math.PI / 2;
    }

    // ---------- input ----------
    function applyDeadzone(x){
      const ax = Math.abs(x);
      if(ax < JOY.DEADZONE) return 0;
      const s = (ax - JOY.DEADZONE) / (1 - JOY.DEADZONE);
      return Math.sign(x) * clamp(s, 0, 1);
    }

    const lookState = { active:false, id:null, dx:0, dy:0, el:null, nub:null, max:1, cx:0, cy:0, recalc:null };
    const moveState = { active:false, id:null, dx:0, dy:0, el:null, nub:null, max:1, cx:0, cy:0, recalc:null };

    function stickSetup(state, el, nub){
      state.el = el;
      state.nub = nub;
      function recalc(){
        const box = el.getBoundingClientRect();
        state.cx = box.left + box.width/2;
        state.cy = box.top + box.height/2;
        state.max = (box.width/2) - (nub.getBoundingClientRect().width/2);
        if(state.max < 10) state.max = 10;
      }
      state.recalc = recalc;
      recalc();
      window.addEventListener("resize", recalc);
      if(window.visualViewport){
        window.visualViewport.addEventListener("resize", recalc);
        window.visualViewport.addEventListener("scroll", recalc);
      }
    }
    stickSetup(lookState, lookStick, lookNub);
    stickSetup(moveState, moveStick, moveNub);

    function stickSetFromClient(state, clientX, clientY){
      const nx = clamp(clientX - state.cx, -state.max, state.max);
      const ny = clamp(clientY - state.cy, -state.max, state.max);
      state.nub.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;

      state.dx = nx / state.max;
      state.dy = ny / state.max;

      if(state === lookState){
        state.dx = -state.dx;
      }
    }
    function stickReset(state){
      state.nub.style.transform = "translate(-50%,-50%)";
      state.dx = 0;
      state.dy = 0;
    }
    function bindGlobalStick(state){
      state.el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        state.recalc && state.recalc();
        state.active = true;
        state.id = e.pointerId;
        stickSetFromClient(state, e.clientX, e.clientY);
      }, { passive:false });

      window.addEventListener("pointermove", (e) => {
        if(!state.active || e.pointerId !== state.id) return;
        e.preventDefault();
        stickSetFromClient(state, e.clientX, e.clientY);
      }, { passive:false });

      function endPointer(e){
        if(!state.active || e.pointerId !== state.id) return;
        state.active = false;
        state.id = null;
        stickReset(state);
      }
      window.addEventListener("pointerup", endPointer, { passive:true });
      window.addEventListener("pointercancel", endPointer, { passive:true });

      state.el.addEventListener("touchstart", (e) => {
        if(!e.changedTouches || !e.changedTouches.length) return;
        e.preventDefault();
        state.recalc && state.recalc();
        const t = e.changedTouches[0];
        state.active = true;
        state.id = t.identifier;
        stickSetFromClient(state, t.clientX, t.clientY);
      }, { passive:false });

      window.addEventListener("touchmove", (e) => {
        if(!state.active) return;
        if(!e.changedTouches || !e.changedTouches.length) return;
        for(const t of e.changedTouches){
          if(t.identifier === state.id){
            stickSetFromClient(state, t.clientX, t.clientY);
            break;
          }
        }
      }, { passive:false });

      window.addEventListener("touchend", (e) => {
        if(!state.active) return;
        if(!e.changedTouches || !e.changedTouches.length) return;
        for(const t of e.changedTouches){
          if(t.identifier === state.id){
            state.active = false;
            state.id = null;
            stickReset(state);
            break;
          }
        }
      }, { passive:true });

      window.addEventListener("touchcancel", () => {
        if(!state.active) return;
        state.active = false;
        state.id = null;
        stickReset(state);
      }, { passive:true });
    }
    bindGlobalStick(lookState);
    bindGlobalStick(moveState);

    // ---------- live refs ----------
    let soldierContainer = null;
    let soldierRoot = null;
    let soldierSkinned = null;

    let chestBoneNode = null;
    let chestPivot = null;

    let weaponContainer = null;
    let weaponRoot = null;
    let weaponGrip = null;

    let rightHandAnchor = null;

    let weaponSku = "wz_basic_pistol";
    let skinSku = "wz_basic_soldier";

    let aimYaw = 0.0;
    let aimPitch = CHEST_LOCK.pitch;

    let isFiring = false;
    let nextShotAt = 0;

    const fxLive = [];

    let ammo = 12;
    let magSize = 12;

    // targets
    const targets = [];

    function setHud(){
      hudWeapon.textContent = (weaponSku === "wz_cityrunner_smg") ? "WEAPON, SMG" : "WEAPON, pistol";
      hudAmmo.textContent = `AMMO, ${ammo}`;
      weaponBtn.textContent = (weaponSku === "wz_cityrunner_smg") ? "Weapon, SMG" : "Weapon, pistol";
      fireModeText.textContent = (weaponSku === "wz_cityrunner_smg") ? "hold" : "tap";

      const skinLabel =
        skinSku === "wz_neon_edge" ? "neon" :
        skinSku === "wz_urban_shadow" ? "urban" :
        skinSku === "wz_cinder_camo" ? "cinder" :
        skinSku === "wz_glow_legend" ? "glow" : "default";
      skinBtn.textContent = `Skin, ${skinLabel}`;
    }

    function flashHit(){
      hitMarker.style.opacity = "1";
      hitMarker.style.transition = "none";
      requestAnimationFrame(() => {
        hitMarker.style.transition = "opacity 120ms ease";
        hitMarker.style.opacity = "0";
      });
    }

    function findSkinnedMeshFromContainer(container){
      try{
        const meshes = (container && container.meshes) ? container.meshes : [];
        return meshes.find(m => m && m.skeleton) || null;
      }catch(e){
        return null;
      }
    }

    function findRightHandBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;
      const exact = skeleton.bones.find(b => (b.name || "") === "mixamorig:RightHand.209_221");
      if(exact) return exact;
      const rx = skeleton.bones.find(b => /mixamorig:RightHand/i.test(b.name || ""));
      if(rx) return rx;
      return skeleton.bones.find(b => /RightHand/i.test(b.name || "")) || null;
    }

    function findChestBone(skeleton){
      if(!skeleton || !skeleton.bones || !skeleton.bones.length) return null;
      const prefer = [/mixamorig:Spine2/i,/mixamorig:Spine1/i,/mixamorig:Spine\b/i,/mixamorig:Neck/i];
      for(const rx of prefer){
        const b = skeleton.bones.find(x => rx.test(x.name || ""));
        if(b) return b;
      }
      return skeleton.bones.find(x => /Spine/i.test(x.name || "")) || null;
    }

    function playIdleAnimationsSlow(container){
      try{
        const groups = (container && container.animationGroups) ? container.animationGroups : [];
        groups.forEach(g => { try{ g.stop(); g.start(true, 0.65); }catch(e){} });
      }catch(e){}
    }

    function hideHeadAndNeck(container){
      const meshes = (container && container.meshes) ? container.meshes : [];
      const keepRx = /(arm|forearm|hand|wrist|glove|sleeve|weapon|gun|pistol|smg)/i;
      const hideRx = /(head|neck|helmet|face|hair|ear|mask|hood|cap|hat|beard|brow|eye|teeth|tongue|jaw|cheek|skull|cranium|visor|goggles|glass|glasses|mouth|lip)/i;
      const HEAD_ZONE = { minY: 1.35, minZ: -0.35 };

      meshes.forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        if(keepRx.test(nm)) return;

        let hide = false;
        if(hideRx.test(nm)) hide = true;

        if(!hide){
          try{
            const bi = m.getBoundingInfo && m.getBoundingInfo();
            if(bi){
              const c = bi.boundingBox.centerWorld;
              if(c.y >= HEAD_ZONE.minY && c.z >= HEAD_ZONE.minZ) hide = true;
            }
          }catch(e){}
        }
        if(!hide) return;

        try{
          m.isPickable = false;
          m.visibility = 0.0;
          m.setEnabled(false);
        }catch(e){}
      });
    }

    function setArmsOnlyVisibility(container){
      const meshes = (container && container.meshes) ? container.meshes : [];
      meshes.forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        const isArms =
          nm.includes("arm") || nm.includes("forearm") || nm.includes("hand") ||
          nm.includes("wrist") || nm.includes("glove") || nm.includes("sleeve");

        const keepEnabled = !!m.skeleton;
        try{
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = isArms ? 1.0 : 0.0;
          m.setEnabled(keepEnabled || isArms);
        }catch(e){}
      });
      hideHeadAndNeck(container);
    }

    function clearWeapon(){
      try{ if(weaponGrip){ weaponGrip.dispose(true,false); weaponGrip=null; } }catch(e){}
      try{ if(weaponRoot){ weaponRoot.dispose(true,false); weaponRoot=null; } }catch(e){}
      try{
        if(weaponContainer){
          weaponContainer.removeAllFromScene();
          weaponContainer.dispose();
          weaponContainer = null;
        }
      }catch(e){}
    }

    function clearSoldier(){
      clearWeapon();
      try{ if(rightHandAnchor){ rightHandAnchor.dispose(true,false); rightHandAnchor=null; } }catch(e){}
      try{ if(chestPivot){ chestPivot.dispose(true,false); chestPivot=null; } }catch(e){}
      try{ if(chestBoneNode){ chestBoneNode.dispose(true,false); chestBoneNode=null; } }catch(e){}
      try{ if(soldierRoot){ soldierRoot.dispose(true,false); soldierRoot=null; } }catch(e){}
      soldierSkinned = null;
      try{
        if(soldierContainer){
          soldierContainer.removeAllFromScene();
          soldierContainer.dispose();
          soldierContainer = null;
        }
      }catch(e){}
    }

    function ensureRightHandAnchor(){
      if(rightHandAnchor) return;
      if(!soldierSkinned || !soldierSkinned.skeleton) return;

      const rh = findRightHandBone(soldierSkinned.skeleton);
      if(!rh) return;

      rightHandAnchor = new BABYLON.TransformNode("rightHandAnchor", scene);
      try{
        rightHandAnchor.attachToBone(rh, soldierSkinned);
        rightHandAnchor.position.set(0,0,0);
        rightHandAnchor.rotation.set(0,0,0);
      }catch(e){}
    }

    function applyChestCam(){
      if(!chestPivot || !camera) return;

      chestPivot.position.copyFrom(CHEST_LOCK.pivotPos);
      chestPivot.rotation.set(0,0,0);

      camera.position.copyFrom(CHEST_LOCK.camPos);
      camera.rotation.set(aimPitch, 0, 0);

      hudPos.textContent = soldierRoot ? `POS, x ${fmt(soldierRoot.position.x)} z ${fmt(soldierRoot.position.z)}` : "POS, ?";
    }

    async function loadSoldier(sku){
      clearSoldier();
      hudState.textContent = "STATE, loading soldier";

      const cont = await BABYLON.SceneLoader.LoadAssetContainerAsync(SOLDIER_ROOT, SOLDIER_FILE, scene);
      await applyTextureOverrides(cont, sku);

      cont.addAllToScene();
      soldierContainer = cont;

      soldierRoot = new BABYLON.TransformNode("soldierRoot", scene);
      (cont.rootNodes || []).forEach(rn => { try{ rn.parent = soldierRoot; }catch(e){} });

      soldierRoot.position.set(0,0,0);
      soldierRoot.rotation.set(0,0,0);
      soldierRoot.scaling.set(1,1,1);

      soldierSkinned = findSkinnedMeshFromContainer(cont);
      playIdleAnimationsSlow(cont);
      setArmsOnlyVisibility(cont);

      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const chestBone = findChestBone(sk);

      chestBoneNode = new BABYLON.TransformNode("chestBoneNode", scene);
      chestPivot = new BABYLON.TransformNode("chestPivot", scene);

      if(chestBone && soldierSkinned){
        chestBoneNode.attachToBone(chestBone, soldierSkinned);
      } else {
        chestBoneNode.parent = soldierRoot;
        chestBoneNode.position.set(0, 1.52, 0.06);
      }

      chestPivot.parent = chestBoneNode;
      camera.parent = chestPivot;

      ensureRightHandAnchor();
      const rh = findRightHandBone(sk);
      hudBone.textContent = rh ? "HAND, right" : "HAND, fallback";

      aimYaw = 0;
      aimPitch = CHEST_LOCK.pitch;

      attachShadowToPlayer(soldierRoot);
      applyChestCam();

      hudState.textContent = "STATE, soldier loaded";
    }

    async function loadWeapon(sku){
      clearWeapon();
      hudState.textContent = "STATE, loading weapon";

      const T = WEAPON_TUNING[sku] || WEAPON_TUNING.wz_basic_pistol;
      const asset = getWeaponAsset(sku);

      const w = await BABYLON.SceneLoader.LoadAssetContainerAsync(asset.rootUrl, asset.fileName, scene);
      w.addAllToScene();
      weaponContainer = w;

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const rh = findRightHandBone(sk);

      if(rh && soldierSkinned){
        weaponRoot.attachToBone(rh, soldierSkinned);
      } else {
        weaponRoot.parent = soldierRoot;
        weaponRoot.position.set(0.35, 1.10, 0.25);
      }

      weaponRoot.position.copyFrom(T.WEAPON_POS);
      weaponRoot.rotation.set(
        (T.WEAPON_PITCH_FIX || 0.0),
        Math.PI + (T.WEAPON_YAW_FIX || 0.0),
        0
      );
      weaponRoot.scaling.set(T.WEAPON_SCALE, T.WEAPON_SCALE, T.WEAPON_SCALE);

      weaponGrip.position.copyFrom(T.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(T.WEAPON_GRIP_ROT);

      (w.meshes || []).forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        try{
          m.parent = weaponGrip;
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = 1.0;
          m.setEnabled(true);
        }catch(e){}
      });

      weaponSku = sku;

      const cfg = (weaponSku === "wz_cityrunner_smg") ? FIRE.smg : FIRE.pistol;
      magSize = cfg.mag;
      ammo = magSize;

      setHud();
      hudState.textContent = "STATE, weapon loaded";
    }

    // ---------- shooting ----------
    function randSpread(spread){
      const a = (Math.random() * 2 - 1) * spread;
      const b = (Math.random() * 2 - 1) * spread;
      return new BABYLON.Vector3(a, b, 0);
    }

    function getMuzzleOrigin(){
      let base = null;
      if(rightHandAnchor){
        try{ base = rightHandAnchor.getAbsolutePosition().clone(); }catch(e){}
      }
      if(!base && weaponGrip){
        try{ base = weaponGrip.getAbsolutePosition().clone(); }catch(e){}
      }
      if(!base){
        const p = camera.getAbsolutePosition();
        const dir = camera.getForwardRay(1).direction;
        base = p.add(dir.scale(0.35));
      }

      const fwd = camera.getForwardRay(1).direction;
      const up  = camera.getDirection(BABYLON.Axis.Y).normalize();
      const rt  = camera.getDirection(BABYLON.Axis.X).normalize();

      base.addInPlace(fwd.scale(LOCKED_FORWARD));
      base.addInPlace(up.scale(LOCKED_UP));
      base.addInPlace(rt.scale(LOCKED_RIGHT));

      return base;
    }

    function fxRegister(mesh, lifeSeconds){
      try{
        mesh.isPickable = false;
        mesh.renderingGroupId = 3;
      }catch(e){}
      fxLive.push({ mesh, dieAt: performance.now() * 0.001 + lifeSeconds });
    }

    function shootOnce(){
      if(ammo <= 0) return;
      ammo -= 1;
      setHud();

      const mode = (weaponSku === "wz_cityrunner_smg") ? "smg" : "pistol";
      const cfg = FIRE[mode];

      const origin = getMuzzleOrigin();
      const camRay = camera.getForwardRay(cfg.maxDist);

      const s = randSpread(cfg.spread);
      const spreadDir = camRay.direction.add(new BABYLON.Vector3(s.x, s.y, 0)).normalize();
      const aimPoint = camRay.origin.add(spreadDir.scale(cfg.maxDist));

      const dir = aimPoint.subtract(origin).normalize();
      const ray = new BABYLON.Ray(origin, dir, cfg.maxDist);

      const pick = scene.pickWithRay(ray, (m) => {
        if(!m) return false;
        if(m === weaponRoot || m === weaponGrip) return false;
        if(m.parent === weaponGrip) return false;
        return true;
      });

      const hitPoint = (pick && pick.hit && pick.pickedPoint) ? pick.pickedPoint.clone() : origin.add(dir.scale(cfg.maxDist));

      const tracer = BABYLON.MeshBuilder.CreateLines("tr", { points: [origin, hitPoint] }, scene);
      tracer.alpha = 0.9;
      tracer.color = new BABYLON.Color3(0.9, 0.95, 1.0);
      fxRegister(tracer, cfg.tracerLife);

      const flash = BABYLON.MeshBuilder.CreateSphere("mf", { diameter: Math.max(0.01, LOCKED_FLASH_SIZE) }, scene);
      const mm = new BABYLON.StandardMaterial("mfm", scene);
      mm.emissiveColor = new BABYLON.Color3(1.0, 0.85, 0.35);
      mm.diffuseColor = new BABYLON.Color3(0,0,0);
      mm.specularColor = new BABYLON.Color3(0,0,0);
      flash.material = mm;
      flash.position.copyFrom(origin);
      fxRegister(flash, 0.04);

      if(pick && pick.hit){
        flashHit();
        const m = pick.pickedMesh;
        if(m && targets.includes(m)){
          try{
            m.scaling.y = Math.max(0.25, m.scaling.y * 0.92);
          }catch(e){}
        }
      }
    }

    function startFiring(){
      isFiring = true;
      if(weaponSku === "wz_basic_pistol"){
        shootOnce();
        isFiring = false;
      } else {
        nextShotAt = 0;
      }
    }
    function stopFiring(){ isFiring = false; }

    // ---------- scene ----------
    function createScene(){
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,0);

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.10;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.2,-1,-0.1), scene);
      dir.intensity = 0.55;

      // grid floor
      const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 220, height: 220 }, scene);
      const grid = new BABYLON.GridMaterial("grid", scene);
      grid.majorUnitFrequency = 5;
      grid.minorUnitVisibility = 0.25;
      grid.gridRatio = 1;
      grid.backFaceCulling = false;
      grid.opacity = 0.35;
      ground.material = grid;
      ground.isPickable = true;

      // camera
      camera = new BABYLON.UniversalCamera("chestCam", new BABYLON.Vector3(0,1.6,0), scene);
      camera.minZ = 0.02;
      camera.maxZ = 5000;
      camera.fov = 1.0;
      camera.inputs.clear();
      scene.activeCamera = camera;

      // enemies, green cubes
      spawnTargets();

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

      let tOsc = 0;

      scene.onBeforeRenderObservable.add(() => {
        const now = performance.now() * 0.001;

        // single FX cleanup loop
        for(let i = fxLive.length - 1; i >= 0; i--){
          const fx = fxLive[i];
          if(!fx || !fx.mesh){ fxLive.splice(i,1); continue; }
          if(now >= fx.dieAt){
            try{ fx.mesh.dispose(); }catch(e){}
            fxLive.splice(i,1);
          }
        }

        if(!soldierRoot || !chestPivot) return;

        const dt = scene.getEngine().getDeltaTime() * 0.001;

        // idle auto rotate only when not interacting
        const interacting = lookState.active || moveState.active || isFiring;
        if(!interacting){
          tOsc += dt * AUTO_OSC_SPEED;
          aimYaw = Math.sin(tOsc) * AUTO_MAX_YAW;
        }

        const lookMult = isTouch ? LOOK_SENS.TOUCH_MULT : 1.0;
        const lookX = applyDeadzone(lookState.dx) * lookMult;
        const lookY = applyDeadzone(lookState.dy) * lookMult;

        aimYaw   += (lookX * LOOK.YAW_SPEED * dt);
        aimPitch += (lookY * LOOK.PITCH_SPEED * dt);
        aimPitch  = clamp(aimPitch, LOOK.PITCH_MIN, LOOK.PITCH_MAX);

        const mvX = applyDeadzone(moveState.dx);
        const mvY = applyDeadzone(moveState.dy);

        soldierRoot.rotation.y = aimYaw;

        const yaw = soldierRoot.rotation.y;
        const forward = new BABYLON.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right   = new BABYLON.Vector3(forward.z, 0, -forward.x);

        const moveF = -mvY;
        const moveS = mvX;

        const spd = JOY.MOVE_SPEED * dt;
        const delta = forward.scale(moveF * spd).add(right.scale(moveS * spd));
        soldierRoot.position.addInPlace(new BABYLON.Vector3(delta.x, 0, delta.z));

        applyChestCam();

        // SMG hold-to-fire
        if(isFiring && weaponSku === "wz_cityrunner_smg"){
          const cfg = FIRE.smg;
          const interval = 60.0 / cfg.rpm;
          if(nextShotAt === 0) nextShotAt = now;
          while(now >= nextShotAt){
            shootOnce();
            nextShotAt += interval;
            if(now - nextShotAt > 0.2){
              nextShotAt = now + interval;
              break;
            }
            if(ammo <= 0){
              isFiring = false;
              break;
            }
          }
        }

        hudPos.textContent = `POS, x ${fmt(soldierRoot.position.x)} z ${fmt(soldierRoot.position.z)}`;
      });

      return scene;
    }

    function spawnTargets(){
      // clear
      targets.splice(0, targets.length);

      const positions = [
        new BABYLON.Vector3( 6, 0.6,  8),
        new BABYLON.Vector3(-6, 0.6, 10),
        new BABYLON.Vector3( 2, 0.6, 14),
        new BABYLON.Vector3(-2, 0.6, 18),
        new BABYLON.Vector3(10, 0.6, 18),
      ];

      positions.forEach((p, i) => {
        const b = BABYLON.MeshBuilder.CreateBox("t"+i, { size: 1.2 }, scene);
        b.position.copyFrom(p);
        b.isPickable = true;
        const m = new BABYLON.StandardMaterial("tm"+i, scene);
        m.diffuseColor = new BABYLON.Color3(0.1, 1.0, 0.3);
        m.emissiveColor = new BABYLON.Color3(0.02, 0.25, 0.08);
        b.material = m;
        targets.push(b);
      });
    }

    // ---------- UI buttons ----------
    weaponBtn.addEventListener("click", async () => {
      const next = (weaponSku === "wz_basic_pistol") ? "wz_cityrunner_smg" : "wz_basic_pistol";
      await loadWeapon(next);
      hudState.textContent = "STATE, weapon swapped";
    });

    skinBtn.addEventListener("click", async () => {
      const cycle = ["wz_basic_soldier","wz_neon_edge","wz_urban_shadow","wz_cinder_camo","wz_glow_legend"];
      const idx = cycle.indexOf(skinSku);
      skinSku = cycle[(idx + 1) % cycle.length];
      await loadSoldier(skinSku);
      await loadWeapon(weaponSku);
      setHud();
      hudState.textContent = "STATE, skin swapped";
    });

    resetBtn.addEventListener("click", () => {
      if(!soldierRoot) return;
      soldierRoot.position.set(0,0,0);
      aimYaw = 0;
      aimPitch = CHEST_LOCK.pitch;
      ammo = magSize;
      setHud();
      hudState.textContent = "STATE, reset";
    });

    // fire button
    fireBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); startFiring(); }, { passive:false });
    fireBtn.addEventListener("pointerup",   () => stopFiring(), { passive:true });
    fireBtn.addEventListener("pointercancel",() => stopFiring(), { passive:true });

    // ---------- boot ----------
    (async function(){
      createScene();
      try{
        hudState.textContent = "STATE, boot";
        await loadSoldier(skinSku);
        await loadWeapon("wz_basic_pistol");
        setHud();
        hudState.textContent = "STATE, ready";
      }catch(e){
        console.error(e);
        hudState.textContent = "STATE, failed";
      }
    })();
  </script>
</body>
</html>
