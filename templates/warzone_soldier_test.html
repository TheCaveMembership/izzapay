<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>War Zone soldier test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#0f0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
    }
    #msg{
      position:fixed;
      top:8px;
      left:10px;
      font-size:14px;
      z-index:5;
    }
    #renderCanvas{
      position:fixed;
      left:0;
      top:0;
      width:100%;
      height:100%;
      display:block;
      touch-action:none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>
  <div id="msg">Booting Babylon…</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const msgEl  = document.getElementById("msg");

    if(!canvas || !window.BABYLON){
      msgEl.textContent = "Babylon not available";
    } else {
      const engine = new BABYLON.Engine(canvas, true, {
        preserveDrawingBuffer:true,
        stencil:true
      });

      const scene  = new BABYLON.Scene(engine);
      // Make the 3D background BRIGHT BLUE so we know rendering works
      scene.clearColor = new BABYLON.Color4(0,0,1,1);

      const camera = new BABYLON.ArcRotateCamera(
        "cam",
        Math.PI * 1.3,
        Math.PI / 2.4,
        20.0,
        new BABYLON.Vector3(0,0,0),
        scene
      );
      camera.attachControl(canvas, false);
      camera.inputs.clear();
      camera.lowerRadiusLimit = 10.0;
      camera.upperRadiusLimit = 30.0;
      camera.panningSensibility = 0;

      const light = new BABYLON.HemisphericLight(
        "h",
        new BABYLON.Vector3(0,1,0),
        scene
      );
      light.intensity = 1.2;

      // HUGE debug cube that should fill the screen if WebGL is working
      const debugBox = BABYLON.MeshBuilder.CreateBox("debugBox", { size:1 }, scene);
      debugBox.position = new BABYLON.Vector3(0,0,0);
      debugBox.scaling  = new BABYLON.Vector3(10,10,10); // <-- gigantic
      const debugMat = new BABYLON.StandardMaterial("dbgMat", scene);
      debugMat.emissiveColor = new BABYLON.Color3(0,1,1); // bright cyan
      debugBox.material = debugMat;

      engine.runRenderLoop(function(){
        scene.render();
      });

      window.addEventListener("resize", function(){
        engine.resize();
      });

      // Still try to import the soldier, but for this test the cube is what matters
      const SOLDIER_URL = "/assets/warzone3d/pistol_soldier_m_idle.glb";
      const lastSlash = SOLDIER_URL.lastIndexOf("/");
      const rootUrl   = SOLDIER_URL.substring(0,lastSlash+1);
      const fileName  = SOLDIER_URL.substring(lastSlash+1);

      msgEl.textContent = "Loading soldier…";

      BABYLON.SceneLoader.ImportMesh(
        "",
        rootUrl,
        fileName,
        scene,
        function(meshes, ps, skeletons, animGroups){
          msgEl.textContent = "Soldier imported OK | meshes: " + meshes.length;

          const root = new BABYLON.TransformNode("soldierRoot", scene);
          meshes.forEach(m => {
            m.parent = root;
          });

          root.position = new BABYLON.Vector3(0,0,0);
          root.rotation = new BABYLON.Vector3(0,Math.PI,0);
          root.scaling  = new BABYLON.Vector3(1,1,1);

          // Slow spin so we can see movement
          scene.onBeforeRenderObservable.add(() => {
            const dt = scene.getEngine().getDeltaTime();
            root.rotation.y += dt * 0.0005;
            debugBox.rotation.y += dt * 0.0008;
          });

          if(animGroups && animGroups.length){
            animGroups.forEach(g => g.stop());
            animGroups[0].start(true);
          }
        },
        null,
        function(scene, message, exception){
          console.error("ImportMesh error:", message, exception);
          msgEl.textContent = "Import error: " + message;
        }
      );
    }
  </script>
</body>
</html>
