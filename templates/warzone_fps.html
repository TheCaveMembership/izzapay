<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IZZA WARZONE, FPS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

  <style>
    :root{
      --bg:#02030a;
      --panel:#070b18;
      --line:#222b47;
      --txt:#edf3ff;
      --muted:#9fb0d6;
      --accent1:#0ff;
      --accent2:#ff3b6b;
      --accent3:#ffcf4d;

      --hpBack: rgba(10,20,12,.55);
      --hpLine: rgba(120,255,160,.35);
      --hpFill: rgba(60,255,120,.95);

      --dpadBack: rgba(0,0,0,.16);
      --dpadLine: rgba(127,209,255,.35);
      --dpadBtnLine: rgba(255,59,107,.35);
      --dpadBtnBack: radial-gradient(circle at 30% 30%,rgba(255,59,107,.18),rgba(0,0,0,.10));
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      color:var(--txt);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
      touch-action:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-drag:none;
      overscroll-behavior:none;
    }

    /* SAME MANUAL ROTATION MODEL AS YOUR LOBBY */
    .rot-wrapper{
      position:fixed;
      top:0;
      left:0;
      width:100vh;
      height:100vw;
      transform-origin:top left;
      transform:rotate(90deg) translateY(-100%);
      transition:transform .15s ease,width .15s ease,height .15s ease;
      background:#000;
    }

    .fps-root{
      width:100%;
      height:100%;
      position:relative;
      background:radial-gradient(circle at top,#15192e 0,#02030a 55%,#000 100%);
      overflow:hidden;
    }

    #renderCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      touch-action:none;
      outline:none;
    }

    /* HUD */
    .hud-top{
      position:absolute;
      left:10px;
      top:10px;
      right:10px;
      z-index:60;
      display:flex;
      justify-content:space-between;
      gap:10px;
      pointer-events:none;
      max-height:38vh;
      overflow:hidden;
    }
    .hud-box{
      border-radius:14px;
      border:1px solid rgba(132,153,255,.35);
      background:rgba(7,11,24,.62);
      box-shadow:0 0 26px rgba(0,255,255,.10), 0 0 30px rgba(255,59,107,.08);
      padding:10px 12px;
      backdrop-filter:blur(8px);
      max-width:49vw;
      pointer-events:auto;
    }
    .hud-title{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(159,176,214,.95);
      margin-bottom:6px;
    }
    .hud-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      color:#e7f0ff;
    }
    .tag{
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(127,209,255,.45);
      background:linear-gradient(90deg,rgba(2,8,36,.85),rgba(0,87,126,.45));
      color:#e7f0ff;
      font-size:11px;
      white-space:nowrap;
    }
    .tag.warn{
      border-color:rgba(255,184,107,.55);
      background:linear-gradient(90deg,rgba(60,34,0,.60),rgba(120,65,0,.35));
    }
    .tag.btn{
      cursor:pointer;
      user-select:none;
      border-color:rgba(255,59,107,.55);
      background:linear-gradient(90deg,rgba(30,6,18,.75),rgba(80,10,30,.45));
    }
    .tag.btn:active{ transform:scale(.98); }

    /* Health bar */
    .hp-wrap{
      margin-top:8px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      pointer-events:none;
    }
    .hp-label{
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(159,176,214,.95);
      pointer-events:none;
      white-space:nowrap;
    }
    .hp-bar{
      width:min(220px,42vw);
      height:10px;
      border-radius:999px;
      border:1px solid var(--hpLine);
      background:linear-gradient(90deg,rgba(0,0,0,.20),var(--hpBack));
      overflow:hidden;
      box-shadow:0 0 18px rgba(60,255,120,.10);
    }
    .hp-fill{
      height:100%;
      width:100%;
      border-radius:999px;
      background:linear-gradient(90deg,rgba(60,255,120,.95),rgba(40,255,110,.75));
      box-shadow:0 0 18px rgba(60,255,120,.18);
      transform-origin:left center;
      transform:scaleX(1);
      transition:transform .08s linear;
    }
    .hp-text{
      font-size:11px;
      color:#e7f0ff;
      opacity:.92;
      pointer-events:none;
      white-space:nowrap;
    }

    /* Center overlay, entering and countdown */
    .center-overlay{
      position:absolute;
      inset:0;
      z-index:70;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at top,rgba(7,11,30,.92),rgba(1,2,10,.96));
      transition:opacity .25s ease;
    }
    .center-card{
      width:min(520px,92vw);
      border-radius:18px;
      border:1px solid rgba(132,153,255,.7);
      background:linear-gradient(145deg,#050818,#02030c);
      padding:18px 18px 14px;
      box-shadow:0 0 40px rgba(0,0,0,.9);
      text-align:center;
    }
    .center-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:#9fb0d6;
      margin-bottom:8px;
    }
    .center-big{
      font-size:22px;
      font-weight:900;
      letter-spacing:.12em;
      color:var(--accent1);
      text-shadow:0 0 12px rgba(0,255,255,.55), 0 0 24px rgba(0,255,255,.20);
      margin:6px 0 8px;
      white-space:nowrap;
    }
    .center-sub{
      font-size:12px;
      color:#c3cff5;
      line-height:1.6;
    }

    .countdown{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:80;
      pointer-events:none;
      font-weight:1000;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--accent1);
      text-shadow:0 0 16px rgba(0,255,255,.55), 0 0 30px rgba(0,255,255,.20);
      font-size:min(64px,14vw);
      opacity:0;
      transition:opacity .15s ease;
      white-space:nowrap;
    }
    .countdown.show{ opacity:1; }

    /* Crosshair */
    .reticle{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:18px;
      height:18px;
      z-index:64;
      pointer-events:none;
      opacity:0.92;
      filter:drop-shadow(0 0 10px rgba(0,255,255,.10));
    }
    .reticle::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:3px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      transform:translate(-50%,-50%);
    }
    .reticle .h,.reticle .v{
      position:absolute;
      left:50%;
      top:50%;
      background:rgba(255,255,255,.85);
      transform:translate(-50%,-50%);
    }
    .reticle .h{ width:18px; height:1px; opacity:.55; }
    .reticle .v{ width:1px; height:18px; opacity:.55; }

    /* Touch controls */
    .touch-ui{
      position:absolute;
      inset:0;
      z-index:65;
      pointer-events:none;
    }

    /* D-PADS */
    .dpad{
      position:absolute;
      width:140px;
      height:140px;
      border-radius:18px;
      border:1px solid var(--dpadLine);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.14),var(--dpadBack));
      box-shadow:0 0 24px rgba(0,255,255,.08);
      pointer-events:auto;
      touch-action:none;
      opacity:0.95;
    }
    .dpad.left{ left:16px; bottom:18px; }
    .dpad.right{ right:16px; bottom:18px; }

    .dpad-btn{
      position:absolute;
      width:46px;
      height:46px;
      border-radius:14px;
      border:1px solid var(--dpadBtnLine);
      background:var(--dpadBtnBack);
      box-shadow:0 0 16px rgba(255,59,107,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ffe7ef;
      font-weight:1000;
      font-size:16px;
      line-height:1;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
      cursor:pointer;
    }
    .dpad-btn:active{ transform:scale(.97); }

    .dpad-btn.up{ left:50%; top:10px; transform:translateX(-50%); }
    .dpad-btn.down{ left:50%; bottom:10px; transform:translateX(-50%); }
    .dpad-btn.left{ top:50%; left:10px; transform:translateY(-50%); }
    .dpad-btn.right{ top:50%; right:10px; transform:translateY(-50%); }

    .dpad-center{
      position:absolute;
      left:50%;
      top:50%;
      width:46px;
      height:46px;
      transform:translate(-50%,-50%);
      border-radius:14px;
      border:1px solid rgba(127,209,255,.25);
      background:radial-gradient(circle at 30% 30%,rgba(0,255,255,.12),rgba(0,0,0,.12));
      box-shadow:0 0 18px rgba(0,255,255,.06);
      pointer-events:none;
    }

    /* Fire button */
    .fireBtn{
      position:absolute;
      right:18px;
      bottom:176px;
      width:92px;
      height:92px;
      border-radius:50%;
      border:1px solid rgba(255,59,107,.55);
      pointer-events:auto;
      touch-action:none;
      cursor:pointer;
      background:radial-gradient(circle at 30% 30%,rgba(255,59,107,.28),rgba(0,0,0,.22));
      color:#ffe7ef;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      box-shadow:0 0 28px rgba(255,59,107,.14), 0 0 26px rgba(0,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0.96;
    }
    .fireBtn:active{ transform:scale(.98); }
    .fireWrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1.05;
    }
    .fireSub{
      margin-top:2px;
      font-size:10px;
      letter-spacing:.14em;
      opacity:.85;
      color:#ffd2de;
    }

    @media (min-width:900px){
      .dpad{ width:160px; height:160px; }
      .dpad-btn{ width:52px; height:52px; border-radius:16px; font-size:18px; }
      .dpad-btn.up{ top:12px; }
      .dpad-btn.down{ bottom:12px; }
      .dpad-btn.left{ left:12px; }
      .dpad-btn.right{ right:12px; }
      .dpad-center{ width:52px; height:52px; border-radius:16px; }
      .fireBtn{ width:100px; height:100px; }
    }
  </style>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>
</head>

<body>
  <div class="rot-wrapper" id="rotWrapper">
    <div class="fps-root">
      <canvas id="renderCanvas"></canvas>

      <div class="hud-top">
        <div class="hud-box">
          <div class="hud-title">Operator</div>
          <div class="hud-row">
            <span class="tag" id="hudUser">loading</span>
            <button class="tag btn" id="exitBtn" type="button">Exit</button>
            <span class="tag" id="hudWeapon">WEAPON, pistol</span>
          </div>
        </div>

        <div class="hud-box" style="text-align:right;">
          <div class="hud-title">Status</div>
          <div class="hud-row" style="justify-content:flex-end;">
            <span class="tag" id="hudAmmo">AMMO, --</span>
            <span class="tag warn" id="hudLevel">LEVEL, --</span>
          </div>

          <div class="hp-wrap">
            <div class="hp-label">HP</div>
            <div class="hp-bar"><div class="hp-fill" id="hpFill"></div></div>
            <div class="hp-text" id="hpText">100</div>
          </div>
        </div>
      </div>

      <div class="center-overlay" id="enterOverlay">
        <div class="center-card">
          <div class="center-title" id="overlayTitle">IZZA WARZONE</div>
          <div class="center-big" id="overlayBig">ENTERING IZZA WARZONE</div>
          <div class="center-sub" id="overlaySub">
            Loading your equipped soldier skin and weapon, deploying into solo zombies mode.
          </div>
        </div>
      </div>

      <div class="countdown" id="countdownText">3</div>

      <div class="reticle" id="reticle"><div class="h"></div><div class="v"></div></div>

      <div class="touch-ui">
        <!-- MOVE D-PAD -->
        <div class="dpad left" id="movePad">
          <div class="dpad-center"></div>
          <div class="dpad-btn up" data-dir="up">▲</div>
          <div class="dpad-btn down" data-dir="down">▼</div>
          <div class="dpad-btn left" data-dir="left">◀</div>
          <div class="dpad-btn right" data-dir="right">▶</div>
        </div>

        <!-- LOOK D-PAD -->
        <div class="dpad right" id="lookPad">
          <div class="dpad-center"></div>
          <div class="dpad-btn up" data-dir="up">▲</div>
          <div class="dpad-btn down" data-dir="down">▼</div>
          <div class="dpad-btn left" data-dir="left">◀</div>
          <div class="dpad-btn right" data-dir="right">▶</div>
        </div>

        <button class="fireBtn" id="fireBtn" type="button">
          <div class="fireWrap">
            <div>FIRE</div>
            <div class="fireSub" id="fireModeText">TAP</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* Rotation wrapper, same behavior as lobby */
    (function(){
      const wrapper = document.getElementById("rotWrapper");
      function updateLayout(){
        if (!wrapper) return;
        const vv = window.visualViewport;
        const w = vv ? vv.width : window.innerWidth;
        const h = vv ? vv.height : window.innerHeight;
        const landscape = w >= h;
        if (landscape){
          wrapper.style.transform = "none";
          wrapper.style.width = "100%";
          wrapper.style.height = "100%";
        } else {
          wrapper.style.width = h + "px";
          wrapper.style.height = w + "px";
          wrapper.style.transform = "rotate(90deg) translateY(-100%)";
        }
      }
      window.addEventListener("resize", updateLayout);
      window.addEventListener("orientationchange", () => setTimeout(updateLayout, 150));
      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", updateLayout);
        window.visualViewport.addEventListener("scroll", updateLayout);
      }
      updateLayout();
    })();

    /* Username resolution, matches your warzone lobby style */
    const SRV_USER = {{ (player.username or '') | tojson }};
    function stripAt(s){ return (s||"").toString().trim().replace(/^@+/, ""); }
    function canonU(s){
      const v = stripAt(s);
      return v ? v.toLowerCase() : "";
    }
    const USER_CANON = (()=>{
      const fromSrv = stripAt(SRV_USER);
      if(fromSrv) return fromSrv;
      try{
        const raw = localStorage.getItem("piAuthUser");
        if(raw){
          const j = JSON.parse(raw);
          if(j && j.username) return stripAt(j.username);
        }
      }catch(e){}
      try{
        const uCanon = localStorage.getItem("izzaUserCanon");
        if(uCanon) return stripAt(uCanon);
        const u = localStorage.getItem("izzaUserU");
        if(u) return stripAt(u);
      }catch(e){}
      return "";
    })();
    const USER_U = canonU(USER_CANON);
    function uQS(){
      return USER_U ? ("&u=" + encodeURIComponent(USER_U)) : "";
    }
    if(USER_CANON){
      try{
        localStorage.setItem("izzaUserCanon", USER_CANON);
        localStorage.setItem("izzaUserU", USER_U);
      }catch(e){}
    }

    /* HUD elements */
    const hudUser = document.getElementById("hudUser");
    const hudWeapon = document.getElementById("hudWeapon");
    const hudAmmo = document.getElementById("hudAmmo");
    const hudLevel = document.getElementById("hudLevel");

    const enterOverlay = document.getElementById("enterOverlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayBig = document.getElementById("overlayBig");
    const overlaySub = document.getElementById("overlaySub");

    const countdownText = document.getElementById("countdownText");
    const exitBtn = document.getElementById("exitBtn");
    const fireModeText = document.getElementById("fireModeText");

    const hpFill = document.getElementById("hpFill");
    const hpText = document.getElementById("hpText");

    hudUser.textContent = USER_CANON || "Operator";

    exitBtn.addEventListener("click", () => {
      const qs = window.location.search || "";
      window.location.href = "/warzone/" + qs;
    });

    /* Helpers */
    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

    function normalizeWeaponSku(s){
      const sku = (s || "").toString().trim();
      if (!sku) return "wz_basic_pistol";
      if (sku === "basic_pistol") return "wz_basic_pistol";
      if (sku === "cityrunner_smg") return "wz_cityrunner_smg";
      return sku;
    }
    function weaponLabelFromSku(sku){
      const s = normalizeWeaponSku(sku);
      return (s === "wz_cityrunner_smg") ? "SMG" : "pistol";
    }
    function setFireModeLabel(){
      fireModeText.textContent = (weaponSku === "wz_cityrunner_smg") ? "HOLD" : "TAP";
    }

    /* HEALTH system */
    const PLAYER = {
      HP_MAX: 100,
      hp: 100,
      alive: true,
      invulnUntil: 0
    };
    function setHpUI(){
      const p = clamp(PLAYER.hp / PLAYER.HP_MAX, 0, 1);
      hpFill.style.transform = `scaleX(${p})`;
      hpText.textContent = String(Math.round(PLAYER.hp));
    }
    function resetHp(){
      PLAYER.hp = PLAYER.HP_MAX;
      PLAYER.alive = true;
      PLAYER.invulnUntil = performance.now() + 800;
      setHpUI();
    }
    function damagePlayer(amount){
      if(!PLAYER.alive) return;
      const now = performance.now();
      if(now < PLAYER.invulnUntil) return;

      PLAYER.hp = clamp(PLAYER.hp - amount, 0, PLAYER.HP_MAX);
      setHpUI();

      PLAYER.invulnUntil = now + 450;

      if(PLAYER.hp <= 0){
        PLAYER.alive = false;
        showEliminatedAndRespawn();
      }
    }

    async function showEliminatedAndRespawn(){
      try{
        overlayTitle.textContent = "IZZA WARZONE";
        overlayBig.textContent = "ELIMINATED";
        overlaySub.textContent = "Respawning, get ready.";
        enterOverlay.style.display = "flex";
      }catch(e){}

      await new Promise(r => setTimeout(r, 1100));

      try{ enterOverlay.style.display = "none"; }catch(e){}

      respawnNow();
    }

    /* LEVEL system */
    let level = 1;
    let killsThisLevel = 0;
    function targetKillsForLevel(lv){
      if(lv === 1) return 5;
      if(lv === 2) return 6;
      if(lv === 3) return 10;
      return 10 + Math.max(0, (lv - 3)) * 2;
    }
    function setHudLevel(){
      hudLevel.textContent = `LEVEL, ${level}`;
    }
    setHudLevel();
    setHpUI();

    /* Babylon setup */
    const canvas = document.getElementById("renderCanvas");
    canvas.tabIndex = 1;

    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:true, stencil:true });

    let scene, camera;

    /* Tuned, test page style chest cam, soldier root is the player */
    const SOLDIER_ROOT = "/assets/warzone3d/soldier_gltf_3/";
    const SOLDIER_FILE = "scene.gltf";

    function getWeaponAsset(sku){
      const s = normalizeWeaponSku(sku);
      if(s === "wz_cityrunner_smg") return { rootUrl:"/assets/warzone3d/weapons/wz_cityrunner_smg/", fileName:"scene.gltf" };
      return { rootUrl:"/assets/warzone3d/weapons/wz_basic_pistol/", fileName:"scene.gltf" };
    }

    const WEAPON_TUNING = {
      wz_basic_pistol: {
        WEAPON_SCALE: 0.06000,
        WEAPON_YAW_FIX: 1.52080,
        WEAPON_PITCH_FIX: -0.03000,
        WEAPON_POS:      new BABYLON.Vector3(-1.06900,  0.32700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 2.98400,  1.23000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.23000,  0.00000,  0.01000),
      },
      wz_cityrunner_smg: {
        WEAPON_SCALE: 0.11000,
        WEAPON_YAW_FIX: 1.10080,
        WEAPON_PITCH_FIX: -1.84000,
        WEAPON_POS:      new BABYLON.Vector3( 1.18100,  1.01700, -0.05800),
        WEAPON_GRIP_POS: new BABYLON.Vector3( 7.42400, -2.71000, -11.27200),
        WEAPON_GRIP_ROT: new BABYLON.Vector3(-0.05000, -0.22000,  0.01000),
      }
    };
    function getWeaponTune(sku){
      const s = normalizeWeaponSku(sku);
      return WEAPON_TUNING[s] || WEAPON_TUNING.wz_basic_pistol;
    }

    /* Chest camera lock */
    const CHEST_LOCK = {
      pivotPos: new BABYLON.Vector3(0.00, 0.22, 0.10),
      camPos:   new BABYLON.Vector3(-0.650, 1.640, -0.969),
      pitch:    -0.30,
      yaw:       0.00
    };

    const IDLE = { SPEED: 0.05, LOOP: true };

    /* MOVE and LOOK tuning */
    const JOY = { MOVE_SPEED: 5.5 };

    const LOOK = {
      YAW_SPEED:  0.92,
      PITCH_SPEED: 0.72,
      PITCH_MIN: -1.05,
      PITCH_MAX:  0.45
    };

    const LOOK_SENS = { TOUCH_MULT: 0.72 };

    /* Muzzle lock */
    const LOCKED_UP = 0.08;
    const LOCKED_RIGHT = 0.31;
    const LOCKED_FLASH_SIZE = 0.05;
    const MUZZLE_TUNE = { f: 0.73 };

    /* Soldier skin overrides */
    const TEXTURE_BASE = "/assets/warzone3d/soldier_gltf_3/textures/";
    const SKU_TO_TEXTURE_FOLDER = {
      "wz_neon_edge": "neon_edge",
      "wz_urban_shadow": "urban_shadow",
      "wz_cinder_camo": "cinder_camo",
      "wz_glow_legend": "glow_legend"
    };
    const FOLDER_OVERRIDE_FILE = {};
    const OVERRIDE_CANDIDATES = [
      "texture.png","textures.png","basecolor.png","base_color.png","albedo.png","diffuse.png","skin.png","skin_diffuse.png","main.png",
      "material_8_diffuse.png","material_9_diffuse.png","material_10_diffuse.png","material_11_diffuse.png"
    ];

    async function checkUrlOk(url){
      try{
        const r = await fetch(url, { method:"HEAD", cache:"no-store" });
        if (r && r.ok) return true;
      }catch(e){}
      try{
        const r2 = await fetch(url, { method:"GET", cache:"no-store" });
        return !!(r2 && r2.ok);
      }catch(e){}
      return false;
    }

    async function detectSingleTextureFile(folder){
      if (!folder) return null;
      if (folder in FOLDER_OVERRIDE_FILE) return FOLDER_OVERRIDE_FILE[folder];

      for (const f of OVERRIDE_CANDIDATES){
        const url = `${TEXTURE_BASE}${folder}/${f}`;
        const ok = await checkUrlOk(url);
        if (ok){
          FOLDER_OVERRIDE_FILE[folder] = f;
          return f;
        }
      }
      FOLDER_OVERRIDE_FILE[folder] = null;
      return null;
    }

    function applySingleTextureToMaterials(container, folder, file){
      try{
        if(!container || !folder || !file) return;
        const texUrl = `${TEXTURE_BASE}${folder}/${file}`;
        const mats = (container && container.materials) ? container.materials : [];
        mats.forEach(mat => {
          if(!mat) return;

          if (mat.albedoTexture){
            const newTex = new BABYLON.Texture(texUrl, scene, true, false);
            newTex.hasAlpha = mat.albedoTexture.hasAlpha || false;
            newTex.level = (typeof mat.albedoTexture.level === "number") ? mat.albedoTexture.level : 1.0;
            mat.albedoTexture = newTex;
          }
          if (mat.diffuseTexture){
            const newTex = new BABYLON.Texture(texUrl, scene, true, false);
            newTex.hasAlpha = mat.diffuseTexture.hasAlpha || false;
            newTex.level = (typeof mat.diffuseTexture.level === "number") ? mat.diffuseTexture.level : 1.0;
            mat.diffuseTexture = newTex;
          }

          if (!mat.albedoTexture && mat.getClassName && /PBR/i.test(mat.getClassName())){
            mat.albedoTexture = new BABYLON.Texture(texUrl, scene, true, false);
          }
          if (!mat.diffuseTexture && mat.getClassName && /Standard/i.test(mat.getClassName())){
            mat.diffuseTexture = new BABYLON.Texture(texUrl, scene, true, false);
          }
        });
      }catch(e){}
    }

    async function applyTextureOverrides(container, skinSku){
      const sku = (skinSku || "").toString().trim();
      const folder = SKU_TO_TEXTURE_FOLDER[sku];
      if(!folder) return;
      const f = await detectSingleTextureFile(folder);
      if(!f) return;
      applySingleTextureToMaterials(container, folder, f);
    }

    /* Equipped fetches */

    async function fetchAmmoForCurrentWeapon(){
      try{
        const res = await fetch("/warzone/api/ammo/current?_" + Date.now() + uQS(), { credentials:"include" });
        if(!res.ok) return 0;
        const data = await res.json().catch(()=>null);
        if(!data || !data.ok) return 0;
        const rounds = (typeof data.rounds === "number") ? data.rounds : 0;

    /* D-PAD input state */
    const movePad = document.getElementById("movePad");
    const lookPad = document.getElementById("lookPad");
    const fireBtn = document.getElementById("fireBtn");

    const moveState = { dx:0, dy:0, pointers:new Map() };
    const lookState = { dx:0, dy:0, pointers:new Map() };

    function dirToVec(dir){
      if(dir === "up") return { dx:0, dy:-1 };
      if(dir === "down") return { dx:0, dy: 1 };
      if(dir === "left") return { dx:-1, dy:0 };
      if(dir === "right") return { dx: 1, dy:0 };
      return { dx:0, dy:0 };
    }

    function recomputeDpad(state){
      let dx = 0, dy = 0;
      for(const dir of state.pointers.values()){
        const v = dirToVec(dir);
        dx += v.dx;
        dy += v.dy;
      }
      dx = clamp(dx, -1, 1);
      dy = clamp(dy, -1, 1);

      /* Hard D-pad: no diagonal, snap to strongest axis */
      if(dx !== 0 && dy !== 0){
        if(Math.abs(dx) >= Math.abs(dy)){
          dy = 0;
        } else {
          dx = 0;
        }
      }

      state.dx = dx;
      state.dy = dy;
    }

    function bindDpad(padEl, state){
      const buttons = Array.from(padEl.querySelectorAll(".dpad-btn[data-dir]"));

      buttons.forEach(btn => {
        btn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const dir = btn.getAttribute("data-dir") || "";
          state.pointers.set(e.pointerId, dir);
          recomputeDpad(state);
          try{ btn.setPointerCapture(e.pointerId); }catch(_){}
        }, { passive:false });

        btn.addEventListener("pointerup", (e) => {
          const had = state.pointers.delete(e.pointerId);
          if(had) recomputeDpad(state);
        }, { passive:true });

        btn.addEventListener("pointercancel", (e) => {
          const had = state.pointers.delete(e.pointerId);
          if(had) recomputeDpad(state);
        }, { passive:true });

        btn.addEventListener("pointerleave", (e) => {
          /* If finger slides off while holding, keep held until pointerup, do nothing here */
        }, { passive:true });
      });

      window.addEventListener("pointerup", (e) => {
        if(state.pointers.has(e.pointerId)){
          state.pointers.delete(e.pointerId);
          recomputeDpad(state);
        }
      }, { passive:true });

      window.addEventListener("pointercancel", (e) => {
        if(state.pointers.has(e.pointerId)){
          state.pointers.delete(e.pointerId);
          recomputeDpad(state);
        }
      }, { passive:true });
    }

    bindDpad(movePad, moveState);
    bindDpad(lookPad, lookState);

    /* FPS state */
    let weaponSku = "wz_basic_pistol";
    let ammo = 0;

    let soldierContainer = null;
    let soldierRoot = null;
    let soldierSkinned = null;

    let chestBoneNode = null;
    let chestPivot = null;

    let weaponContainer = null;
    let weaponRoot = null;
    let weaponGrip = null;

    let rightHandAnchor = null;

    /* Fire behavior */
    const FIREBTN = {
      pistolCooldownMs: 220,
      smgIntervalMs: 95,
      lastShotAt: 0,
      holding: false
    };

    function isSMG(){
      return weaponSku === "wz_cityrunner_smg";
    }

    function canShoot(nowMs){
      if(ammo <= 0) return false;
      if(isSMG()){
        return (nowMs - FIREBTN.lastShotAt) >= FIREBTN.smgIntervalMs;
      }
      return (nowMs - FIREBTN.lastShotAt) >= FIREBTN.pistolCooldownMs;
    }

    /* Minimal FX pool */
    const fxLive = [];
    function fxRegister(mesh, lifeSeconds){
      try{
        mesh.isPickable = false;
        mesh.renderingGroupId = 3;
      }catch(e){}
      fxLive.push({ mesh, dieAt: performance.now() * 0.001 + lifeSeconds });
    }

    function findSkinnedMeshFromContainer(container){
      try{
        const meshes = (container && container.meshes) ? container.meshes : [];
        return meshes.find(m => m && m.skeleton) || null;
      }catch(e){
        return null;
      }
    }

    function findBoneByRegex(skeleton, arr){
      if(!skeleton || !skeleton.bones) return null;
      for(const rx of arr){
        const b = skeleton.bones.find(x => rx.test(x.name || ""));
        if(b) return b;
      }
      return null;
    }

    function findRightHandBone(skeleton){
      return findBoneByRegex(skeleton, [
        /^mixamorig:RightHand/i,
        /RightHand/i,
        /Hand/i
      ]);
    }

    function findChestBone(skeleton){
      return findBoneByRegex(skeleton, [
        /mixamorig:Spine2/i,
        /mixamorig:Spine1/i,
        /mixamorig:Spine\b/i,
        /mixamorig:Neck/i,
        /Spine/i
      ]);
    }

    function playIdleAnimationsSlow(container){
      try{
        const groups = (container && container.animationGroups) ? container.animationGroups : [];
        if(!groups.length) return;
        groups.forEach(g => {
          try{
            g.stop();
            g.start(true, IDLE.SPEED);
          }catch(e){}
        });
      }catch(e){}
    }

    function hideHeadAndNeck(container){
      const meshes = (container && container.meshes) ? container.meshes : [];
      const keepRx = /(arm|forearm|hand|wrist|glove|sleeve|weapon|gun|pistol|smg)/i;
      const hideRx = /(head|neck|helmet|face|hair|ear|mask|hood|cap|hat|beard|brow|eye|teeth|tongue|jaw|cheek|skull|cranium|visor|goggles|glass|glasses|mouth|lip)/i;
      const HEAD_ZONE = { minY: 1.35, minZ: -0.35 };

      meshes.forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        if(keepRx.test(nm)) return;

        let hide = false;
        if(hideRx.test(nm)) hide = true;

        if(!hide){
          try{
            const bi = m.getBoundingInfo && m.getBoundingInfo();
            if(bi){
              const c = bi.boundingBox.centerWorld;
              if(c.y >= HEAD_ZONE.minY && c.z >= HEAD_ZONE.minZ){
                hide = true;
              }
            }
          }catch(e){}
        }
        if(!hide) return;

        try{
          m.isPickable = false;
          m.visibility = 0.0;
          m.setEnabled(false);
        }catch(e){
          try{ m.visibility = 0.0; }catch(_){}
        }
      });
    }

    function setArmsOnlyVisibility(container){
      const meshes = (container && container.meshes) ? container.meshes : [];
      let shown = 0;

      meshes.forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        const isArms =
          nm.includes("arm") ||
          nm.includes("forearm") ||
          nm.includes("hand") ||
          nm.includes("wrist") ||
          nm.includes("glove") ||
          nm.includes("sleeve");

        const keepEnabled = !!m.skeleton;

        try{
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = isArms ? 1.0 : 0.0;
          m.setEnabled(keepEnabled || isArms);
          if(isArms) shown += 1;
        }catch(e){}
      });

      if(shown === 0){
        meshes.forEach(m => {
          if(!m) return;
          const nm = (m.name || "").toLowerCase();
          const keepEnabled = !!m.skeleton;

          const hideBody =
            nm.includes("head") ||
            nm.includes("helmet") ||
            nm.includes("torso") ||
            nm.includes("spine") ||
            nm.includes("chest") ||
            nm.includes("body") ||
            nm.includes("neck") ||
            nm.includes("face") ||
            nm.includes("hair") ||
            nm.includes("ear") ||
            nm.includes("hip") ||
            nm.includes("leg") ||
            nm.includes("thigh") ||
            nm.includes("calf") ||
            nm.includes("foot") ||
            nm.includes("boot");

          try{
            m.isPickable = false;
            m.renderingGroupId = 2;
            m.visibility = hideBody ? 0.0 : 1.0;
            m.setEnabled(keepEnabled || !hideBody);
          }catch(e){}
        });
      }

      hideHeadAndNeck(container);
    }

    function clearWeapon(){
      try{ if(weaponGrip){ weaponGrip.dispose(true,false); weaponGrip = null; } }catch(e){}
      try{ if(weaponRoot){ weaponRoot.dispose(true,false); weaponRoot = null; } }catch(e){}
      try{
        if(weaponContainer){
          weaponContainer.removeAllFromScene();
          weaponContainer.dispose();
          weaponContainer = null;
        }
      }catch(e){}
    }

    function clearSoldier(){
      clearWeapon();
      try{ if(rightHandAnchor){ rightHandAnchor.dispose(true,false); rightHandAnchor = null; } }catch(e){}
      try{ if(chestPivot){ chestPivot.dispose(true,false); chestPivot = null; } }catch(e){}
      try{ if(chestBoneNode){ chestBoneNode.dispose(true,false); chestBoneNode = null; } }catch(e){}
      try{ if(soldierRoot){ soldierRoot.dispose(true,false); soldierRoot = null; } }catch(e){}
      soldierSkinned = null;

    /* Chest cam values */
    let aimYaw = 0.0;
    let aimPitch = CHEST_LOCK.pitch;

    function applyChestMountAimed(){
      if(!chestPivot || !camera) return;

      chestPivot.position.copyFrom(CHEST_LOCK.pivotPos);
      chestPivot.rotation.set(0, 0, 0);

      camera.position.copyFrom(CHEST_LOCK.camPos);
      camera.rotation.set(aimPitch, 0, 0);
    }

    function ensureRightHandAnchor(){
      if(rightHandAnchor) return;
      if(!soldierSkinned || !soldierSkinned.skeleton) return;

      const rh = findRightHandBone(soldierSkinned.skeleton);
      if(!rh) return;

      rightHandAnchor = new BABYLON.TransformNode("rightHandAnchor", scene);
      try{
        rightHandAnchor.attachToBone(rh, soldierSkinned);
        rightHandAnchor.position.set(0,0,0);
        rightHandAnchor.rotation.set(0,0,0);
      }catch(e){}
    }

    async function loadSoldierAndChestCam(skinSku){
      clearSoldier();

      const cont = await BABYLON.SceneLoader.LoadAssetContainerAsync(SOLDIER_ROOT, SOLDIER_FILE, scene);
      await applyTextureOverrides(cont, skinSku);
      cont.addAllToScene();
      soldierContainer = cont;

      soldierRoot = new BABYLON.TransformNode("soldierRoot", scene);
      (cont.rootNodes || []).forEach(rn => {

      });

      soldierRoot.position.set(0, 0, 0);

      soldierSkinned = findSkinnedMeshFromContainer(cont);

      playIdleAnimationsSlow(cont);

      chestBoneNode = new BABYLON.TransformNode("chestBoneNode", scene);
      chestPivot = new BABYLON.TransformNode("chestPivot", scene);

      } else {
        chestBoneNode.parent = soldierRoot;
        chestBoneNode.position.set(0, 1.52, 0.06);
      }

      chestPivot.parent = chestBoneNode;

      camera.parent = chestPivot;

      aimYaw = 0.0;
      aimPitch = CHEST_LOCK.pitch;

      applyChestMountAimed();

    async function loadWeaponToRightHand(sku){
      clearWeapon();

      const T = getWeaponTune(sku);
      const asset = getWeaponAsset(sku);

      const w = await BABYLON.SceneLoader.LoadAssetContainerAsync(asset.rootUrl, asset.fileName, scene);
      w.addAllToScene();
      weaponContainer = w;

      weaponRoot = new BABYLON.TransformNode("weaponRoot", scene);
      weaponGrip = new BABYLON.TransformNode("weaponGrip", scene);
      weaponGrip.parent = weaponRoot;

      const sk = soldierSkinned && soldierSkinned.skeleton ? soldierSkinned.skeleton : null;
      const rh = findRightHandBone(sk);

      if(rh && soldierSkinned){
        weaponRoot.attachToBone(rh, soldierSkinned);
      } else {
        weaponRoot.parent = soldierRoot;
        weaponRoot.position.set(0.35, 1.10, 0.25);
      }

      weaponRoot.position.copyFrom(T.WEAPON_POS);
      weaponRoot.rotation.set(
        (T.WEAPON_PITCH_FIX || 0.0),
        Math.PI + (T.WEAPON_YAW_FIX || 0.0),
        0
      );
      weaponRoot.scaling.set(T.WEAPON_SCALE, T.WEAPON_SCALE, T.WEAPON_SCALE);

      weaponGrip.position.copyFrom(T.WEAPON_GRIP_POS);
      weaponGrip.rotation.copyFrom(T.WEAPON_GRIP_ROT);

      (w.meshes || []).forEach(m => {
        if(!m) return;
        const nm = (m.name || "").toLowerCase();
        if(nm === "__root__") return;
        try{
          m.parent = weaponGrip;
          m.isPickable = false;
          m.renderingGroupId = 2;
          m.visibility = 1.0;
          m.setEnabled(true);
        }catch(e){}
      });

      weaponSku = normalizeWeaponSku(sku);
      hudWeapon.textContent = `WEAPON, ${weaponLabelFromSku(weaponSku)}`;
      setFireModeLabel();

    /* Zombies */
    const zombies = [];

    function createZombie(x, z){
      const body = BABYLON.MeshBuilder.CreateBox("z", { size: 1.0 }, scene);
      body.position.set(x, 0.5, z);
      body.metadata = { isZombie:true, hp:2 };
      const mat = new BABYLON.StandardMaterial("zm", scene);
      mat.emissiveColor = new BABYLON.Color3(0.1, 0.9, 0.4);
      mat.diffuseColor = new BABYLON.Color3(0.1, 0.2, 0.1);
      body.material = mat;
      zombies.push({ mesh: body, speed: 1.2 + Math.random()*0.8, lastHitAt: 0 });
    }

    function clearZombies(){
      while(zombies.length){
        const z = zombies.pop();
        try{ z.mesh && z.mesh.dispose(); }catch(e){}
      }
    }

    function spawnLevel(lv){
      clearZombies();
      const n = targetKillsForLevel(lv);
      for(let i=0;i<n;i++){
        const angle = (i / n) * Math.PI * 2;
        const r = 18 + Math.random()*10;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        createZombie(x, z);
      }
    }

    /* Muzzle origin */
    function getMuzzleOrigin(){
      let base = null;

      if(rightHandAnchor){
        try{ base = rightHandAnchor.getAbsolutePosition().clone(); }catch(e){}
      }
      if(!base && weaponGrip){
        try{ base = weaponGrip.getAbsolutePosition().clone(); }catch(e){}
      }
      if(!base){
        const p = camera.getAbsolutePosition();
        const dir = camera.getForwardRay(1).direction;
        base = p.add(dir.scale(0.35));
      }

      const fwd = camera.getForwardRay(1).direction;
      const up  = camera.getDirection(BABYLON.Axis.Y).normalize();
      const rt  = camera.getDirection(BABYLON.Axis.X).normalize();

      base.addInPlace(fwd.scale(MUZZLE_TUNE.f));
      base.addInPlace(up.scale(LOCKED_UP));
      base.addInPlace(rt.scale(LOCKED_RIGHT));

      return base;
    }

    function shootOnce(){
      const nowMs = performance.now();
      if(!canShoot(nowMs)) return;
      FIREBTN.lastShotAt = nowMs;

      ammo = Math.max(0, ammo - 1);
      hudAmmo.textContent = `AMMO, ${ammo}`;

      const origin = getMuzzleOrigin();
      const forward = camera.getForwardRay(200).direction;

      const ray = new BABYLON.Ray(origin, forward, 200);
      const hit = scene.pickWithRay(ray, (m) => m && m.metadata && m.metadata.isZombie);

      const endPoint = (hit && hit.hit && hit.pickedPoint) ? hit.pickedPoint.clone() : origin.add(forward.scale(120));

      const tracer = BABYLON.MeshBuilder.CreateLines("tr", { points: [origin, endPoint] }, scene);
      tracer.alpha = 0.9;
      tracer.color = new BABYLON.Color3(0.9, 0.95, 1.0);
      fxRegister(tracer, 0.06);

      const flash = BABYLON.MeshBuilder.CreateSphere("mf", { diameter: Math.max(0.01, LOCKED_FLASH_SIZE) }, scene);
      const mm = new BABYLON.StandardMaterial("mfm", scene);
      mm.emissiveColor = new BABYLON.Color3(1.0, 0.85, 0.35);
      mm.diffuseColor = new BABYLON.Color3(0,0,0);
      mm.specularColor = new BABYLON.Color3(0,0,0);
      flash.material = mm;
      flash.position.copyFrom(origin);
      fxRegister(flash, 0.04);

      if(hit && hit.pickedMesh){
        const z = hit.pickedMesh;
        z.metadata.hp = (z.metadata.hp || 1) - 1;
        if(z.metadata.hp <= 0){
          const idx = zombies.findIndex(x => x.mesh === z);
          if(idx >= 0) zombies.splice(idx, 1);
          try{ z.dispose(); }catch(e){}

          killsThisLevel += 1;
          const target = targetKillsForLevel(level);
          if(killsThisLevel >= target){
            level += 1;
            killsThisLevel = 0;
            setHudLevel();
            spawnLevel(level);
          }
        }
      }
    }

    fireBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      FIREBTN.holding = true;
      if(!isSMG()){
        shootOnce();
      }
    }, { passive:false });

    fireBtn.addEventListener("pointerup", () => { FIREBTN.holding = false; }, { passive:true });
    fireBtn.addEventListener("pointercancel", () => { FIREBTN.holding = false; }, { passive:true });
    fireBtn.addEventListener("pointerleave", () => { FIREBTN.holding = false; }, { passive:true });

    function respawnNow(){
      if(!soldierRoot) return;

      soldierRoot.position.set(0,0,0);
      aimYaw = 0.0;
      aimPitch = CHEST_LOCK.pitch;

      level = 1;
      killsThisLevel = 0;
      setHudLevel();
      spawnLevel(level);

      resetHp();
    }

    function createScene(){
      scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0,0,0,0);

      const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
      hemi.intensity = 1.10;

      const dir = new BABYLON.DirectionalLight("d", new BABYLON.Vector3(-0.2,-1,-0.1), scene);
      dir.intensity = 0.55;

      const ground = BABYLON.MeshBuilder.CreateGround("g", { width: 220, height: 220 }, scene);
      const grid = new BABYLON.GridMaterial("grid", scene);
      grid.majorUnitFrequency = 5;
      grid.minorUnitVisibility = 0.25;
      grid.gridRatio = 1;
      grid.backFaceCulling = false;
      grid.opacity = 0.35;
      ground.material = grid;
      ground.isPickable = true;

      camera = new BABYLON.UniversalCamera("chestCam", new BABYLON.Vector3(0,1.6,0), scene);
      camera.minZ = 0.02;
      camera.maxZ = 5000;
      camera.fov = 1.0;
      camera.inputs.clear();
      scene.activeCamera = camera;

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);

      scene.onBeforeRenderObservable.add(() => {
        const now = performance.now() * 0.001;

        for(let i = fxLive.length - 1; i >= 0; i--){
          const fx = fxLive[i];
          if(!fx || !fx.mesh){
            fxLive.splice(i,1);
            continue;
          }
          if(now >= fx.dieAt){
            try{ fx.mesh.dispose(); }catch(e){}
            fxLive.splice(i,1);
          }
        }

        if(!soldierRoot || !chestPivot) return;

        const dt = scene.getEngine().getDeltaTime() * 0.001;

        /* LOOK, true D-pad */
        const lookMult = isTouch ? LOOK_SENS.TOUCH_MULT : 1.0;
        const lookX = lookState.dx * lookMult;
        const lookY = lookState.dy * lookMult;

        if(PLAYER.alive){
          aimYaw   += (lookX * LOOK.YAW_SPEED * dt);
          aimPitch += (lookY * LOOK.PITCH_SPEED * dt);
          aimPitch  = clamp(aimPitch, LOOK.PITCH_MIN, LOOK.PITCH_MAX);
        }

        /* MOVE, true D-pad */
        const mvX = moveState.dx;
        const mvY = moveState.dy;

        soldierRoot.rotation.y = aimYaw;

        const yaw = soldierRoot.rotation.y;
        const forward = new BABYLON.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right   = new BABYLON.Vector3(forward.z, 0, -forward.x);

        const moveF = -mvY;
        const moveS = mvX;

        if(PLAYER.alive){
          const spd = JOY.MOVE_SPEED * dt;
          const delta = forward.scale(moveF * spd).add(right.scale(moveS * spd));
          soldierRoot.position.addInPlace(new BABYLON.Vector3(delta.x, 0, delta.z));
        }

        applyChestMountAimed();

        /* Zombies chase player, and damage on touch */
        const targetPos = soldierRoot.getAbsolutePosition();
        const touchDist = 1.05;
        const hitCooldownMs = 520;
        const touchDamage = 10;

        for(const z of zombies){
          const m = z.mesh;
          if(!m) continue;

          const to = targetPos.subtract(m.position);
          const dist = Math.max(0.001, to.length());
          const dirv = to.scale(1.0 / dist);

          m.position.x += dirv.x * z.speed * dt;
          m.position.z += dirv.z * z.speed * dt;
          m.rotation.y = Math.atan2(dirv.x, dirv.z);

          if(PLAYER.alive && dist <= touchDist){
            const nowMs = performance.now();
            if((nowMs - (z.lastHitAt || 0)) >= hitCooldownMs){
              z.lastHitAt = nowMs;
              damagePlayer(touchDamage);
            }
          }
        }

        if(PLAYER.alive && isSMG() && FIREBTN.holding){
          shootOnce();
        }
      });

      return scene;
    }

    async function runEnterSequence(){
      overlayTitle.textContent = "IZZA WARZONE";
      overlayBig.textContent = "ENTERING IZZA WARZONE";
      overlaySub.textContent = "Loading your equipped soldier skin and weapon, deploying into solo zombies mode.";

      enterOverlay.style.display = "flex";
      countdownText.classList.remove("show");

      weaponSku = await fetchEquippedWeaponSku();
      ammo = await fetchAmmoForCurrentWeapon();

      hudWeapon.textContent = `WEAPON, ${weaponLabelFromSku(weaponSku)}`;
      setFireModeLabel();
      hudAmmo.textContent = `AMMO, ${ammo}`;

      const skinSku = await fetchEquippedSkinSku();

      await loadSoldierAndChestCam(skinSku);
      await loadWeaponToRightHand(weaponSku);

      level = 1;
      killsThisLevel = 0;
      setHudLevel();
      spawnLevel(level);

      resetHp();

      await new Promise(r => setTimeout(r, 650));

      enterOverlay.style.display = "none";

      const steps = ["3","2","1","GO"];
      for(const s of steps){
        countdownText.textContent = s;
        countdownText.classList.add("show");
        await new Promise(r => setTimeout(r, s === "GO" ? 520 : 700));
        countdownText.classList.remove("show");
        await new Promise(r => setTimeout(r, 140));
      }
    }

    (async function(){
      createScene();
      try{
        await runEnterSequence();
      }catch(e){
        console.error("[WARZONE FPS] boot failed", e);
        try{ enterOverlay.style.display = "none"; }catch(_){}
      }
    })();
  </script>
